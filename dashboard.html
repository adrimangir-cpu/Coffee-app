<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Coffee CRM - Управление сетью TEIKU</title>
    <style>
        /* =========================================
           ОБЩИЕ СТИЛИ
        ========================================= */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #FFF0F5 0%, #ede7f6 100%); 
            margin: 0; 
            padding: 20px; 
            color: #333; 
            min-height: 100vh; 
        }
        
        .nav { 
            background: linear-gradient(135deg, #F06292 0%, #7E57C2 100%); 
            color: white; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
        }
        
        /* =========================================
           ВКЛАДКИ МЕНЮ
        ========================================= */
        .tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
            overflow-x: auto; 
            padding-bottom: 10px; 
        }
        
        .tab-btn { 
            padding: 18px 32px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            background: #ffffff; 
            color:#7E57C2; 
            font-weight: 900; 
            font-size: 17px; 
            transition: 0.3s; 
            white-space: nowrap; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
        }
        
        .tab-btn.active { 
            background: linear-gradient(135deg, #7E57C2 0%, #4A148C 100%); 
            color: white; 
        }
        
        /* =========================================
           КАРТОЧКИ И ТАБЛИЦЫ
        ========================================= */
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            overflow-x: auto; 
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 15px; 
            font-size: 17px; 
            min-width: 1000px; 
        }
        
        th { 
            background: #fdfcff; 
            padding: 16px 14px; 
            text-align: left; 
            border-bottom: 2px solid #e1bee7; 
            color: #4A148C; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            font-weight: 900; 
        }
        
        td { 
            padding: 14px; 
            border-bottom: 1px solid #f0f0f0; 
        }
        
        /* =========================================
           ФОРМЫ ВВОДА И КНОПКИ
        ========================================= */
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-family: inherit; 
            box-sizing: border-box; 
            font-size:15px; 
            font-weight: bold;
        }
        
        input:focus, select:focus { 
            border-color: #7E57C2; 
            outline: none; 
            background: #faf8ff; 
        }
        
        .btn-del { 
            color: #d32f2f; 
            cursor: pointer; 
            border: none; 
            background: #ffebee; 
            border-radius: 8px; 
            padding: 8px 12px; 
            font-size: 16px; 
            font-weight: bold; 
            transition: 0.2s;
        }

        .btn-del:hover { background: #ffcdd2; }
        .btn-del:disabled { background: #eee; color: #aaa; cursor: not-allowed; }

        .btn-save { 
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%); 
            color: white; 
            padding: 20px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 900; 
            font-size: 16px; 
            box-shadow: 0 4px 15px rgba(76,175,80,0.3); 
        }
        
        .btn-add { 
            background: linear-gradient(135deg, #03a9f4 0%, #0277bd 100%); 
            color: white; 
            padding: 14px 28px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 900; 
            font-size:16px; 
        }
        
        .order-row:hover { background-color: #f9f9f9; }
        
        .cat-group-header { 
            background: #ede7f6; 
            font-weight: 900; 
            cursor: pointer; 
            color: #311b92; 
            transition: 0.2s; 
        }
        
        .cat-group-header:hover { background: #d1c4e9; }
        
        .chk-row:hover { background-color: #f1f8e9 !important; transition: 0.2s; }
        
        .ch-val { text-align: center; font-weight: bold; font-size:16px; }
        .ch-full { color: #2e7d32; }
        .ch-empty { color: #c62828; }
        
        .settings-panel { 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #e0e0e0; 
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .toggle-label { 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            margin-bottom: 10px; 
            font-weight: 900; 
            color: #4A148C; 
            font-size: 17px;
        }
        
        .toggle-label input { width: auto; margin-right: 12px; transform: scale(1.5); }
        
        .edit-chk-input {
            width: 100%; text-align: center; padding: 8px; font-size: 15px;
            font-weight: bold; color: #311B92; border: 2px solid #7E57C2; border-radius: 6px;
        }

        .vendor-badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; font-weight: 900; display: inline-block; }
        .vendor-ozon { background: #e3f2fd; color: #1565c0; border: 1px solid #90caf9; }
        .vendor-wb { background: #f3e5f5; color: #8e24aa; border: 1px solid #ce93d8; }
    </style>
</head>
<body>

<div class="nav">
    <h1 style="margin:0;">💼 Coffee TEIKU CRM</h1>
    <div id="db-status">☁️ База активна</div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="loadTab('orders', this)">📋 Свод и Заказы</button>
    <button class="tab-btn" onclick="loadTab('marketplace', this)">🛒 Маркетплейсы</button>
    <button class="tab-btn" onclick="loadTab('checks_table', this)">✅ Таблица Чек-листов</button>
    <button class="tab-btn" onclick="loadTab('stoplists', this)">🛑 Стоп-листы</button>
    <button class="tab-btn" onclick="loadTab('missing', this)">‼️ Недовозы</button>
    <button class="tab-btn" onclick="loadTab('catalog_order', this)">🛒 Справочник Закупки</button>
    <button class="tab-btn" onclick="loadTab('catalog_checklist', this)">📝 Справочник Чек-листа</button>
    <button class="tab-btn" onclick="loadTab('catalog_stoplist', this)">🛑 Справочник Стоп-листа</button>
    <button class="tab-btn" onclick="loadTab('stats', this)">📈 Статистика</button>
</div>

<div class="card" id="content">Загрузка данных...</div>

<script>
    // ==========================================
    // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ И ПОДКЛЮЧЕНИЕ
    // ==========================================
    const FB_URL = "https://project-lenta22-default-rtdb.firebaseio.com";
    let currentCatalog = {};
    let currentPath = "";
    let currentTabType = "";
    let isNewShopCatalog = false; 
    let appSettings = { hidden_categories: {}, new_shop_order_active: false };
    let cachedData = {};
    
    // Переменные состояний редактирования
    let isChecklistEditMode = false;
    
    let isSvodEditMode = false;
    let svodDeletions = []; 
    let tempSvodQty = {}; 
    let tempSvodStatus = {}; 
    let openSvodShops = new Set();
    
    let isMissingEditMode = false;
    let missingDeletions = new Set();
    let tempMissingStatus = {};
    
    let isMpEditMode = false;
    let mpDeletions = new Set();

    function getSafeId(str) {
        if (!str) return "id_empty_" + Math.floor(Math.random() * 10000);
        let res = "";
        for (let i = 0; i < str.length; i++) {
            res += str.charCodeAt(i).toString(16);
        }
        return "id_" + res;
    }

    function toggleElements(cls) { 
        let els = document.querySelectorAll('.' + cls);
        if (els.length === 0) {
            let single = document.getElementById(cls);
            if (single) {
                single.style.display = single.style.display === 'none' ? 'block' : 'none';
            }
            return;
        }
        els.forEach(el => {
            if (el.tagName === 'DIV') {
                el.style.display = el.style.display === 'none' ? 'flex' : 'none';
            } else {
                el.style.display = el.style.display === 'none' ? 'table-row' : 'none';
            }
        }); 
        
        let arrowEl = document.getElementById("arrow_" + cls);
        if (arrowEl && els.length > 0) {
            arrowEl.innerText = els[0].style.display !== 'none' ? "▲" : "▼";
        }
    }

    function toggleLvl1(gcId) {
        let subs = document.querySelectorAll('.lvl2_' + gcId);
        let isClosing = false;
        subs.forEach(el => {
            if (el.style.display === 'none') {
                el.style.display = 'table-row';
            } else {
                el.style.display = 'none';
                isClosing = true;
            }
        });
        if (isClosing) {
            document.querySelectorAll('.lvl3_of_' + gcId).forEach(el => el.style.display = 'none');
        }
    }

    function toggleSvodShop(safeShopId) {
        let els = document.querySelectorAll('.svod_' + safeShopId);
        let isOpening = false;
        els.forEach(el => {
            if (el.style.display === 'none' || el.style.display === '') {
                el.style.display = 'table-row';
                isOpening = true;
            } else {
                el.style.display = 'none';
            }
        });
        if (isOpening) openSvodShops.add(safeShopId);
        else openSvodShops.delete(safeShopId);
    }

    async function triggerPcBuild(cmd) {
        if (!confirm(`Отправить команду ${cmd} на ПК?`)) return;
        try {
            await fetch(`${FB_URL}/bot_control/pc_command.json`, {
                method: 'PUT',
                body: JSON.stringify({ command: cmd, timestamp: Date.now() })
            });
            alert(`✅ Команда ${cmd} успешно отправлена боту-снайперу!`);
        } catch (e) {
            alert(`❌ Ошибка: ` + e.message);
        }
    }

    // ==========================================
    // АВТОУДАЛЕНИЕ ИЗ СТОП-ЛИСТА
    // ==========================================
    async function autoRemoveFromStoplist(shop, itemNamesArray) {
        if (!itemNamesArray || itemNamesArray.length === 0) return;
        try {
            let snap = await fetch(`${FB_URL}/orders.json`).then(r => r.json());
            if (!snap) return;
            let shopOrders = [];
            for (let k in snap) {
                let val = snap[k];
                if (val && val.shop === shop && val.mode === 'stoplist_fill') {
                    val.key = k;
                    shopOrders.push(val);
                }
            }
            if (shopOrders.length === 0) return;
            shopOrders.sort((a,b) => b.timestamp - a.timestamp);
            let latestStoplist = shopOrders[0];
            
            if (!latestStoplist.items) return;
            let itemsArr = Array.isArray(latestStoplist.items) ? latestStoplist.items : Object.values(latestStoplist.items);
            let namesToRemove = itemNamesArray.map(n => String(n).trim().toLowerCase());
            let newItems = itemsArr.filter(i => {
                if (!i || !i.name) return false;
                let iName = String(i.name).trim().toLowerCase();
                return !namesToRemove.includes(iName);
            });
            
            if (newItems.length !== itemsArr.length) {
                if (newItems.length === 0) {
                    await fetch(`${FB_URL}/orders/${latestStoplist.key}/items.json`, {
                        method: 'PUT', 
                        body: JSON.stringify([{name: "Всё в наличии", qty: "В наличии"}])
                    });
                } else {
                    await fetch(`${FB_URL}/orders/${latestStoplist.key}/items.json`, {
                        method: 'PUT', 
                        body: JSON.stringify(newItems)
                    });
                }
            }
        } catch(e) {
            console.error("Auto stoplist update failed:", e);
        }
    }

    // ==========================================
    // ГЛАВНЫЙ ЗАГРУЗЧИК
    // ==========================================
    async function loadTab(type, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        
        currentTabType = type;
        const box = document.getElementById('content');
        box.innerHTML = "<div style='text-align:center; padding:40px; font-weight:bold; font-size:22px; color:#7E57C2;'>⌛ Синхронизация данных из Firebase...</div>";

        try {
            let [resCat, resNewCat] = await Promise.all([
                fetch(`${FB_URL}/catalogs/order.json`),
                fetch(`${FB_URL}/catalogs/newshop.json`)
            ]);
            let catOrd = await resCat.json() || {};
            let catNew = await resNewCat.json() || {};
            cachedData.catalogOrder = { ...catOrd, ...catNew };
            cachedData.catalog = cachedData.catalogOrder;

            if (type === 'orders') {
                isSvodEditMode = false;
                svodDeletions = [];
                tempSvodQty = {};
                tempSvodStatus = {};
                openSvodShops.clear();
                
                let resOrders = await fetch(`${FB_URL}/orders.json`);
                let ordersObj = await resOrders.json() || {};
                Object.keys(ordersObj).forEach(k => { if (ordersObj[k]) ordersObj[k].key = k; });
                cachedData.orders = ordersObj;
                renderOrdersSvod();
            }
            else if (type === 'marketplace') {
                isMpEditMode = false;
                mpDeletions.clear();
                let res = await fetch(`${FB_URL}/marketplace_records.json`);
                cachedData.marketplace = await res.json() || {};
                renderMarketplaceTab();
            }
            else if (type === 'missing') {
                isMissingEditMode = false;
                missingDeletions.clear();
                tempMissingStatus = {};
                let resMiss = await fetch(`${FB_URL}/missing_items.json`);
                cachedData.missing = await resMiss.json() || {};
                renderMissing();
            }
            else if (type === 'stoplists') {
                let resOrders = await fetch(`${FB_URL}/orders.json`);
                cachedData.orders = await resOrders.json() || {};
                renderStoplists();
            }
            else if (type === 'checks_table') {
                isChecklistEditMode = false; 
                let [resCheck, resOrders] = await Promise.all([
                    fetch(`${FB_URL}/catalogs/checklist.json`), 
                    fetch(`${FB_URL}/orders.json`)
                ]);
                cachedData.catalog = await resCheck.json() || {};
                let ordersObj = await resOrders.json() || {};
                Object.keys(ordersObj).forEach(k => { if (ordersObj[k]) ordersObj[k].key = k; });
                cachedData.orders = ordersObj;
                renderChecksTable();
            }
            else if (type === 'catalog_order') {
                isNewShopCatalog = false;
                currentPath = "catalogs/order";
                let [res, setRes] = await Promise.all([
                    fetch(`${FB_URL}/${currentPath}.json`),
                    fetch(`${FB_URL}/settings.json`)
                ]);
                currentCatalog = await res.json() || {};
                appSettings = await setRes.json() || { hidden_categories: {}, new_shop_order_active: false };
                if (!appSettings.hidden_categories) appSettings.hidden_categories = {};
                renderCatalogOrder();
            } 
            else if (type === 'catalog_checklist') {
                currentPath = "catalogs/checklist";
                let res = await fetch(`${FB_URL}/${currentPath}.json`);
                currentCatalog = await res.json() || {};
                renderCatalogChecklist();
            }
            else if (type === 'catalog_stoplist') {
                currentPath = "catalogs/stoplist";
                let res = await fetch(`${FB_URL}/${currentPath}.json`);
                currentCatalog = await res.json() || {};
                renderCatalogStoplist();
            }
            else if (type === 'stats') {
                let resOrders = await fetch(`${FB_URL}/orders.json`);
                cachedData.orders = await resOrders.json() || {};
                renderStats();
            }
        } catch (e) {
            box.innerHTML = `<div style="color:red; font-weight:bold; font-size:18px;">Ошибка загрузки: ${e.message}</div>`;
        }
    }

    // ==========================================
    // 1. ВКЛАДКА: СВОД И ЗАКАЗЫ (ORDERS)
    // ==========================================
    function toggleSvodDate(safeDate) {
        let subs = document.querySelectorAll('.svodlvl2_' + safeDate);
        let isClosing = false;
        subs.forEach(el => {
            if (el.style.display === 'none' || el.style.display === '') {
                el.style.display = 'table-row';
            } else {
                el.style.display = 'none';
                isClosing = true;
            }
        });
        if (isClosing) {
            document.querySelectorAll('.svodlvl3_of_' + safeDate).forEach(el => el.style.display = 'none');
        }
    }

    function toggleSvodShopItems(safeShopDate) {
        document.querySelectorAll('.svoditem_' + safeShopDate).forEach(el => {
            el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'table-row' : 'none';
        });
    }

    function toggleSvodEdit() { 
        isSvodEditMode = true; 
        svodDeletions = []; 
        tempSvodQty = {}; 
        tempSvodStatus = {}; 
        renderOrdersSvod(); 
    }

    function preserveSvodInputs() {
        document.querySelectorAll('.edit-svod-input').forEach(inp => {
            let d = inp.getAttribute('data-date');
            let s = inp.getAttribute('data-shop');
            let n = inp.getAttribute('data-item');
            if (!tempSvodQty[d]) tempSvodQty[d] = {};
            if (!tempSvodQty[d][s]) tempSvodQty[d][s] = {};
            tempSvodQty[d][s][n] = parseFloat(inp.value) || 0;
        });
    }

    function markSvodStatusChange(dateKey, shop, name, currentStatus) {
        preserveSvodInputs();
        if (!tempSvodStatus[dateKey]) tempSvodStatus[dateKey] = {};
        if (!tempSvodStatus[dateKey][shop]) tempSvodStatus[dateKey][shop] = {};
        
        let newStatus = 'ordered'; 
        if (currentStatus === 'pending') newStatus = 'ordered';
        else if (currentStatus === 'ordered') newStatus = 'error';
        else if (currentStatus === 'error') newStatus = 'pending';

        tempSvodStatus[dateKey][shop][name] = newStatus;
        renderOrdersSvod(); 
    }

    function markSvodDelete(btn, dateStr, shop, name) {
        preserveSvodInputs(); 
        svodDeletions.push({date: dateStr, shop: shop, name: name});
        renderOrdersSvod(); 
    }

    async function renderOrdersSvod() {
        const box = document.getElementById('content');
        
        // Подгружаем недовозы для проверки
        let resMiss = await fetch(`${FB_URL}/missing_items.json`);
        let missingData = await resMiss.json() || {};
        let activeMissing = {};
        Object.values(missingData).forEach(m => {
            if (m && m.status !== 'arrived' && m.status !== 'canceled') {
                if (!activeMissing[m.shop]) activeMissing[m.shop] = {};
                activeMissing[m.shop][m.name] = m.status; 
            }
        });

        let todaysOrders = []; 
        let historyOrdersList = [];
        let allOrders = Object.values(cachedData.orders).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
        let lastOrderItems = {}; 
        let cutoffMonth = Date.now() - (30 * 24 * 60 * 60 * 1000); 

        allOrders.forEach(o => {
            if (o && (o.mode === 'order' || o.mode === 'new_shop')) {
                if (!o.ordered) {
                    todaysOrders.push(o);
                } else {
                    if ((o.timestamp || 0) >= cutoffMonth) historyOrdersList.push(o);
                    if (!lastOrderItems[o.shop]) {
                        lastOrderItems[o.shop] = new Set();
                        let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                        itemsArr.forEach(i => { if(i && i.name) lastOrderItems[o.shop].add(i.name); });
                    }
                }
            }
        });

        // === ОЧИСТКА "НЕТ ЗАКАЗА" ===
        let keysToDelete = []; 
        let shopHasRealOrder = {};
        todaysOrders.forEach(o => {
            let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
            if (itemsArr.some(i => i && i.name && i.name !== "НЕТ ЗАКАЗА")) {
                shopHasRealOrder[o.shop] = true;
            }
        });

        todaysOrders = todaysOrders.filter(o => {
            let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
            let isNone = itemsArr.length === 1 && itemsArr[0].name === "НЕТ ЗАКАЗА";
            if (isNone && shopHasRealOrder[o.shop]) {
                keysToDelete.push(o.key);
                return false;
            }
            if (itemsArr.length === 0) {
                keysToDelete.push(o.key);
                return false;
            }
            return true;
        });

        if (keysToDelete.length > 0) {
            keysToDelete.forEach(k => { 
                fetch(`${FB_URL}/orders/${k}.json`, { method: 'DELETE' }).catch(e=>{}); 
                delete cachedData.orders[k]; 
            });
        }

        // Группировка
        let svodDataByDate = {}; 
        todaysOrders.forEach(o => {
            let d = new Date(o.timestamp); 
            let dateKey = d.toLocaleDateString('ru-RU');
            if (!svodDataByDate[dateKey]) svodDataByDate[dateKey] = {};
            if (!svodDataByDate[dateKey][o.shop]) {
                svodDataByDate[dateKey][o.shop] = { items: {}, comments: [], all_svod: true, no_order: false };
            }
            
            let sd = svodDataByDate[dateKey][o.shop];
            if (o.comment && o.comment.trim() !== "") sd.comments.push(o.comment);
            if (!o.svod) sd.all_svod = false;

            let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
            itemsArr.forEach(i => {
                if (i && i.name) {
                    if (i.name === "НЕТ ЗАКАЗА") { 
                        sd.no_order = true; 
                        return; 
                    }
                    if (!sd.items[i.name]) {
                        sd.items[i.name] = { qty: 0, bot_error: false, status: 'pending' };
                    }
                    sd.items[i.name].qty += parseFloat(i.qty) || 0;
                    if (o.svod) {
                        if (i.bot_error || i.not_found || i.error || i.status === 'error') { 
                            sd.items[i.name].bot_error = true; 
                            sd.items[i.name].status = 'error'; 
                        } else if (i.status === 'ordered') {
                            sd.items[i.name].status = 'ordered';
                        }
                    }
                }
            });
        });

        // ДВОЙНОЙ ПРОХОД: Сначала считаем общую Ленту для кофейни
        let shopLentaSums = {};
        Object.keys(svodDataByDate).forEach(dateStr => {
            Object.keys(svodDataByDate[dateStr]).forEach(shop => {
                if (!shopLentaSums[shop]) shopLentaSums[shop] = 0;
                let itemsObj = svodDataByDate[dateStr][shop].items;
                Object.keys(itemsObj).forEach(name => {
                    let catItem = Object.values(cachedData.catalogOrder).find(c => c && c.name === name) || {};
                    let vendor = (catItem.vendor || 'Лента').toLowerCase();
                    let price = parseFloat(catItem.price) || 0;

    async function buildSvodReport() {
      showReportOverlay("Сборка закупки (Выполняю команду)...");
      try {
          const [ordersSnap, catalogSnap, missingSnap] = await Promise.all([
             database.ref("orders").once("value"), 
             database.ref("catalogs/order").once("value"), 
             database.ref("missing_items").once("value")
          ]);
          
          let catalog = catalogSnap.val() || {}; 
          let orders = ordersSnap.val() || {}; 
          let missingData = missingSnap.val() || {};
          
          let updates = {}; 
          let totalSvod = 0; 
          let totalLentaAll = 0; 
          let totalOzonAll = 0; 
          let totalKuperAll = 0;

          // 1. Вычисляем активные недовозы
          let activeMissing = {};
          Object.values(missingData).forEach(m => {
              if (m && m.status !== 'arrived' && m.status !== 'canceled') {
                  if (!activeMissing[m.shop]) activeMissing[m.shop] = {};
                  activeMissing[m.shop][m.name] = m.status;
              }
          });

          // 2. Вычисляем только последний заказ
          let allOrdersArr = Object.values(orders).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
          let lastOrderItems = {};
          allOrdersArr.forEach(o => {
              if (o && (o.mode === 'order' || o.mode === 'new_shop') && o.ordered) {
                  if (!lastOrderItems[o.shop]) {
                      lastOrderItems[o.shop] = new Set();
                      let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                      itemsArr.forEach(i => { if(i && i.name) lastOrderItems[o.shop].add(i.name); });
                  }
              }
          });

          // 3. Вычисляем общую сумму Ленты для Купера
          let shopLentaSums = {};
          Object.keys(orders).forEach(k => {
              let o = orders[k];
              if (o && (o.mode === 'order' || o.mode === 'new_shop') && o.svod === false) {
                  if(!shopLentaSums[o.shop]) shopLentaSums[o.shop] = 0;
                  let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                  itemsArr.forEach(i => {
                      if(i && i.name && i.name !== "НЕТ ЗАКАЗА") {
                          let catItem = Object.values(catalog).find(cat => cat && cat.name === i.name) || {};
                          let vendor = (catItem.vendor || 'Лента').toLowerCase();
                          let missingStat = activeMissing[o.shop] ? activeMissing[o.shop][i.name] : null;
                          let inTransit = missingStat === 'transit';
                          let isRepeat = (lastOrderItems[o.shop] && lastOrderItems[o.shop].has(i.name)) || missingStat === 'pending';
                          let isOzon = vendor.includes('озон') || vendor.includes('ozon');
                          
                          if (!inTransit && !(isOzon && isRepeat) && (vendor === 'лента' || vendor === 'lenta')) {
                              shopLentaSums[o.shop] += (parseFloat(i.qty) * (parseFloat(catItem.price)||0));
                          }
                      }
                  });
              }
          });

          // 4. Формируем обновление
          Object.keys(orders).forEach(k => {
              let o = orders[k];
              if (o && (o.mode === 'order' || o.mode === 'new_shop') && o.svod === false) {
                  updates[k + "/svod"] = true; 
                  let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                  let changed = false;

                  itemsArr.forEach(i => {
                      if(i && i.name && i.name !== "НЕТ ЗАКАЗА") {
                          let catItem = Object.values(catalog).find(cat => cat && cat.name === i.name) || {};
                          let vendor = (catItem.vendor || 'Лента').toLowerCase();
                          let price = parseFloat(catItem.price) || 0;
                          
                          let missingStat = activeMissing[o.shop] ? activeMissing[o.shop][i.name] : null;
                          let inTransit = missingStat === 'transit';
                          let isRepeat = (lastOrderItems[o.shop] && lastOrderItems[o.shop].has(i.name)) || missingStat === 'pending';
                          let isOzon = vendor.includes('озон') || vendor.includes('ozon');

                          if (inTransit || (isOzon && isRepeat)) {
                              i.status = 'error'; 
                              i.bot_error = true; 
                              changed = true;
                          } else {
                              let cost = price * parseFloat(i.qty);
                              totalSvod += cost;
                              
                              if (vendor === 'лента' || vendor === 'lenta') {
                                  if (shopLentaSums[o.shop] < 2000) totalKuperAll += cost;
                                  else totalLentaAll += cost;
                              } else if (isOzon) {
                                  totalOzonAll += cost;
                              } else {
                                  totalKuperAll += cost;
                              }
                          }
                      }
                  });
                  if (changed) updates[k + "/items"] = itemsArr;
              }
          });

          if (Object.keys(updates).length > 0) {
              await database.ref("orders").update(updates);
          }

          let html = `<div class="report-card"><div class="report-card-title">Сводная закупка</div>`;
          if (Object.keys(updates).length === 0) {
              html += `<div style="padding:10px 0; text-align:center; font-weight:900;">Нет новых заказов.</div>`;
          } else {
              html += `<div style="padding:10px 0; font-size:15px; color:#555; margin-bottom:10px; font-weight:700;">✅ Команда выполнена. Заказы переведены в статус "Приемка".</div>`;
              html += `<div style="text-align:right; font-size:22px; color:#4caf50; margin-top:20px; font-weight:900;">ИТОГО: ${totalSvod} ₽</div>`;
              
              let textToBot = `📊 **СВОД ГОТОВ К СБОРКЕ!**\n\n🛒 Лента: **${totalLentaAll} ₽**\n📦 Озон: **${totalOzonAll} ₽**\n🛵 Купер: **${totalKuperAll} ₽**\n➖➖➖➖➖➖➖➖\n💵 ИТОГО: **${totalSvod} ₽**`;
              database.ref("bot_control/notifications").push({ type: "svod_ready_text", text: textToBot, timestamp: Date.now() });
          }
          html += `</div>`;
          document.getElementById('report-content-area').innerHTML = html;
      } catch (e) { 
          document.getElementById('report-content-area').innerHTML = `<div class="report-card"><div style="color:red;">Ошибка формирования свода.</div></div>`; 
      }
    }

    async function saveSvodEdits() {
        let btn = document.querySelector('.btn-add'); 
        btn.innerHTML = "⌛ СОХРАНЕНИЕ...";
        preserveSvodInputs(); 
        
        try {
            let hasChanges = false; 
            let promises = [];
            
            for (let k in cachedData.orders) {
                let o = cachedData.orders[k];
                if (o && (o.mode === 'order' || o.mode === 'new_shop') && !o.ordered) {
                    let dKey = new Date(o.timestamp).toLocaleDateString('ru-RU');
                    let needsUpdate = false;
                    let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                    let newItemsArr = [];
                    
                    for (let i = 0; i < itemsArr.length; i++) {
                        let itm = itemsArr[i]; 
                        if (!itm || !itm.name) continue;
                        
                        let isDeleted = svodDeletions.some(d => d.date === dKey && d.shop === o.shop && d.name === itm.name);
                        if (isDeleted) { 
                            needsUpdate = true; 
                            continue; 
                        }
                        
                        let updatedQty = (tempSvodQty[dKey] && tempSvodQty[dKey][o.shop] && tempSvodQty[dKey][o.shop][itm.name] !== undefined) ? tempSvodQty[dKey][o.shop][itm.name] : undefined;
                        let updatedStatus = (tempSvodStatus[dKey] && tempSvodStatus[dKey][o.shop] && tempSvodStatus[dKey][o.shop][itm.name] !== undefined) ? tempSvodStatus[dKey][o.shop][itm.name] : undefined;
                        
                        if (updatedStatus !== undefined && itm.status !== updatedStatus) {
                            needsUpdate = true;
                            if (updatedStatus === 'error' && itm.status !== 'error') {
                                let newMissing = { 
                                    shop: o.shop, 
                                    name: itm.name, 
                                    qty: updatedQty !== undefined ? updatedQty : itm.qty, 
                                    status: 'canceled', 
                                    timestamp: Date.now() 
                                };
                                promises.push(fetch(`${FB_URL}/missing_items.json`, { method: 'POST', body: JSON.stringify(newMissing) }));
                            }
                            itm.status = updatedStatus; 
                            itm.bot_error = (updatedStatus === 'error'); 
                            itm.not_found = (updatedStatus === 'error'); 
                            itm.error = (updatedStatus === 'error');
                        }
                        if (updatedQty !== undefined && String(updatedQty) !== String(itm.qty)) { 
                            needsUpdate = true; 
                            itm.qty = updatedQty; 
                        }
                        newItemsArr.push(itm);
                    }
                    
                    if (needsUpdate) {
                        hasChanges = true;
                        if (newItemsArr.length === 0) newItemsArr = [{name: "НЕТ ЗАКАЗА", qty: 0}];
                        promises.push(fetch(`${FB_URL}/orders/${k}/items.json`, {method:'PUT', body: JSON.stringify(newItemsArr)}));
                    }
                }
            }
            await Promise.all(promises);
            alert("✅ Изменения успешно сохранены!");
            isSvodEditMode = false; 
            svodDeletions = []; 
            tempSvodQty = {}; 
            tempSvodStatus = {};
            loadTab('orders', document.querySelector('.tab-btn.active'));
        } catch (e) { 
            alert("❌ Ошибка при сохранении: " + e.message); 
            btn.innerHTML = "💾 СОХРАНИТЬ ИЗМЕНЕНИЯ"; 
        }
    }

    async function markOrdersAsPlaced() {
        if(!confirm("Все заказы оформлены? Свод будет очищен, а заказы перенесены в историю.")) return;
        let updates = {};
        Object.values(cachedData.orders).forEach(o => {
            if (o && (o.mode === 'order' || o.mode === 'new_shop')) {
                if (!o.ordered) {
                    updates[o.key + "/ordered"] = true; 
                    updates[o.key + "/svod"] = true; 
                    if (o.items) {
                        let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items);
                        let changed = false;
                        itemsArr.forEach(i => { 
                            if (i && i.name !== "НЕТ ЗАКАЗА" && (!i.status || i.status === 'pending')) { 
                                i.status = 'ordered'; 
                                changed = true; 
                            } 
                        });
                        if (changed) updates[o.key + "/items"] = itemsArr;
                    }
                }
            }
        });
        if (Object.keys(updates).length > 0) {
            try {
                await fetch(`${FB_URL}/orders.json`, { method: 'PATCH', body: JSON.stringify(updates) });
                alert("✅ Свод успешно очищен и перенесен в историю!");
                loadTab('orders', document.querySelector('.tab-btn.active'));
            } catch(e) { 
                alert("❌ Ошибка: " + e.message); 
            }
        } else { 
            alert("Нет активных заказов для оформления."); 
        }
    }

            document.querySelectorAll('input[id^="mp_inp_"]').forEach(inp => {
                let key = inp.id.replace("mp_inp_", "");

                        promises.push(fetch(`${FB_URL}/marketplace_records/${key}.json`, { method: 'PATCH', body: JSON.stringify({amount: val}) }));

                    let iNameLow = String(i.name).trim().toLowerCase();

                    let inOrderCat = Object.values(orderCatalog).find(c => c && c.name && String(c.name).trim().toLowerCase() === iNameLow);

                    if (isSyrup) {
                        allSyrups.push(`▪️ ${i.name} ${statHtml}`);

                        otherItems.push(`
                        <div style="padding:10px 0; border-bottom:1px dashed #eee; font-size:17px; display:flex; flex-direction:column; justify-content:center;">
                            <div style="display:flex; justify-content:space-between; align-items:center; width:100%;"><b style="color:#333;">${i.name}</b> ${linkBtn}</div>
                            ${subText}

                });
                
                html += otherItems.join("");

                if (allSyrups.length > 0) {

                                <div style="color:#333; margin-top:5px; font-weight:900; font-size:16px; line-height: 1.6;">${allSyrups.join("<br>")}</div>

                }
                
                if (!foundItems || itemsArr[0].name === "Всё в наличии") {
                    html += `<div style="color:#4caf50; font-weight:bold; font-size:17px; padding:10px 0;">Стоп-лист пуст (всё в наличии)</div>`;
                }
            } else { 
                html += `<div style="color:#888; font-size:17px; padding:10px 0; font-weight:bold;">Нет данных о стоп-листе</div>`; 
            }
            html += `</div>`;

        html += `</div>`;
        box.innerHTML = html;

    function renderChecksTable() {
        const box = document.getElementById('content');

        html += `<table style="min-width:1200px;"><tr><th style="width:250px;">Товар</th>`;

            let displayName = s === 'Красноказарменная' ? 'МЭИ' : s;
            html += `<th style="text-align:center; font-size:15px;">${displayName}<br><span style="font-size:13px; color:#888; font-weight:normal;">${dateStr}</span></th>`;
        });
        html += `<th style="width:250px; text-align:right;">Товар</th></tr>`;
        
        sortedCats.forEach(cat => {
            let safeCat = getSafeId(cat);
            html += `<tr class="cat-group-header" onclick="toggleElements('chk_${safeCat}')">
                        <td colspan="${shops.length+2}" style="padding:15px; font-size:18px;">📂 ${cat} <span style="float:right; opacity:0.5;">▼</span></td>
                     </tr>`;
            
            groupedCat[cat].sort((a,b) => a.localeCompare(b)).forEach(itemName => {
                html += `<tr class="chk-row chk_${safeCat}" style="display:none; background-color:#fff;"><td style="font-size:16px;"><b>${itemName}</b></td>`;
                shops.forEach(s => {
                    let val = "-"; 
                    let orderKey = latestChecklists[s] ? latestChecklists[s].key : "";
                    if (latestChecklists[s] && latestChecklists[s].items) {
                        let itemsArr = Array.isArray(latestChecklists[s].items) ? latestChecklists[s].items : Object.values(latestChecklists[s].items);
                        let found = itemsArr.find(i => i && i.name === itemName);
                        if (found && found.qty !== undefined && found.qty !== null && String(found.qty).trim() !== "") { 
                            val = String(found.qty); 
                        }
                    }
                    
                    if (isChecklistEditMode) {
                        if (orderKey) {
                            html += `<td><input type="text" class="edit-chk-input" data-order="${orderKey}" data-item="${itemName.replace(/"/g, '&quot;')}" value="${val}"></td>`;

                    }
                });
                html += `<td style="font-size:16px; text-align:right;"><b>${itemName}</b></td></tr>`;
            });
        });
        box.innerHTML = html + "</table>";

    async function saveChecklistEdits() {
        let btn = document.querySelector('.btn-add'); 
        btn.innerHTML = "⌛ СОХРАНЕНИЕ...";
        let inputs = document.querySelectorAll('.edit-chk-input');
        let updates = {};
        
        inputs.forEach(input => {
            let oKey = input.getAttribute('data-order'); 
            let item = input.getAttribute('data-item'); 
            let val = input.value.trim();
            if(!updates[oKey]) updates[oKey] = {}; 
            updates[oKey][item] = val;
        });
        
        try {
            for(let oKey in updates) {
                let order = cachedData.orders[oKey]; 
                if(!order) continue;
                let itemsArr = Array.isArray(order.items) ? order.items : Object.values(order.items||{});
                for(let item in updates[oKey]) {
                    let found = itemsArr.find(i => i && i.name === item);
                    if(found) { 
                        found.qty = updates[oKey][item]; 
                    } else { 
                        itemsArr.push({name: item, qty: updates[oKey][item], cat: "Прочее"}); 
                    }
                }
                await fetch(`${FB_URL}/orders/${oKey}/items.json`, {method:'PUT', body: JSON.stringify(itemsArr)});
            }
            alert("✅ Изменения в чек-листе успешно сохранены в базе!");
            isChecklistEditMode = false;
            loadTab('checks_table', document.querySelector('.tab-btn.active'));
        } catch(e) { 
            alert("❌ Ошибка сохранения: " + e.message); 
            btn.innerHTML = "💾 СОХРАНИТЬ ИЗМЕНЕНИЯ"; 
        }
    }

    // ==========================================
    // 6. РЕНДЕР: СТАТИСТИКА
    // ==========================================
    function renderStats() {
        const box = document.getElementById('content');
        let shops = ["Бояринова", "Гагарина", "Вертолетчиков", "Липчанского", "Новокосино", "Новокосино 2", "Старое Павлино", "Красноказарменная", "Ухтомского ополчения"];
        let stats = {};
        shops.forEach(s => { stats[s] = { emptyCount: {}, orderSum: {}, orderCount: {} }; });

        Object.values(cachedData.orders).forEach(o => {
            if (!o || !stats[o.shop] || !o.items) return;
            let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items);
            if (o.mode === 'checklist') {
                itemsArr.forEach(i => {
                    let val = String(i.qty).trim();
                    if (val === "0" || val === "Закончилось" || val === "Меньше половины") {
                        stats[o.shop].emptyCount[i.name] = (stats[o.shop].emptyCount[i.name] || 0) + 1;
                    }
                });
            } else if (o.mode === 'order') {
                itemsArr.forEach(i => {
                    if (i.name === "НЕТ ЗАКАЗА") return;
                    stats[o.shop].orderSum[i.name] = (stats[o.shop].orderSum[i.name] || 0) + parseFloat(i.qty || 0);
                    stats[o.shop].orderCount[i.name] = (stats[o.shop].orderCount[i.name] || 0) + 1;
                });
            }
        });

        let html = `<h3 style="color:#1a237e; font-size:24px; margin-bottom:20px;">📈 Статистика (за всё время)</h3><div style="display:flex; flex-wrap:wrap; gap:20px;">`;
        shops.forEach(s => {
            let displayName = s === 'Красноказарменная' ? 'МЭИ' : s;
            html += `<div class="card" style="flex: 1 1 calc(33% - 20px); min-width:320px; padding:25px; background:#fff; border-radius:16px; box-shadow:0 4px 15px rgba(0,0,0,0.05);">
                        <h4 style="margin-top:0; color:#311b92; font-size:20px; border-bottom:2px solid #eee; padding-bottom:10px; font-weight:900;">${displayName}</h4>`;
            
            let empties = Object.entries(stats[s].emptyCount).sort((a,b) => b[1] - a[1]).slice(0, 5);
            html += `<b style="color:#D50000; font-size:16px;">🛑 Часто заканчивается (Чек-лист):</b><ul style="margin-top:5px; padding-left:20px; font-size:15px; color:#555; font-weight:bold;">`;
            if (empties.length > 0) {
                empties.forEach(e => html += `<li>${e[0]} <span style="color:#D50000;">(${e[1]} раз)</span></li>`);
            } else { html += `<li>Нет данных</li>`; }
            html += `</ul>`;

            let averages = Object.entries(stats[s].orderSum).map(e => {
                let avg = (e[1] / stats[s].orderCount[e[0]]).toFixed(1);
                return [e[0], avg];
            }).sort((a,b) => b[1] - a[1]).slice(0, 5);
            html += `<b style="color:#2e7d32; font-size:16px; margin-top:15px; display:inline-block;">📦 Средний заказ (Топ-5 закупка):</b><ul style="margin-top:5px; padding-left:20px; font-size:15px; color:#555; font-weight:bold;">`;
            if (averages.length > 0) {
                averages.forEach(a => html += `<li>${a[0]}: <span style="color:#2e7d32;">~${a[1]} шт</span></li>`);
            } else { html += `<li>Нет данных</li>`; }
            html += `</ul></div>`;
        });
        html += `</div>`;
        box.innerHTML = html;
    }

        </div>
        <div style="margin-bottom: 20px; display: flex; gap: 10px;">
            <button class="tab-btn ${!isNewShopCatalog ? 'active' : ''}" style="padding: 10px 20px; font-size: 15px;" onclick="switchOrderCatalog(false)">📦 Обычная закупка</button>
            <button class="tab-btn ${isNewShopCatalog ? 'active' : ''}" style="padding: 10px 20px; font-size: 15px;" onclick="switchOrderCatalog(true)">🏗 На новую кофейню</button>
        </div>
        <div class="settings-panel">
            <h4 style="margin-top:0; font-size:19px; color:#d32f2f; cursor:pointer; display:flex; justify-content:space-between; align-items:center;" onclick="toggleElements('settings-content-div')">
                <span>⚙️ Настройки (Скрывать глобальные категории в приложении)</span><span id="arrow_settings-content-div">▼</span>
            </h4>
            <div class="settings-content-div" style="display:none; flex-wrap:wrap; gap:20px; margin-top:15px;">
                <label class="toggle-label" style="color:#2e7d32;"><input type="checkbox" onchange="toggleSetting('new_shop_order_active', this.checked)" ${appSettings.new_shop_order_active ? 'checked' : ''}> Показывать кнопку "Закупка на новую кофейню"</label>`;
        
        globalCats.forEach(gc => {
            if(gc.includes("!!!")) return; 
            html += `<label class="toggle-label"><input type="checkbox" onchange="toggleHiddenCategory('${gc}', this.checked)" ${appSettings.hidden_categories[gc] ? 'checked' : ''}> Скрыть "${gc}"</label>`;
        });
        
        html += `</div></div><table style="min-width:1400px;"><tr><th style="width:160px;">Глоб. Категория</th><th style="width:160px;">Подкатегория</th><th style="width:200px;">Наименование</th><th style="width:100px;">Поставщик</th><th style="width:80px;">Цена 1 (₽)</th><th>Ссылка 1</th><th style="width:80px;">Цена 2 (₽)</th><th>Ссылка 2</th><th style="width:60px; text-align:center;">Удалить</th></tr>`;

        let grouped = {};
        Object.keys(currentCatalog).forEach(k => {
            let item = currentCatalog[k]; let gc = item.globalCat || "Основное меню"; let sc = item.cat || "Прочее";
            if (!grouped[gc]) grouped[gc] = {}; if (!grouped[gc][sc]) grouped[gc][sc] = [];
            grouped[gc][sc].push({k: k, item: item});
        });
        
        Object.keys(grouped).sort((a,b) => { if(a.includes("!!!")) return -1; if(b.includes("!!!")) return 1; return a.localeCompare(b); }).forEach(gc => {
            let safeGc = getSafeId(gc); let displayGc = gc.replace("!!! НОВОЕ", "Новая добавленная позиция");
            html += `<tr class="cat-group-header" onclick="toggleLvl1('${safeGc}')">
                        <td colspan="9" style="padding:18px; background:#d1c4e9; font-size:20px;">🌍 <b>${displayGc}</b> <span style="float:right;">▼</span></td>
                     </tr>`;
            
            Object.keys(grouped[gc]).sort((a,b) => { if(a.includes("!!!")) return -1; if(b.includes("!!!")) return 1; return a.localeCompare(b); }).forEach(sc => {
                let safeSc = getSafeId(gc + "_" + sc); let displaySc = sc.replace("!!! НОВОЕ", "Заполните данные"); let displayStyle = gc.includes("!!!") ? "table-row" : "none";
                html += `<tr class="cat-group-header lvl2_${safeGc}" style="display:${displayStyle};" onclick="toggleElements('lvl3_${safeSc}')">
                            <td colspan="9" style="padding:15px; padding-left:30px; font-size:18px;">📂 ${displaySc} <span id="arrow_lvl3_${safeSc}" style="float:right;">▼</span></td>
                         </tr>`;
                
                grouped[gc][sc].sort((a,b) => (a.item.name||'').localeCompare(b.item.name||'')).forEach(data => {
                    let k = data.k; let item = data.item;
                    
                    let gcatOptions = `<option value="${item.globalCat || 'Основное меню'}">${(item.globalCat || 'Основное меню').replace("!!! НОВОЕ", "Выберите...")}</option>`;
                    globalCats.forEach(c => { if(c !== (item.globalCat || 'Основное меню')) gcatOptions += `<option value="${c}">${c}</option>`; });
                    gcatOptions += `<option value="НОВАЯ ГЛОБАЛЬНАЯ">-- Создать --</option>`;
                    
                    let catOptions = `<option value="${item.cat}">${(item.cat || "Прочее").replace("!!! НОВОЕ", "Выберите...")}</option>`;
                    subCats.forEach(c => { if(c !== item.cat) catOptions += `<option value="${c}">${c}</option>`; });
                    catOptions += `<option value="НОВАЯ КАТЕГОРИЯ">-- Создать --</option>`;
                    
                    html += `<tr class="chk-row lvl3_${safeSc} lvl3_of_${safeGc}" style="display:${displayStyle};">
                        <td><select onchange="updateVal('${k}','globalCat',this.value)">${gcatOptions}</select></td>
                        <td><select onchange="updateVal('${k}','cat',this.value)">${catOptions}</select></td>
                        <td><input type="text" style="font-weight:bold; color:#311b92;" value="${item.name || ''}" onchange="updateVal('${k}','name',this.value)"></td>
                        <td><input type="text" placeholder="Лента/Озон" value="${item.vendor || 'Лента'}" onchange="updateVal('${k}','vendor',this.value)"></td>
                        <td><input type="number" value="${item.price || 0}" onchange="updateVal('${k}','price',this.value)"></td>
                        <td><input type="text" placeholder="URL 1" value="${item.link || ''}" onchange="updateVal('${k}','link',this.value)"></td>
                        <td><input type="number" value="${item.price2 || 0}" onchange="updateVal('${k}','price2',this.value)"></td>
                        <td><input type="text" placeholder="URL 2" value="${item.link2 || ''}" onchange="updateVal('${k}','link2',this.value)"></td>
                        <td style="text-align:center;"><button class="btn-del" onclick="deleteItem('${k}')">🗑</button></td>
                    </tr>`;
                });
            });
        });
        box.innerHTML = html + "</table>";
    }

    function renderCatalogChecklist() {
        const box = document.getElementById('content');
        let globalCats = ["Основное меню"];
        Object.values(currentCatalog).forEach(i => { if(i.globalCat && !globalCats.includes(i.globalCat) && !i.globalCat.includes("!!!")) globalCats.push(i.globalCat); });
        let subCats = [...new Set(Object.values(currentCatalog).map(i => i.cat).filter(c => c && !c.includes("!!!")))];
        
        let html = `
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
            <h3 style="margin:0; font-size:24px; color:#4A148C;">Редактор товаров: ЧЕК-ЛИСТ</h3>
            <div style="display:flex; gap:15px;">
                <button class="btn-add" onclick="addItemChecklist()">➕ Добавить позицию</button>
                <button class="btn-save" style="margin:0; width:auto; padding:14px 28px;" onclick="saveCatalog()">💾 СОХРАНИТЬ В БАЗУ</button>
            </div>
        </div>
        <table style="min-width:1100px;">
            <tr><th style="width:200px;">Глоб. Категория</th><th style="width:250px;">Подкатегория</th><th style="width:300px;">Наименование</th><th style="width:200px;">Формат ввода</th><th style="width:80px; text-align:center;">Удалить</th></tr>`;
            
        let grouped = {};
        Object.keys(currentCatalog).forEach(k => {
            let item = currentCatalog[k]; let gc = item.globalCat || "Основное меню"; let sc = item.cat || "Прочее";
            if (!grouped[gc]) grouped[gc] = {}; if (!grouped[gc][sc]) grouped[gc][sc] = [];
            grouped[gc][sc].push({k: k, item: item});
        });
        
        Object.keys(grouped).sort((a,b) => { if(a.includes("!!!")) return -1; if(b.includes("!!!")) return 1; return a.localeCompare(b); }).forEach(gc => {
            let safeGc = getSafeId(gc); let displayGc = gc.replace("!!! НОВОЕ", "Новая добавленная позиция");
            html += `<tr class="cat-group-header" onclick="toggleLvl1('chksub_${safeGc}')"><td colspan="5" style="padding:18px; background:#d1c4e9; font-size:20px;">🌍 <b>${displayGc}</b> <span style="float:right;">▼</span></td></tr>`;
            Object.keys(grouped[gc]).sort((a,b) => { if(a.includes("!!!")) return -1; if(b.includes("!!!")) return 1; return a.localeCompare(b); }).forEach(sc => {
                let safeSc = getSafeId(gc + "_" + sc); let displaySc = sc.replace("!!! НОВОЕ", "Заполните данные"); let displayStyle = gc.includes("!!!") ? "table-row" : "none";
                html += `<tr class="cat-group-header lvl2_chksub_${safeGc}" style="display:${displayStyle};" onclick="toggleElements('chkitem_${safeSc}')"><td colspan="5" style="padding:15px; padding-left:30px; font-size:18px;">📂 ${displaySc} <span id="arrow_chkitem_${safeSc}" style="float:right;">▼</span></td></tr>`;
                
                grouped[gc][sc].sort((a,b) => (a.item.name||'').localeCompare(b.item.name||'')).forEach(data => {
                    let k = data.k; let item = data.item;
                    
                    let gcatOptions = `<option value="${item.globalCat || 'Основное меню'}">${(item.globalCat || 'Основное меню').replace("!!! НОВОЕ", "Выберите...")}</option>`;
                    globalCats.forEach(c => { if(c !== (item.globalCat || 'Основное меню')) gcatOptions += `<option value="${c}">${c}</option>`; });
                    gcatOptions += `<option value="НОВАЯ ГЛОБАЛЬНАЯ">-- Создать --</option>`;
                    
                    let catOptions = `<option value="${item.cat}">${(item.cat || "Прочее").replace("!!! НОВОЕ", "Выберите...")}</option>`;
                    subCats.forEach(c => { if(c !== item.cat) catOptions += `<option value="${c}">${c}</option>`; });
                    catOptions += `<option value="НОВАЯ КАТЕГОРИЯ">-- Создать --</option>`;
                    
                    let isVol = (item.unit && item.unit.toLowerCase().includes("объем"));
                    html += `<tr class="chk-row chkitem_${safeSc} lvl3_of_chksub_${safeGc}" style="display:${displayStyle};">
                        <td><select onchange="updateVal('${k}','globalCat',this.value)">${gcatOptions}</select></td>
                        <td><select onchange="updateVal('${k}','cat',this.value)" style="font-weight:bold; color:#7E57C2;">${catOptions}</select></td>
                        <td><input type="text" style="font-weight:bold; font-size:17px; color:#311b92;" value="${item.name || ''}" onchange="updateVal('${k}','name',this.value)"></td>

    function renderCatalogStoplist() {
        const box = document.getElementById('content');
        let subCats = [...new Set(Object.values(currentCatalog).map(i => i.cat).filter(c => c && !c.includes("!!!")))];
        
        let html = `
        <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
            <h3 style="margin:0; font-size:24px; color:#D50000;">Редактор товаров: СТОП-ЛИСТ</h3>
            <div style="display:flex; gap:15px;">
                <button class="btn-add" style="background: linear-gradient(135deg, #FF5252 0%, #D32F2F 100%);" onclick="addItemStoplist()">➕ Добавить позицию</button>
                <button class="btn-save" style="margin:0; width:auto; padding:14px 28px;" onclick="saveCatalog()">💾 СОХРАНИТЬ В БАЗУ</button>
            </div>
        </div>
        <table style="min-width:1000px;">
            <tr><th style="width:200px;">Категория</th><th style="width:300px;">Продукт / Ингредиент (Из Закупки)</th><th style="width:200px;">Отключает (Сезонное)</th><th style="width:200px;">Отключает (Основное)</th><th style="width:80px; text-align:center;">Удалить</th></tr>`;
            
        let grouped = {};
        Object.keys(currentCatalog).forEach(k => {
            let item = currentCatalog[k]; let sc = item.cat || "Прочее";
            if (!grouped[sc]) grouped[sc] = []; grouped[sc].push({k: k, item: item});
        });
        
        let allPurchaseItems = [];
        if (cachedData.catalogOrder) {
            let names = Object.values(cachedData.catalogOrder).map(i => i.name).filter(Boolean);
            allPurchaseItems = [...new Set(names)].sort((a,b) => a.localeCompare(b));
        }
        let optionsHtml = allPurchaseItems.map(name => `<option value="${name.replace(/"/g, '&quot;')}">${name}</option>`).join("");
        
        Object.keys(grouped).sort((a,b) => { if(a.includes("!!!")) return -1; if(b.includes("!!!")) return 1; return a.localeCompare(b); }).forEach(sc => {
            let safeSc = getSafeId(sc); let displaySc = sc.replace("!!! НОВОЕ", "Новая добавленная позиция"); let displayStyle = sc.includes("!!!") ? "table-row" : "none";
            html += `<tr class="cat-group-header" onclick="toggleElements('stop_${safeSc}')"><td colspan="5" style="padding:15px; background:#d1c4e9; font-size:18px;">📂 <b>${displaySc}</b> <span id="arrow_stop_${safeSc}" style="float:right;">▼</span></td></tr>`;
            
            grouped[sc].sort((a,b) => (a.item.name||'').localeCompare(b.item.name||'')).forEach(data => {
                let k = data.k; let item = data.item;
                
                let catOptions = `<option value="${item.cat}">${(item.cat || "Прочее").replace("!!! НОВОЕ", "Выберите...")}</option>`;
                subCats.forEach(c => { if(c !== item.cat) catOptions += `<option value="${c}">${c}</option>`; });
                catOptions += `<option value="НОВАЯ КАТЕГОРИЯ">-- Создать --</option>`;
                
                html += `<tr class="chk-row stop_${safeSc}" style="display:${displayStyle};">
                    <td><select onchange="updateVal('${k}','cat',this.value)">${catOptions}</select></td>
                    <td><select style="font-weight:bold; color:#311b92;" onchange="updateVal('${k}','name',this.value)"><option value="${item.name || ''}">${item.name || '--- Выберите из закупки ---'}</option>${optionsHtml}</select></td>
                    <td><input type="text" placeholder="Укажите напитки..." value="${item.sez || ''}" onchange="updateVal('${k}','sez',this.value)"></td>
                    <td><input type="text" placeholder="Укажите напитки..." value="${item.main || ''}" onchange="updateVal('${k}','main',this.value)"></td>
                    <td style="text-align:center;"><button class="btn-del" onclick="deleteItem('${k}')">🗑</button></td>
                </tr>`;
            });
        });
        box.innerHTML = html + "</table>";
    }

    function updateVal(id, field, val) { 
        if (val === "НОВАЯ ГЛОБАЛЬНАЯ" || val === "НОВАЯ КАТЕГОРИЯ") {
            let newCat = prompt("Введите название новой категории:");
            if (newCat) {
                currentCatalog[id][field] = newCat;
                if (currentPath.includes('order')) renderCatalogOrder();
                else if (currentPath.includes('stoplist')) renderCatalogStoplist();
                else renderCatalogChecklist();
            } else {
                if (currentPath.includes('order')) renderCatalogOrder();
                else if (currentPath.includes('stoplist')) renderCatalogStoplist();
                else renderCatalogChecklist();
                return;
            }
        } else {
            currentCatalog[id][field] = val; 
        }
    }
    
    function addItemOrder() { 
        let id = "item_" + Date.now(); 
        currentCatalog[id] = { globalCat: "!!! НОВОЕ", cat: "!!! НОВОЕ", name: "Новая позиция", vendor: "Лента", price: 0, price2: 0, link: "", link2: "", fallback: "" }; 
        renderCatalogOrder();
    }
    
    function addItemChecklist() { 
        let id = "item_" + Date.now(); 
        currentCatalog[id] = { globalCat: "!!! НОВОЕ", cat: "!!! НОВОЕ", name: "Новая позиция", unit: "текст" }; 
        renderCatalogChecklist();
    }

    function addItemStoplist() { 
        let id = "stop_" + Date.now(); 
        currentCatalog[id] = { cat: "Новая", name: "", sez: "", main: "" }; 
        renderCatalogStoplist();
    }
    
    async function deleteItem(id) { 
        if(confirm("Вы уверены, что хотите УДАЛИТЬ эту позицию НАВСЕГДА?")) { 
            await fetch(`${FB_URL}/${currentPath}/${id}.json`, { method: 'DELETE' });
            delete currentCatalog[id]; 
            loadTab(currentTabType, document.querySelector('.tab-btn.active'));
        } 
    }

    async function deleteOrder(key) {
        if(confirm("Вы уверены, что хотите УДАЛИТЬ этот заказ навсегда?")) {
            await fetch(`${FB_URL}/orders/${key}.json`, { method: 'DELETE' });
            alert("Заказ удален!");
            loadTab('orders', document.querySelector('.tab-btn.active'));
        }
    }

    async function toggleSetting(key, val) {
        appSettings[key] = val;
        await fetch(`${FB_URL}/settings.json`, { method: 'PUT', body: JSON.stringify(appSettings) });
    }

    async function toggleHiddenCategory(cat, isHidden) {
        appSettings.hidden_categories[cat] = isHidden;
        await fetch(`${FB_URL}/settings/hidden_categories.json`, { method: 'PUT', body: JSON.stringify(appSettings.hidden_categories) });
    }

    async function saveCatalog() {
        const btn = document.querySelector('.btn-save'); 
        btn.innerHTML = "⌛ СОХРАНЕНИЕ...";
        try { 
            await fetch(`${FB_URL}/${currentPath}.json`, { method: 'PUT', body: JSON.stringify(currentCatalog) }); 
            alert("✅ База обновлена и мгновенно доступна сотрудникам!"); 
            loadTab(currentTabType, document.querySelector('.tab-btn.active'));
        } catch(e) { 
            alert("❌ Ошибка при сохранении!"); 
        }
    }

    window.onload = () => loadTab('orders', document.querySelector('.tab-btn'));
</script>
</body>
