    function cleanName(str) {
        if (!str) return "";
        return str.toLowerCase()
            .replace(/ё/g, 'е')
            .replace(/\([^)]*\)/g, '') 
            .replace(/[0-9.,]+\s*(кг|г|мл|л|шт)/g, '') 
            .replace(/(брекет|коробка)/g, '') 
            .replace(/[^a-zа-я0-9]/g, ''); 
    }

        if(isOpen) expandedDivs.add(id); else expandedDivs.delete(id);

    function getSafeId(str) {
        if (!str) return "id_empty_" + Math.floor(Math.random() * 10000);
        let res = "";
        for (let i = 0; i < str.length; i++) res += str.charCodeAt(i).toString(16);
        return "id_" + res;

    function toggleCatElements(cls, arrowId) { 
        let els = document.querySelectorAll('.' + cls);
        if (els.length === 0) return;
        let isOpening = els[0].style.display === 'none';
        if (!cls.includes('action')) updateExpanded(cls, isOpening);
        
        els.forEach(el => {
            if (el.tagName === 'TR') el.style.display = isOpening ? 'table-row' : 'none';
            else if (el.classList.contains('action-container') || el.style.gap) el.style.display = isOpening ? 'flex' : 'none';
            else el.style.display = isOpening ? 'block' : 'none';
        }); 
        if (arrowId) {
            let arrowEl = document.getElementById(arrowId);
            if (arrowEl) arrowEl.innerText = isOpening ? "▲" : "▼";

    // ==========================================
    // МГНОВЕННАЯ ЗАГРУЗКА ФОТО В БАЗУ БЕЗ STORAGE (BASE64)
    // ==========================================
    function uploadPhotoBase64(file, id, field) {
        showReportOverlay("Сжатие и сохранение фото...");
        let reader = new FileReader();
        reader.onload = function(e) {
            let img = new Image();
            img.onload = function() {
                let canvas = document.createElement('canvas');
                let ctx = canvas.getContext('2d');
                let maxW = 400, maxH = 400; // Сжимаем до компактного размера для базы
                let w = img.width, h = img.height;
                if (w > maxW || h > maxH) {
                    let ratio = Math.min(maxW / w, maxH / h);
                    w = w * ratio; h = h * ratio;
                }
                canvas.width = w; canvas.height = h;
                ctx.drawImage(img, 0, 0, w, h);
                let base64 = canvas.toDataURL('image/jpeg', 0.8); // 80% качество
                
                if (currentPath.includes('menu')) updateMenuVal(id, field, base64);
                else updateVal(id, field, base64);
                
                hideReportOverlay();
            };
            img.onerror = function() { hideReportOverlay(); alert("Ошибка при обработке фото"); };
            img.src = e.target.result;
        };
        reader.onerror = function() { hideReportOverlay(); alert("Ошибка чтения файла"); };
        reader.readAsDataURL(file);
    }

    function triggerPhotoUpload(id, field) {
        let input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = e => {
            let file = e.target.files[0];
            if (file) uploadPhotoBase64(file, id, field);
        };
        input.click();
    }

    function handlePhotoPaste(e, id, field) {
        let items = (e.clipboardData || window.clipboardData).items;
        for (let i = 0; i < items.length; i++) {
            if (items[i].kind === 'file' && items[i].type.startsWith('image/')) {
                e.preventDefault(); 
                let blob = items[i].getAsFile();
                uploadPhotoBase64(blob, id, field);
                break; 
            }
        }
    }

        if (!confirm(`Отправить команду ${cmd} на ПК?`)) return;
        try {
            await fetch(`${FB_URL}/bot_control/pc_command.json`, {
                method: 'PUT',

            alert(`✅ Команда ${cmd} успешно отправлена боту-снайперу!`);
        } catch (e) { alert(`❌ Ошибка: ` + e.message); }
    }

    async function sendChecklistPdf() {
        if(!confirm("Сформировать PDF-отчет и отправить админу и боссу в Телеграм?")) return;
        
        showReportOverlay("Формирование PDF... Подождите");
        document.querySelectorAll('.chk-row').forEach(row => { row.style.display = 'table-row'; });

        const element = document.getElementById('checks-table-container');
        const opt = {
            margin:       0.2,
            filename:     'Checklist_Report.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2, useCORS: true, logging: false },
            jsPDF:        { unit: 'in', format: 'a3', orientation: 'landscape' } 
        };

        try {
            const pdfDataUri = await html2pdf().set(opt).from(element).outputPdf('datauristring');
            
            // Указываем ID получателей
            const ADMIN_CHAT_ID = "708179577"; 
            const BOSS_CHAT_ID = ""501871781"; 
            const recipients = [ADMIN_CHAT_ID, BOSS_CHAT_ID];
            
            // Отправляем каждому по очереди
            for (const chatId of recipients) {
                await fetch(`${FB_URL}/bot_control/notifications.json`, {
                    method: 'POST',
                    body: JSON.stringify({ 
                        type: "checklist_pdf", 
                        chat_id: chatId, 
                        file_data: pdfDataUri, 
                        filename: `Отчет_Чеклисты_${new Date().toLocaleDateString('ru-RU')}.pdf`,

            hideReportOverlay();
            alert("✅ PDF-отчет успешно сформирован и отправлен админу и боссу!");
        } catch (e) {
            hideReportOverlay();
            alert("❌ Ошибка при создании PDF: " + e.message);
        }
    }

    async function loadTab(type, btn) {
        localStorage.setItem('activeTab', type); 

        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        let activeBtn = btn || document.querySelector(`.tab-btn[onclick*="'${type}'"]`);
        if (activeBtn) activeBtn.classList.add('active');
        
        currentTabType = type;
        let fetchId = type; 
        
        const box = document.getElementById('content');
        const svodActionBar = document.getElementById('svod-action-bar');
        if (svodActionBar) svodActionBar.style.display = 'none'; 
        
        box.innerHTML = "<div style='text-align:center; padding:40px; font-weight:bold; font-size:20px; color:#7E57C2;'>⌛ Синхронизация данных...</div>";

        try {
            let [resCat, resNewCat] = await Promise.all([
                fetch(`${FB_URL}/catalogs/order.json`), fetch(`${FB_URL}/catalogs/newshop.json`)
            ]);
            if (currentTabType !== fetchId) return;

            let catOrd = await resCat.json() || {}; let catNew = await resNewCat.json() || {};
            cachedData.catalogOrder = { ...catOrd, ...catNew };
            cachedData.catalog = cachedData.catalogOrder;

            if (type === 'menu') {
                currentPath = "catalogs/menu";
                let resMenu = await fetch(`${FB_URL}/catalogs/menu.json`);
                if (currentTabType !== fetchId) return;
                currentMenu = await resMenu.json() || {};
                renderMenuTab();
            }
            else if (type === 'orders') {
                isSvodEditMode = false; svodDeletions = []; tempSvodQty = {}; tempSvodStatus = {}; tempSvodVendor = {}; tempSvodShop = {}; tempSvodNewRows = [];
                
                // Оптимизированный запрос: берем только последние 1500 заказов
                let ordersSnap = await firebase.database().ref("orders").limitToLast(1500).once("value");
                if (currentTabType !== fetchId) return;
                let ordersObj = ordersSnap.val() || {};
                Object.keys(ordersObj).forEach(k => { if (ordersObj[k]) ordersObj[k].key = k; });
                cachedData.orders = ordersObj;
                await renderOrdersSvod();
            }
            else if (type === 'marketplace') {
                isMpEditMode = false; mpDeletions.clear();
                let res = await fetch(`${FB_URL}/marketplace_records.json`);
                if (currentTabType !== fetchId) return;
                cachedData.marketplace = await res.json() || {};

    async function compareStoplistWithOrders() {
        if(!confirm("Сравнить стоп-листы кофеен с текущими заказами?\n\nНедостающие товары будут добавлены со статусом 'Из стоп-листа'.")) return;
        showReportOverlay("Анализ стоп-листов...");
        try {
            let ordersSnap = await firebase.database().ref("orders").limitToLast(1500).once("value");
            let resMiss = await fetch(`${FB_URL}/missing_items.json`).then(r => r.json());
            
            let orders = ordersSnap.val() || {}; let missing = resMiss || {}; let catalog = cachedData.catalogOrder || {};
            let missingStatusMap = {};
            Object.values(missing).forEach(m => {
                if (m && m.status !== 'arrived' && m.status !== 'canceled') {
                    if (!missingStatusMap[m.shop]) missingStatusMap[m.shop] = {};
                    missingStatusMap[m.shop][cleanName(m.name)] = m.status;
                }
            });

            let activeOrdersMap = {}, latestStoplistMap = {}, sevenDaysAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
            Object.values(orders).forEach(o => {
                if (!o) return;
                if (o.mode === 'stoplist_fill') {
                    if (!latestStoplistMap[o.shop] || o.timestamp > latestStoplistMap[o.shop].timestamp) latestStoplistMap[o.shop] = o;
                }
                if ((o.mode === 'order' || o.mode === 'new_shop') && (!o.lenta_received && !o.ozon_received)) {
                    if (!o.ordered || o.timestamp >= sevenDaysAgo) {
                        if (!activeOrdersMap[o.shop]) activeOrdersMap[o.shop] = {};
                        (Array.isArray(o.items) ? o.items : Object.values(o.items || {})).forEach(i => {
                            if (i && i.name && i.name !== "НЕТ ЗАКАЗА") {
                                let cName = cleanName(i.name); let stat = 'pending';
                                if (o.svod) {
                                    if (i.status === 'error' || i.bot_error) stat = 'error'; else if (i.status === 'ordered') stat = 'ordered'; else if (i.status === 'from_stoplist') stat = 'from_stoplist';
                                }
                                if (o.ordered && !o.svod) stat = 'ordered'; 
                                if (stat !== 'error') activeOrdersMap[o.shop][cName] = stat;
                            }
                        });
                    }
                }
            });

            let newItemsToAppend = {};
            
            let catalogByCleanName = {};
            if (cachedData.catalogOrder) {
                Object.values(cachedData.catalogOrder).forEach(ci => {
                    if (ci && ci.name) catalogByCleanName[cleanName(ci.name)] = ci;
                });
            }

            for (let shop in latestStoplistMap) {
                let stop = latestStoplistMap[shop];
                (Array.isArray(stop.items) ? stop.items : Object.values(stop.items)).forEach(i => {
                    if (i && i.name && i.qty === 'Закончилось') {
                        let cName = cleanName(i.name);
                        let catItem = catalogByCleanName[cName];
                        if (catItem) {
                            let isTransit = missingStatusMap[shop] && (missingStatusMap[shop][cName] === 'transit' || missingStatusMap[shop][cName] === 'pending');
                            let isActiveOrder = activeOrdersMap[shop] && activeOrdersMap[shop][cName] !== undefined;
                            if (!isTransit && !isActiveOrder) {
                                if (!newItemsToAppend[shop]) newItemsToAppend[shop] = [];
                                newItemsToAppend[shop].push({ name: catItem.name, qty: 1, vendor: catItem.vendor || 'Лента', status: 'from_stoplist', bot_error: false, cat: catItem.cat || "Прочее" });
                            }
                        }
                    }
                });
            }

            if (Object.keys(newItemsToAppend).length === 0) {
                hideReportOverlay(); alert("✅ Все товары из стоп-листов уже добавлены в закупку или находятся в пути!"); return;
            }

            let updates = {};
            for (let shop in newItemsToAppend) {
                let targetOrderKey = Object.keys(orders).find(k => {
                    let o = orders[k]; return o && o.shop === shop && !o.ordered && (o.mode === 'order' || o.mode === 'new_shop');
                });
                if (targetOrderKey) {
                    let currentItems = Array.isArray(orders[targetOrderKey].items) ? orders[targetOrderKey].items : Object.values(orders[targetOrderKey].items || {});
                    currentItems = currentItems.filter(i => i.name !== 'НЕТ ЗАКАЗА');
                    newItemsToAppend[shop].forEach(ni => currentItems.push(ni));
                    updates[targetOrderKey + "/items"] = currentItems;
                } else {
                    let newKey = "auto_" + Date.now() + Math.random().toString(36).substr(2, 5);
                    updates[newKey] = { shop: shop, mode: 'order', items: newItemsToAppend[shop], comment: "Авто-перенос из стоп-листа", timestamp: Date.now(), svod: false, ordered: false, userId: "admin_auto" };
                }
            }

            await fetch(`${FB_URL}/orders.json`, { method: 'PATCH', body: JSON.stringify(updates) });
            hideReportOverlay(); alert("✅ Недостающие товары перенесены из стоп-листов со статусом 'Из стоп-листа'. Проверьте Свод!");
            
            let resOrdersUpdated = await firebase.database().ref("orders").limitToLast(1500).once("value");
            let ordersObjUpdated = resOrdersUpdated.val() || {};
            Object.keys(ordersObjUpdated).forEach(k => { if (ordersObjUpdated[k]) ordersObjUpdated[k].key = k; });
            cachedData.orders = ordersObjUpdated;
            if (currentTabType === 'orders') renderOrdersSvod();
        } catch(e) {
            hideReportOverlay(); alert("❌ Ошибка при сравнении: " + e.message);
        }
    }

    async function buildSvodReport() {
        if(!confirm("Вы уверены, что хотите СОБРАТЬ СВОД?\nЭто переведет все ожидающие заказы в статус Свода, посчитает итоги и отправит оповещение в Телеграм.")) return;
        
        showReportOverlay("Сборка закупки (Выполняю команду)...");
        try {
            let ordersSnapRaw = await firebase.database().ref("orders").limitToLast(1500).once("value");
            let resMissing = await fetch(`${FB_URL}/missing_items.json`);
            
            let ordersSnap = ordersSnapRaw.val() || {};
            let catalog = cachedData.catalogOrder || {}; 
            let missingData = await resMissing.json() || {};
            
            let catalogDict = {};
            if (catalog) Object.values(catalog).forEach(c => { if (c && c.name) catalogDict[c.name] = c; });

            let updates = {}; let totalSvod = 0; let totalLentaAll = 0; let totalOzonAll = 0; let totalKuperAll = 0;

            let activeMissing = {};
            Object.values(missingData).forEach(m => {
                if (m && m.status !== 'arrived' && m.status !== 'canceled') {
                    if (!activeMissing[m.shop]) activeMissing[m.shop] = {};
                    activeMissing[m.shop][m.name] = m.status;
                }
            });

            let shopLentaSums = {}; let svodByShop = {};

            Object.keys(ordersSnap).forEach(key => {
                let o = ordersSnap[key];
                if (o && (o.mode === 'order' || o.mode === 'new_shop') && o.svod === false) {
                    if(!shopLentaSums[o.shop]) shopLentaSums[o.shop] = 0;
                    if(!svodByShop[o.shop]) svodByShop[o.shop] = 0;
                    (Array.isArray(o.items) ? o.items : Object.values(o.items || {})).forEach(i => {
                        if(i && i.name && i.name !== "НЕТ ЗАКАЗА") {
                            let catItem = catalogDict[i.name] || {};
                            let vendor = (i.vendor || catItem.vendor || 'Лента').toLowerCase();
                            let missingStat = activeMissing[o.shop] ? activeMissing[o.shop][i.name] : null;
                            if (missingStat !== 'transit' && i.status !== 'error' && (vendor.includes('лента') || vendor.includes('lenta'))) {
                                shopLentaSums[o.shop] += (parseFloat(i.qty) * (parseFloat(catItem.price)||0));
                            }
                        }
                    });
                }
            });

            Object.keys(ordersSnap).forEach(key => {
                let o = ordersSnap[key];
                if (o && (o.mode === 'order' || o.mode === 'new_shop') && o.svod === false) {
                    updates[key + "/svod"] = true; 
                    let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                    let changed = false;

                    itemsArr.forEach(i => {
                        if(i && i.name && i.name !== "НЕТ ЗАКАЗА") {
                            let catItem = catalogDict[i.name] || {};
                            let vendor = (i.vendor || catItem.vendor || 'Лента').toLowerCase();
                            let missingStat = activeMissing[o.shop] ? activeMissing[o.shop][i.name] : null;
                            
                            if (missingStat === 'transit' || i.status === 'error') {
                                i.status = 'error'; i.bot_error = true; changed = true;
                            } else {
                                let isAutoKuper = false;
                                if ((vendor.includes('лента') || vendor.includes('lenta')) && shopLentaSums[o.shop] > 0 && shopLentaSums[o.shop] < 2000) {
                                    vendor = 'купер (авто)'; isAutoKuper = true;
                                    if (i.vendor !== 'Купер (Авто)') { i.vendor = 'Купер (Авто)'; changed = true; }
                                }
                                
                                let price1 = parseFloat(catItem.price) || 0; let price2 = parseFloat(catItem.price2) || 0;
                                let isRegularKuper = !isAutoKuper && (vendor.includes('купер') || vendor.includes('kuper'));
                                let finalPrice = (isRegularKuper && price2 > 0) ? price2 : price1;

                                let cost = finalPrice * parseFloat(i.qty);
                                totalSvod += cost; svodByShop[o.shop] += cost;
                                
                                if (vendor.includes('лента') || vendor.includes('lenta')) totalLentaAll += cost;
                                else if (vendor.includes('озон') || vendor.includes('ozon')) totalOzonAll += cost;
                                else totalKuperAll += cost;
                            }
                        }
                    });
                    if (changed) updates[key + "/items"] = itemsArr;
                }
            });

            if (Object.keys(updates).length > 0) {
                await fetch(`${FB_URL}/orders.json`, { method: 'PATCH', body: JSON.stringify(updates) });
                let textToBot = `📊 **СВОД ГОТОВ К СБОРКЕ!**\n\n`;
                for(let shopName in svodByShop) {
                    if (svodByShop[shopName] > 0) textToBot += `📍 ${shopName}: **${Math.round(svodByShop[shopName])} ₽**\n`;
                }
                textToBot += `➖➖➖➖➖➖➖➖\n💵 ИТОГО: **${Math.round(totalSvod)} ₽**`;
                await fetch(`${FB_URL}/bot_control/notifications.json`, { method: 'POST', body: JSON.stringify({ type: "svod_ready_text", text: textToBot, timestamp: Date.now() }) });
                alert("✅ Свод успешно собран и отправлен в Телеграм!");
            } else alert("ℹ️ Нет новых заказов для сборки свода.");
            
            hideReportOverlay();
            loadTab('orders', document.querySelector('.tab-btn.active'));
        } catch (e) { 
            hideReportOverlay(); alert("❌ Ошибка формирования свода: " + e.message); 
        }
    }
    
    async function autoRemoveFromStoplist(shop, itemNamesArray) {
        if (!itemNamesArray || itemNamesArray.length === 0) return;
        try {
            let snap = await firebase.database().ref("orders").orderByChild("shop").equalTo(shop).limitToLast(50).once("value");
            let ordersRaw = snap.val() || {};
            let shopOrders = [];
            for (let k in ordersRaw) {
                let val = ordersRaw[k];
                if (val && val.mode === 'stoplist_fill') { val.key = k; shopOrders.push(val); }
            }
            if (shopOrders.length === 0) return;
            shopOrders.sort((a,b) => b.timestamp - a.timestamp);
            let latestStoplist = shopOrders[0];
            
            if (!latestStoplist.items) return;
            let itemsArr = Array.isArray(latestStoplist.items) ? latestStoplist.items : Object.values(latestStoplist.items);
            let namesToRemove = itemNamesArray.map(n => String(n).trim().toLowerCase());
            let newItems = itemsArr.filter(i => {
                if (!i || !i.name) return false;
                return !namesToRemove.includes(String(i.name).trim().toLowerCase());
            });
            
            if (newItems.length !== itemsArr.length) {
                if (newItems.length === 0) await fetch(`${FB_URL}/orders/${latestStoplist.key}/items.json`, { method: 'PUT', body: JSON.stringify([{name: "Всё в наличии", qty: "В наличии"}]) });
                else await fetch(`${FB_URL}/orders/${latestStoplist.key}/items.json`, { method: 'PUT', body: JSON.stringify(newItems) });
            }
        } catch(e) { console.error("Auto stoplist update failed:", e); }
    }

    async function mergePendingOrders() {
        if(!confirm("Объединить все ожидающие заказы по кофейням?\n\nДополненные в разные дни заказы сольются в один общий заказ для каждого адреса.")) return;
        showReportOverlay("Объединяю заказы...");
        try {
            let pendingByShop = {};
            for(let key in cachedData.orders) {
                let o = cachedData.orders[key];
                if(o && (o.mode === 'order' || o.mode === 'new_shop') && !o.ordered) {
                    if(!pendingByShop[o.shop]) pendingByShop[o.shop] = [];
                    pendingByShop[o.shop].push(o);
                }
            }
            
            let hasMerges = false; let deletes = []; let updates = {};
            for(let shop in pendingByShop) {
                let shopOrders = pendingByShop[shop];
                if(shopOrders.length > 1) {
                    hasMerges = true; let mergedItems = {}; let comments = []; let latestTime = 0;
                    shopOrders.forEach(o => {
                        if(o.timestamp > latestTime) latestTime = o.timestamp;
                        if(o.comment && o.comment.trim() !== "") comments.push(o.comment.trim());
                        (Array.isArray(o.items) ? o.items : Object.values(o.items || {})).forEach(i => {
                            if(i && i.name && i.name !== "НЕТ ЗАКАЗА") {
                                if(!mergedItems[i.name]) mergedItems[i.name] = { ...i, qty: parseFloat(i.qty) || 0 };
                                else mergedItems[i.name].qty += (parseFloat(i.qty) || 0);
                            }
                        });
                        deletes.push(o.key);
                    });
                    
                    let newItemsArr = Object.values(mergedItems);
                    if(newItemsArr.length === 0) newItemsArr = [{name: "НЕТ ЗАКАЗА", qty: 0}];
                    
                    let randomKey = "merged_" + Date.now() + "_" + Math.floor(Math.random()*10000);
                    updates[randomKey] = { shop: shop, mode: 'order', items: newItemsArr, comment: comments.join(" | "), timestamp: latestTime, svod: false, ordered: false, userId: "admin_merge" };
                }
            }

            if(!hasMerges) { hideReportOverlay(); return alert("ℹ️ Нет адресов с несколькими разрозненными заказами для объединения."); }
            for(let k of deletes) await fetch(`${FB_URL}/orders/${k}.json`, { method: 'DELETE' });
            if(Object.keys(updates).length > 0) await fetch(`${FB_URL}/orders.json`, { method: 'PATCH', body: JSON.stringify(updates) });
            
            alert("✅ Заказы по адресам успешно объединены в один!");
            hideReportOverlay(); loadTab('orders', document.querySelector('.tab-btn.active'));
        } catch(e) {
            hideReportOverlay(); alert("❌ Ошибка объединения: " + e.message);
        }
    }

    async function saveSvodEdits() {
        let btn = document.getElementById('svod-btn-edit'); 
        if(btn) btn.innerHTML = "⌛ СОХРАНЕНИЕ...";
        preserveSvodInputs(); 
        
        try {
            let promises = []; 
            let moves = [];
            let newItemsByOrder = {};
            let newOrdersToCreate = {};

            document.querySelectorAll('.new-svod-row').forEach(row => {
                let nameSel = row.querySelector('.new-svod-name');
                let qtyInp = row.querySelector('.new-svod-qty');
                let vendorSel = row.querySelector('.new-svod-vendor');

                let dateStr = nameSel.getAttribute('data-date');
                let shop = nameSel.getAttribute('data-shop');
                if (shop.includes('&quot;')) shop = shop.replace(/&quot;/g, '"');
                
                let name = nameSel.value;
                if (name.includes('&quot;')) name = name.replace(/&quot;/g, '"');
                
                let qty = parseFloat(qtyInp.value) || 0;
                let vendor = vendorSel.value;

                if(!name || qty <= 0) return;

                let catItem = Object.values(cachedData.catalogOrder).find(c => c && c.name === name) || {};
                let cat = catItem.cat || "Прочее";

                let targetOrderKey = Object.keys(cachedData.orders).find(k => {
                    let o = cachedData.orders[k];
                    return o && o.shop === shop && !o.ordered && new Date(o.timestamp).toLocaleDateString('ru-RU') === dateStr;
                });

                let itemObj = { name: name, qty: qty, vendor: vendor, status: 'pending', bot_error: false, cat: cat };

                if (targetOrderKey) {
                    if(!newItemsByOrder[targetOrderKey]) newItemsByOrder[targetOrderKey] = [];
                    newItemsByOrder[targetOrderKey].push(itemObj);
                } else {
                    let pseudoKey = "new_" + dateStr + "_" + shop;
                    if(!newOrdersToCreate[pseudoKey]) {
                        let [d, m, y] = dateStr.split('.');
                        let ts = new Date(y, m-1, d).getTime();
                        newOrdersToCreate[pseudoKey] = { shop: shop, mode: 'order', items: [], timestamp: ts, svod: false, ordered: false, userId: 'admin_dashboard' };
                    }
                    newOrdersToCreate[pseudoKey].items.push(itemObj);
                }
            });
            
            for (let k in cachedData.orders) {
                let o = cachedData.orders[k];
                if (o && (o.mode === 'order' || o.mode === 'new_shop') && !o.ordered) {
                    let dKey = new Date(o.timestamp).toLocaleDateString('ru-RU');
                    let needsUpdate = false;
                    let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                    let newItemsArr = [];
                    
                    for (let i = 0; i < itemsArr.length; i++) {
                        let itm = itemsArr[i]; 
                        if (!itm || !itm.name) continue;
                        
                        let isDeleted = svodDeletions.some(d => d.date === dKey && d.shop === o.shop && d.name === itm.name);
                        if (isDeleted) { 
                            needsUpdate = true; 
                            continue; 
                        }
                        
                        let updatedQty = (tempSvodQty[dKey] && tempSvodQty[dKey][o.shop] && tempSvodQty[dKey][o.shop][itm.name] !== undefined) ? tempSvodQty[dKey][o.shop][itm.name] : undefined;
                        let updatedStatus = (tempSvodStatus[dKey] && tempSvodStatus[dKey][o.shop] && tempSvodStatus[dKey][o.shop][itm.name] !== undefined) ? tempSvodStatus[dKey][o.shop][itm.name] : undefined;
                        let updatedVendor = (tempSvodVendor[dKey] && tempSvodVendor[dKey][o.shop] && tempSvodVendor[dKey][o.shop][itm.name]) ? tempSvodVendor[dKey][o.shop][itm.name] : undefined;
                        let newTargetShop = (tempSvodShop[dKey] && tempSvodShop[dKey][o.shop] && tempSvodShop[dKey][o.shop][itm.name]) ? tempSvodShop[dKey][o.shop][itm.name] : o.shop;
                        
                        let catItem = Object.values(cachedData.catalogOrder).find(c => c && c.name === itm.name) || {};

                        if (updatedVendor !== undefined && (itm.vendor || catItem.vendor || 'Лента').toLowerCase() !== updatedVendor.toLowerCase()) {
                            needsUpdate = true;
                            itm.vendor = updatedVendor;
                        }
                        
                        let finalQty = updatedQty !== undefined ? updatedQty : itm.qty;
                        let finalStatus = updatedStatus !== undefined ? updatedStatus : itm.status;
                        let finalBotError = (finalStatus === 'error') ? true : itm.bot_error;

                        if (newTargetShop !== o.shop) {
                            needsUpdate = true;
                            moves.push({
                                date: dKey,
                                fromShop: o.shop,
                                toShop: newTargetShop,
                                item: { ...itm, qty: finalQty, status: finalStatus, bot_error: finalBotError }
                            });
                            continue; 
                        }

                        if (updatedStatus !== undefined && itm.status !== updatedStatus) {
                            needsUpdate = true;
                            if (updatedStatus === 'error' && itm.status !== 'error') {
                                let newMissing = { shop: o.shop, name: itm.name, qty: finalQty, status: 'canceled', timestamp: Date.now() };
                                promises.push(fetch(`${FB_URL}/missing_items.json`, { method: 'POST', body: JSON.stringify(newMissing) }));
                            }
                            itm.status = updatedStatus; 
                            itm.bot_error = (updatedStatus === 'error'); 
                            itm.not_found = (updatedStatus === 'error'); 
                            itm.error = (updatedStatus === 'error');
                        }
                        
                        if (updatedQty !== undefined && String(updatedQty) !== String(itm.qty)) { 
                            needsUpdate = true;
                            itm.qty = updatedQty; 
                        }

                        if (parseFloat(itm.qty) > 0 || itm.name === "НЕТ ЗАКАЗА") {
                            newItemsArr.push(itm);
                        } else if (parseFloat(itm.qty) === 0) {
                            needsUpdate = true;
                        }
                    }
                    
                    if (newItemsByOrder[k]) {
                        needsUpdate = true;
                        newItemsArr = newItemsArr.filter(i => i.name !== "НЕТ ЗАКАЗА");
                        newItemsByOrder[k].forEach(newItem => {
                            let existing = newItemsArr.find(i => i.name === newItem.name);
                            if (existing) {
                                existing.qty = parseFloat(existing.qty) + parseFloat(newItem.qty);
                            } else {
                                newItemsArr.push(newItem);
                            }
                        });
                    }

                    if (needsUpdate) {
                        if (newItemsArr.length === 0) newItemsArr = [{name: "НЕТ ЗАКАЗА", qty: 0}];
                        promises.push(fetch(`${FB_URL}/orders/${k}/items.json`, {method:'PUT', body: JSON.stringify(newItemsArr)}));
                    }
                }
            }
            
            for (let pseudoKey in newOrdersToCreate) {
                promises.push(fetch(`${FB_URL}/orders.json`, {method:'POST', body: JSON.stringify(newOrdersToCreate[pseudoKey])}));
            }

            for (let move of moves) {
                let targetOrderKey = Object.keys(cachedData.orders).find(k => {
                    let to = cachedData.orders[k];
                    return to && to.shop === move.toShop && !to.ordered && new Date(to.timestamp).toLocaleDateString('ru-RU') === move.date;
                });
                if (targetOrderKey) {
                    let targetOrder = cachedData.orders[targetOrderKey];
                    let tItems = Array.isArray(targetOrder.items) ? targetOrder.items : Object.values(targetOrder.items||{});
                    let existingItem = tItems.find(i => i.name === move.item.name);
                    if (existingItem) {
                        existingItem.qty = parseFloat(existingItem.qty) + parseFloat(move.item.qty);
                    } else {
                        tItems = tItems.filter(i => i.name !== "НЕТ ЗАКАЗА");
                        tItems.push(move.item);
                    }
                    promises.push(fetch(`${FB_URL}/orders/${targetOrderKey}/items.json`, {method:'PUT', body: JSON.stringify(tItems)}));
                } else {
                    let [d, m, y] = move.date.split('.');
                    let ts = new Date(y, m-1, d).getTime();
                    let newOrder = { shop: move.toShop, mode: 'order', items: [move.item], timestamp: ts, svod: false, ordered: false, userId: 'admin_move' };
                    promises.push(fetch(`${FB_URL}/orders.json`, {method:'POST', body: JSON.stringify(newOrder)}));
                }
            }

            await Promise.all(promises);
            alert("✅ Все изменения и новые позиции успешно сохранены!");
            isSvodEditMode = false; 
            svodDeletions = []; 
            tempSvodQty = {}; 
            tempSvodStatus = {};
            tempSvodVendor = {};
            tempSvodShop = {};
            tempSvodNewRows = [];
            
            setTimeout(() => {
                let ordersSnap = firebase.database().ref("orders").limitToLast(1500).once("value");
                ordersSnap.then(s => {
                    let ordersObj = s.val() || {};
                    Object.keys(ordersObj).forEach(k => { if (ordersObj[k]) ordersObj[k].key = k; });
                    cachedData.orders = ordersObj;
                    renderOrdersSvod();
                });
            }, 600);
        } catch (e) { 
            alert("❌ Ошибка при сохранении: " + e.message); 
            if(btn) btn.innerHTML = "💾 Сохранить изменения"; 
        }
    }

    async function markOrdersAsPlaced() {
        if(!confirm("Все заказы оформлены? Свод будет очищен, а заказы перенесены в историю.")) return;
        let updates = {};
        Object.values(cachedData.orders).forEach(o => {
            if (o && (o.mode === 'order' || o.mode === 'new_shop') && !o.ordered) {
                updates[o.key + "/ordered"] = true; 
                updates[o.key + "/svod"] = true; 
                if (o.items) {
                    let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items);
                    let changed = false;
                    itemsArr.forEach(i => { 
                        if (i && i.name !== "НЕТ ЗАКАЗА" && (!i.status || i.status === 'pending' || i.status === 'from_stoplist')) { 
                            i.status = 'ordered'; 
                            changed = true; 
                        } 
                    });
                    if (changed) updates[o.key + "/items"] = itemsArr;
                }
            }
        });
        if (Object.keys(updates).length > 0) {
            try {
                await fetch(`${FB_URL}/orders.json`, { method: 'PATCH', body: JSON.stringify(updates) });
                alert("✅ Свод успешно очищен и перенесен в историю!");
                loadTab('orders', document.querySelector('.tab-btn.active'));
            } catch(e) { 
                alert("❌ Ошибка: " + e.message); 
            }
        } else { 
            alert("Нет активных заказов для оформления."); 
        }
    }

    function renderMarketplaceTab() {
        const box = document.getElementById('content');
        let records = cachedData.marketplace || {};
        let shops = ["Бояринова", "Гагарина", "Вертолетчиков", "Липчанского", "Новокосино", "Новокосино 2", "Старое Павлино", "Красноказарменная", "Ухтомского ополчения"];
        
        let now = new Date(); 
        
        let filterMonth, filterYear;
        if (mpViewMonth === 'current') {
            filterMonth = now.getMonth();
            filterYear = now.getFullYear();
        } else {
            let prevDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
            filterMonth = prevDate.getMonth();
            filterYear = prevDate.getFullYear();
        }

        let todayStr = now.toLocaleDateString('ru-RU');
        
        let currentData = {}; 
        let historyData = {}; 
        let currentTotals = {};
        let dailyTotal = 0;
        
        shops.forEach(s => { 
            currentData[s] = []; 
            historyData[s] = []; 
            currentTotals[s] = 0; 
        });

        for (let key in records) {
            let r = records[key]; 
            let d = new Date(r.timestamp);
            
            if (d.getMonth() === filterMonth && d.getFullYear() === filterYear) {
                if (currentData[r.address]) {
                    currentData[r.address].push({key, ...r});
                    if (!mpDeletions.has(key)) {
                        let inputEl = document.getElementById(`mp_inp_${key}`);
                        let val = inputEl ? parseFloat(inputEl.value) : parseFloat(r.amount);
                        if (isNaN(val)) val = 0;
                        currentTotals[r.address] += val;
                        
                        if(d.toLocaleDateString('ru-RU') === todayStr) {
                            dailyTotal += val;
                        }
                    }
                }
            } else {
                if (historyData[r.address]) {
                    historyData[r.address].push({key, ...r});
                }
            }
        }
        
        shops.forEach(s => { 
            currentData[s].sort((a,b) => b.timestamp - a.timestamp); 
            historyData[s].sort((a,b) => b.timestamp - a.timestamp); 
        });

        let btnEditColor = isMpEditMode ? "#f44336" : "#0288d1";
        let btnEditText = isMpEditMode ? "💾 Сохранить изменения" : "✏️ Редактировать";
        
        let headerLabel = mpViewMonth === 'current' ? "Текущий месяц" : "Прошлый месяц";
        let isActionsOpen = expandedDivs.has('mp-action-buttons');

    function toggleMpEdit() { 
        isMpEditMode = true; 
        mpDeletions.clear(); 
        renderMarketplaceTab(); 
    }
    
    function markMpDelete(key) { 
        mpDeletions.add(key); 
        renderMarketplaceTab(); 
    }

    async function saveMpEdits() {
        let btn = document.getElementById('mp-btn-edit'); 
        if(btn) btn.innerHTML = "⌛ СОХРАНЕНИЕ...";
        try {
            let promises = [];
            mpDeletions.forEach(key => promises.push(fetch(`${FB_URL}/marketplace_records/${key}.json`, { method: 'DELETE' })));
            
            document.querySelectorAll('input[id^="mp_inp_"]').forEach(inp => {
                let key = inp.id.replace("mp_inp_", "");
                if (!mpDeletions.has(key)) {
                    let val = parseFloat(inp.value);
                    if (!isNaN(val) && cachedData.marketplace[key] && parseFloat(cachedData.marketplace[key].amount) !== val) {
                        promises.push(fetch(`${FB_URL}/marketplace_records/${key}.json`, { method: 'PATCH', body: JSON.stringify({amount: val}) }));
                    }
                }
            });

            await Promise.all(promises);
            alert("✅ Изменения в маркетплейсах успешно сохранены!");
            isMpEditMode = false; 
            mpDeletions.clear();
            loadTab('marketplace', document.querySelector('.tab-btn.active'));
        } catch(e) { 
            alert("❌ Ошибка: " + e.message); 
            if(btn) btn.innerHTML = "💾 Сохранить изменения"; 
        }
    }

    async function sendMpSummaryToBot() {
        let confirmText = mpViewMonth === 'current' ? "Отправить итоговую сводку за ТЕКУЩИЙ месяц в Telegram?" : "Отправить итоговую сводку за ПРОШЛЫЙ месяц в Telegram?";
        if(!confirm(confirmText)) return;
        
        let shops = ["Бояринова", "Гагарина", "Вертолетчиков", "Липчанского", "Новокосино", "Новокосино 2", "Старое Павлино", "Красноказарменная", "Ухтомского ополчения"];
        let now = new Date(); 
        
        let filterMonth, filterYear;
        if (mpViewMonth === 'current') {
            filterMonth = now.getMonth();
            filterYear = now.getFullYear();
        } else {
            let prevDate = new Date(now.getFullYear(), now.getMonth() - 1, 1);
            filterMonth = prevDate.getMonth();
            filterYear = prevDate.getFullYear();
        }
        
        let totals = {}; 
        let grandTotal = 0; 
        shops.forEach(s => totals[s] = 0);
        
        for(let key in cachedData.marketplace) {
            let r = cachedData.marketplace[key]; 
            let d = new Date(r.timestamp);
            if(d.getMonth() === filterMonth && d.getFullYear() === filterYear && totals[r.address] !== undefined) {
                totals[r.address] += parseFloat(r.amount); 
                grandTotal += parseFloat(r.amount);
            }
        }
        
        let targetDate = new Date(filterYear, filterMonth, 1);
        let monthName = targetDate.toLocaleString('ru', { month: 'long' }).toUpperCase();
        
        let text = `📊 *СВОДКА ПО МАРКЕТПЛЕЙСАМ ЗА ${monthName}*\n\n`;
        shops.forEach(s => {
            if (totals[s] !== 0) {
                let sName = s === 'Красноказарменная' ? 'МЭИ' : s;
                text += `📍 ${sName}: *${totals[s].toFixed(2)} ₽*\n`;
            }
        });
        text += `➖➖➖➖➖➖➖➖\n💵 ИТОГО: *${grandTotal.toFixed(2)} ₽*`;

        try {
            await fetch(`${FB_URL}/bot_control/notifications.json`, { 
                method: 'POST', 
                body: JSON.stringify({ type: "marketplace_summary", text: text, timestamp: Date.now() }) 
            });
            alert("✅ Сводка отправлена боту!");
        } catch(e) { 
            alert("❌ Ошибка отправки: " + e.message); 
        }
    }

    // 3. ВКЛАДКА: НЕДОВОЗЫ
    // ==========================================
    function toggleMissingEdit() { 
        isMissingEditMode = true; 
        missingDeletions.clear(); 
        tempMissingStatus = {}; 
        renderMissing(); 
    }
    
    function markMissingDelete(key) { 
        missingDeletions.add(key); 
        renderMissing(); 
    }

    async function saveMissingEdits() {
        const btn = document.getElementById('miss-btn-edit'); 
        if(btn) btn.innerHTML = "⌛ СОХРАНЕНИЕ...";
        try {
            let promises = [];
            missingDeletions.forEach(key => promises.push(fetch(`${FB_URL}/missing_items/${key}.json`, { method: 'DELETE' })));
            
            let catalogByCleanName = {};
            if (cachedData.catalogOrder) {
                Object.values(cachedData.catalogOrder).forEach(ci => {
                    if (ci && ci.name) catalogByCleanName[cleanName(ci.name)] = ci;
                });
            }

            for (let key in tempMissingStatus) {
                if (!missingDeletions.has(key)) {
                    let missingItem = cachedData.missing[key]; 
                    let newStatus = tempMissingStatus[key];
                    if (newStatus === 'arrived' && missingItem) {
                        await autoRemoveFromStoplist(missingItem.shop, [missingItem.name]);
                    }
                    promises.push(fetch(`${FB_URL}/missing_items/${key}.json`, { 
                        method: 'PATCH', 
                        body: JSON.stringify({status: newStatus, timestamp: Date.now()}) 
                    }));
                }
            }
            await Promise.all(promises);
            alert("✅ Изменения недовозов успешно сохранены!");
            isMissingEditMode = false; 
            missingDeletions.clear(); 
            tempMissingStatus = {};
            loadTab('missing', document.querySelector('.tab-btn.active'));
        } catch (e) { 
            alert("❌ Ошибка при сохранении: " + e.message); 
            if(btn) btn.innerHTML = "💾 Сохранить изменения"; 
        }
    }

    function renderMissing() {
        const box = document.getElementById('content');
        let btnEditColor = isMissingEditMode ? "#f44336" : "#0288d1";
        let btnEditText = isMissingEditMode ? "💾 Сохранить изменения" : "✏️ Редактировать";

        let latestOrderMap = {};
        Object.values(cachedData.orders).forEach(o => {
            if (o && (o.mode === 'order' || o.mode === 'new_shop')) {
                if (!latestOrderMap[o.shop]) latestOrderMap[o.shop] = {};
                let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                itemsArr.forEach(i => {
                    if (i && i.name && parseFloat(i.qty) > 0 && i.status !== 'error' && i.bot_error !== true) {
                        if (!latestOrderMap[o.shop][i.name] || o.timestamp > latestOrderMap[o.shop][i.name]) {
                            latestOrderMap[o.shop][i.name] = o.timestamp;
                        }
                    }
                });
            }
        });

        let isActionsOpen = expandedDivs.has('miss-action-buttons');
        let activeHtml = `
            <h3 style='color:#E53935; font-size:24px; margin-top:0; margin-bottom:15px;'>‼️ Актуальные Недовозы</h3>
            
            <div class="cat-group-header" style="padding: 12px 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);" onclick="toggleCatElements('miss-action-buttons', 'arrow_miss_actions')">
                <span style="font-size:16px; color:#E53935; font-weight:900;">⚡ Действия</span>
                <span id="arrow_miss_actions">${isActionsOpen ? '▲' : '▼'}</span>

            <div class="miss-action-buttons action-container" style="display: ${isActionsOpen ? 'flex' : 'none'}; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;">
                <button id="miss-btn-edit" onclick="isMissingEditMode ? saveMissingEdits() : toggleMissingEdit()" class="btn-add" style="flex: 1 1 auto; background:${btnEditColor};">${btnEditText}</button>
            </div>`;
                          
        activeHtml += `<table style='margin-bottom:20px;'><tr><th>Точка</th><th>Товар / Ссылки</th><th style='text-align:center;'>Кол-во</th><th>Статус</th><th style='text-align:center;'>${isMissingEditMode ? 'Удалить' : ''}</th></tr>`;
        let historyHtml = "<table style='margin-top:15px;'><tr><th>Точка</th><th>Товар</th><th style='text-align:center;'>Кол-во</th><th>Статус</th><th style='text-align:center;'>Удалить</th></tr>";
        
        let hasActive = false; 
        let hasHistory = false; 
        let cutoff = Date.now() - (30 * 24 * 60 * 60 * 1000);
        let missingArr = Object.keys(cachedData.missing).map(k => ({key: k, ...cachedData.missing[k]}));
        
        missingArr.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));

        let catalogByCleanName = {};
        if (cachedData.catalogOrder) {
            Object.values(cachedData.catalogOrder).forEach(ci => {
                if (ci && ci.name) catalogByCleanName[cleanName(ci.name)] = ci;
            });
        }

        missingArr.forEach(m => {
            if ((m.timestamp || 0) < cutoff && m.status !== 'pending' && m.status !== 'transit' && m.status !== 'oos' && m.status !== 'reorder') return; 
            
            let lastOrdTs = (latestOrderMap[m.shop] && latestOrderMap[m.shop][m.name]) || 0;
            if (lastOrdTs > m.timestamp && m.status !== 'arrived') {
                m.status = 'reorder';
            }

            let iNameLow = String(m.name).trim().toLowerCase();
            let catInfo = catalogByCleanName[cleanName(iNameLow)] || {};

                        <td style="text-align:center;"><button class="btn-del" ${isDeleted ? 'disabled' : ''} onclick="markMissingDelete('${m.key}')">🗑</button></td>
                    </tr>`;
                } else {

    async function saveChecklistEdits() {
        let btn = document.getElementById('chk-btn-edit'); 
        if(btn) btn.innerHTML = "⌛ СОХРАНЕНИЕ...";
        let inputs = document.querySelectorAll('.edit-chk-input');
        let updates = {};
        
        inputs.forEach(input => {
            let oKey = input.getAttribute('data-order'); 
            let item = input.getAttribute('data-item'); 
            let val = input.value.trim();
            if(!updates[oKey]) updates[oKey] = {}; 
            updates[oKey][item] = val;
        });
        
        try {
            for(let oKey in updates) {
                let order = cachedData.orders[oKey]; 
                if(!order) continue;
                let itemsArr = Array.isArray(order.items) ? order.items : Object.values(order.items||{});
                for(let item in updates[oKey]) {
                    let found = itemsArr.find(i => i && i.name === item);
                    if(found) { 
                        found.qty = updates[oKey][item]; 
                    } else { 
                        itemsArr.push({name: item, qty: updates[oKey][item], cat: "Прочее"}); 
                    }
                }
                await fetch(`${FB_URL}/orders/${oKey}/items.json`, {method:'PUT', body: JSON.stringify(itemsArr)});
            }
            alert("✅ Изменения в чек-листе успешно сохранены в базе!");
            isChecklistEditMode = false;
            loadTab('checks_table', document.querySelector('.tab-btn.active'));
        } catch(e) { 
            alert("❌ Ошибка сохранения: " + e.message); 
            if(btn) btn.innerHTML = "💾 Сохранить изменения"; 
        }
    }

    function renderStats() {

        let stats = {};
        shops.forEach(s => { stats[s] = { emptyCount: {}, orderSum: {}, orderCount: {} }; });

            if (!o || !stats[o.shop] || !o.items) return;
            let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items);
            if (o.mode === 'checklist') {
                itemsArr.forEach(i => {
                    let val = String(i.qty).trim();
                    if (val === "0" || val === "Закончилось" || val === "Меньше половины") {
                        stats[o.shop].emptyCount[i.name] = (stats[o.shop].emptyCount[i.name] || 0) + 1;
                    }
                });
            } else if (o.mode === 'order') {
                itemsArr.forEach(i => {
                    if (i.name === "НЕТ ЗАКАЗА") return;
                    stats[o.shop].orderSum[i.name] = (stats[o.shop].orderSum[i.name] || 0) + parseFloat(i.qty || 0);
                    stats[o.shop].orderCount[i.name] = (stats[o.shop].orderCount[i.name] || 0) + 1;
                });
            }
        });

        let html = `<h3 style="color:#1a237e; font-size:24px; margin-top:0; margin-bottom:20px;">📈 Статистика (за всё время)</h3><div style="display:flex; flex-wrap:wrap; gap:20px;">`;
        shops.forEach(s => {
            let displayName = s === 'Красноказарменная' ? 'МЭИ' : s;
            html += `<div class="card" style="flex: 1 1 calc(33% - 20px); min-width:320px; padding:25px; background:#fff; border-radius:16px; box-shadow:0 4px 15px rgba(0,0,0,0.05);">
                        <h4 style="margin-top:0; color:#311b92; font-size:20px; border-bottom:2px solid #eee; padding-bottom:10px; font-weight:900;">${displayName}</h4>`;
            
            let empties = Object.entries(stats[s].emptyCount).sort((a,b) => b[1] - a[1]).slice(0, 5);
            html += `<b style="color:#D50000; font-size:15px;">🛑 Часто заканчивается (Чек-лист):</b><ul style="margin-top:5px; padding-left:20px; font-size:14px; color:#555; font-weight:bold;">`;
            if (empties.length > 0) {
                empties.forEach(e => html += `<li>${e[0]} <span style="color:#D50000;">(${e[1]} раз)</span></li>`);
            } else { html += `<li>Нет данных</li>`; }
            html += `</ul>`;

            let averages = Object.entries(stats[s].orderSum).map(e => {
                let avg = (e[1] / stats[s].orderCount[e[0]]).toFixed(1);
                return [e[0], avg];
            }).sort((a,b) => b[1] - a[1]).slice(0, 5);
            html += `<b style="color:#2e7d32; font-size:15px; margin-top:15px; display:inline-block;">📦 Средний заказ (Топ-5 закупка):</b><ul style="margin-top:5px; padding-left:20px; font-size:14px; color:#555; font-weight:bold;">`;
            if (averages.length > 0) {
                averages.forEach(a => html += `<li>${a[0]}: <span style="color:#2e7d32;">~${a[1]} шт</span></li>`);
            } else { html += `<li>Нет данных</li>`; }
            html += `</ul></div>`;
        });
        html += `</div>`;
        box.innerHTML = html;
    }

        }
        let optionsHtml = allPurchaseItems.map(name => `<option value="${name.replace(/"/g, '&quot;')}">${name}</option>`).join("");
        
        Object.keys(grouped).sort((a,b) => { if(a.includes("!!!")) return -1; if(b.includes("!!!")) return 1; return a.localeCompare(b); }).forEach(sc => {
            let safeSc = getSafeId(sc); let displaySc = sc.replace("!!! НОВОЕ", "Новая добавленная позиция"); 
            let isScOpen = sc.includes("!!!") || expandedDivs.has(`stop_${safeSc}`);
            let displayStyle = isScOpen ? "table-row" : "none";

            html += `<tr class="cat-group-header" onclick="toggleCatElements('stop_${safeSc}', 'arrow_stop_${safeSc}')"><td colspan="5" style="padding:15px; background:#d1c4e9; font-size:18px;">📂 <b>${displaySc}</b> <span id="arrow_stop_${safeSc}" style="float:right;">${isScOpen ? '▲' : '▼'}</span></td></tr>`;
            
            grouped[sc].sort((a,b) => (a.item.name||'').localeCompare(b.item.name||'')).forEach(data => {
                let k = data.k; let item = data.item;
                
                let catOptions = `<option value="${item.cat}">${(item.cat || "Прочее").replace("!!! НОВОЕ", "Выберите...")}</option>`;
                subCats.forEach(c => { if(c !== item.cat) catOptions += `<option value="${c}">${c}</option>`; });
                catOptions += `<option value="НОВАЯ КАТЕГОРИЯ">-- Создать --</option>`;
                
                html += `<tr class="chk-row stop_${safeSc}" style="display:${displayStyle};">
                    <td><select onchange="updateVal('${k}','cat',this.value)">${catOptions}</select></td>
                    <td><select style="font-weight:bold; color:#311b92;" onchange="updateVal('${k}','name',this.value)"><option value="${item.name || ''}">${item.name || '--- Выберите из закупки ---'}</option>${optionsHtml}</select></td>
                    <td><input type="text" placeholder="Укажите напитки..." value="${item.sez || ''}" onchange="updateVal('${k}','sez',this.value)"></td>
                    <td><input type="text" placeholder="Укажите напитки..." value="${item.main || ''}" onchange="updateVal('${k}','main',this.value)"></td>
                    <td style="text-align:center;"><button class="btn-del" onclick="deleteItem('${k}')">🗑</button></td>
                </tr>`;
            });
        });
        box.innerHTML = html + "</table>";
    }

    // ==========================================
    // 8. НОВАЯ ВКЛАДКА МЕНЮ С ЭКСПОРТОМ
    // ==========================================
    function renderMenuTab() {
        const box = document.getElementById('content');
        let globalCats = ["Основное меню", "Сезонное меню"];
        Object.values(currentMenu).forEach(i => {
            if(i.globalCat && !globalCats.includes(i.globalCat)) globalCats.push(i.globalCat);
        });
        let subCats = [...new Set(Object.values(currentMenu).map(i => i.cat).filter(Boolean))];

        let isActionsOpen = expandedDivs.has('menu-actions');

        let html = `
        <h3 style="margin-top:0; margin-bottom:15px; font-size:24px; color:#4A148C;">☕ Управление Меню и Рецептами</h3>
        
        <div class="cat-group-header" style="padding: 12px 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.05);" onclick="toggleCatElements('menu-actions', 'arrow_menu_actions')">
            <span style="font-size:16px; color:#4A148C; font-weight:900;">⚡ Действия</span>
            <span id="arrow_menu_actions">${isActionsOpen ? '▲' : '▼'}</span>
        </div>
        
        <div class="menu-actions action-container" style="display: ${isActionsOpen ? 'flex' : 'none'}; flex-direction: column; margin-bottom: 20px;">
            <div style="display:flex; gap:10px; flex-wrap:wrap; width:100%;">
                <button class="btn-add" style="flex:1 1 auto;" onclick="addMenuItem()">➕ Добавить напиток</button>
                <button class="btn-save" style="flex:1 1 auto; background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);" onclick="exportMenuToExcel()">📊 Экспорт в Excel</button>
                <button class="btn-save" style="flex:1 1 auto; margin:0;" onclick="saveMenu(this)">💾 Сохранить меню</button>
            </div>
        </div>
        `;

        let allPurchaseItems = [];
        if (cachedData.catalogOrder) {
            Object.values(cachedData.catalogOrder).forEach(i => {
                if(i.name) {
                    allPurchaseItems.push(i.name);
                }
            });
            allPurchaseItems.sort((a,b) => a.localeCompare(b));
        }
        let prodOptionsHtml = allPurchaseItems.map(name => `<option value="${name.replace(/"/g, '&quot;')}">${name}</option>`).join("");
        
        html += `<datalist id="menu_ingredients_list">${prodOptionsHtml}</datalist>`;

        html += `<table style="min-width:1400px;">
        <tr>
            <th style="width:140px;">Категория</th>
            <th style="width:140px;">Подкатегория</th>
            <th style="width:160px;">Напиток</th>
            <th style="width:80px;">Цена (₽)</th>
            <th style="width:300px;">Техника приготовления</th>
            <th style="width:250px;">Рецептура (Ингредиенты)</th>
            <th style="width:60px; text-align:center;">Удалить</th>
        </tr>`;

        let grouped = {};
        Object.keys(currentMenu).forEach(k => {
            let item = currentMenu[k]; let gc = item.globalCat || "Основное меню"; let sc = item.cat || "Прочее";
            if (!grouped[gc]) grouped[gc] = {}; if (!grouped[gc][sc]) grouped[gc][sc] = [];
            grouped[gc][sc].push({k: k, item: item});
        });

        Object.keys(grouped).sort((a,b) => a.localeCompare(b)).forEach(gc => {
            let safeGc = getSafeId("menu_" + gc);
            let isGcOpen = expandedDivs.has(`menulvl2_${safeGc}`);
            
            html += `<tr class="cat-group-header" onclick="toggleCatElements('menulvl2_${safeGc}', 'arrow_menulvl2_${safeGc}')">
                        <td colspan="7" style="padding:18px; background:#d1c4e9; font-size:18px;">🌍 <b>${gc}</b> <span id="arrow_menulvl2_${safeGc}" style="float:right;">${isGcOpen?'▲':'▼'}</span></td>
                     </tr>`;
            
            Object.keys(grouped[gc]).sort((a,b) => a.localeCompare(b)).forEach(sc => {
                let safeSc = getSafeId("menu_" + gc + "_" + sc);
                let displayStyleL2 = isGcOpen ? "table-row" : "none";
                let isScOpen = expandedDivs.has(`menulvl3_${safeSc}`);
                
                html += `<tr class="cat-group-header menulvl2_${safeGc}" style="display:${displayStyleL2};" onclick="toggleCatElements('menulvl3_${safeSc}', 'arrow_menulvl3_${safeSc}')">
                            <td colspan="7" style="padding:15px; padding-left:30px; font-size:16px; background:#ede7f6;">📂 ${sc} <span id="arrow_menulvl3_${safeSc}" style="float:right;">${isScOpen?'▲':'▼'}</span></td>
                         </tr>`;
                
                let displayStyleL3 = (isGcOpen && isScOpen) ? "table-row" : "none";
                
                grouped[gc][sc].sort((a,b) => (a.item.name||'').localeCompare(b.item.name||'')).forEach(data => {
                    let k = data.k; let item = data.item;
                    
                    let gcatOptions = `<option value="${item.globalCat || 'Основное меню'}">${item.globalCat || 'Основное меню'}</option>`;
                    globalCats.forEach(c => { if(c !== (item.globalCat || 'Основное меню')) gcatOptions += `<option value="${c}">${c}</option>`; });
                    gcatOptions += `<option value="НОВАЯ ГЛОБАЛЬНАЯ">-- Создать --</option>`;
                    
                    let catOptions = `<option value="${item.cat}">${item.cat || "Прочее"}</option>`;
                    subCats.forEach(c => { if(c !== item.cat) catOptions += `<option value="${c}">${c}</option>`; });
                    catOptions += `<option value="НОВАЯ КАТЕГОРИЯ">-- Создать --</option>`;

                    let recipeHtml = `<table style="width:100%; border-collapse:collapse; background:#f9fbe7; border-radius:8px; overflow:hidden;">`;
                    if(item.recipe && item.recipe.length > 0) {
                        item.recipe.forEach((r, idx) => {
                            recipeHtml += `<tr style="border-bottom:1px solid #e0e0e0;">
                                <td style="padding:4px;">
                                    <input type="text" list="menu_ingredients_list" style="width:100%; font-size:13px; padding:6px; border-radius:6px; border:1px solid #ccc;" value="${r.name || ''}" placeholder="Ингредиент или текст..." onchange="updateMenuRecipe('${k}', ${idx}, 'name', this.value)">
                                </td>
                                <td style="padding:4px; width:70px;"><input type="text" value="${r.qty || 0}" style="width:60px; font-size:13px; text-align:center;" onchange="updateMenuRecipe('${k}', ${idx}, 'qty', this.value)"> <span style="font-size:11px;">ед.</span></td>
                                <td style="padding:4px; width:30px; text-align:center;"><button class="btn-del" style="padding:4px;" onclick="removeMenuRecipeItem('${k}', ${idx})">❌</button></td>
                            </tr>`;
                        });
                    } else {
                        recipeHtml += `<tr><td style="padding:10px; text-align:center; color:#888; font-size:13px;">Рецепт пуст</td></tr>`;
                    }
                    recipeHtml += `<tr><td colspan="3" style="padding:4px; text-align:center; background:#f1f8e9;"><button style="background:none; border:none; color:#2e7d32; font-weight:bold; cursor:pointer; font-size:13px;" onclick="addMenuRecipeItem('${k}')">+ Добавить ингредиент</button></td></tr></table>`;
                    
                    html += `<tr class="chk-row menulvl3_${safeSc} menulvl3_of_${safeGc}" style="display:${displayStyleL3}; background:#fff;">
                        <td style="padding:10px;"><select onchange="updateMenuVal('${k}','globalCat',this.value)" style="font-size:13px;">${gcatOptions}</select></td>
                        <td style="padding:10px;"><select onchange="updateMenuVal('${k}','cat',this.value)" style="font-size:13px;">${catOptions}</select></td>
                        <td style="padding:10px;">
                            <input type="text" style="font-weight:bold; font-size:15px; color:#311b92;" value="${item.name || ''}" onchange="updateMenuVal('${k}','name',this.value)">
                        </td>
                        <td style="padding:10px;"><input type="number" style="font-size:14px; font-weight:bold;" value="${item.price || 0}" onchange="updateMenuVal('${k}','price',this.value)"></td>
                        <td style="padding:10px;">
                            <textarea style="font-size:13px; width:100%; height:80px; resize:vertical; border:1px solid #ccc; border-radius:6px; padding:6px;" placeholder="Опишите процесс приготовления..." onchange="updateMenuVal('${k}','tech',this.value)">${item.tech || ''}</textarea>
                        </td>
                        <td style="padding:10px;">${recipeHtml}</td>
                        <td style="text-align:center;"><button class="btn-del" onclick="deleteMenuItem('${k}')">🗑</button></td>
                    </tr>`;
                });
            });
        });
        box.innerHTML = html + "</table>";
    }

    function updateMenuVal(id, field, val) {
        if (val === "НОВАЯ ГЛОБАЛЬНАЯ" || val === "НОВАЯ КАТЕГОРИЯ") {
            let newCat = prompt("Введите название новой категории:");
            if (newCat) currentMenu[id][field] = newCat;
        } else {
            currentMenu[id][field] = val;
        }
        renderMenuTab();
    }
    
    function addMenuItem() {
        let id = "menu_" + Date.now();
        currentMenu[id] = { globalCat: "Основное меню", cat: "Новая категория", name: "Новый напиток", price: 0, tech: "", recipe: [] };
        renderMenuTab();
    }
    
    function deleteMenuItem(id) {
        if(confirm("Удалить этот напиток из меню навсегда?")) {
            fetch(`${FB_URL}/catalogs/menu/${id}.json`, { method: 'DELETE' }).catch(()=>{});
            delete currentMenu[id];
            renderMenuTab();
        }
    }

    function updateMenuRecipe(id, idx, field, val) {
        if(!currentMenu[id].recipe) currentMenu[id].recipe = [];
        currentMenu[id].recipe[idx][field] = val;
        if(field === 'name') renderMenuTab();
    }
    
    function addMenuRecipeItem(id) {
        if(!currentMenu[id].recipe) currentMenu[id].recipe = [];
        currentMenu[id].recipe.push({name: "", qty: 0});
        renderMenuTab();
    }
    
    function removeMenuRecipeItem(id, idx) {
        currentMenu[id].recipe.splice(idx, 1);
        renderMenuTab();
    }

    async function saveMenu(btn) {
        let originalText = btn ? btn.innerHTML : "💾 Сохранить меню";
        try {
            if(btn) btn.innerHTML = "⌛ СОХРАНЕНИЕ...";
            await fetch(`${FB_URL}/catalogs/menu.json`, { method: 'PUT', body: JSON.stringify(currentMenu) });
            alert("✅ Меню успешно сохранено!");
            loadTab('menu', document.querySelector('.tab-btn.active'));
        } catch(e) {
            alert("❌ Ошибка при сохранении меню: " + e.message);
            if(btn) btn.innerHTML = originalText;
        }
    }

    function exportMenuToExcel() {
        let data = [];
        let catOrderLookup = Object.values(cachedData.catalogOrder || {});

        Object.values(currentMenu).forEach(drink => {
            let baseRow = {
                "Категория": drink.globalCat || "",
                "Подкатегория": drink.cat || "",
                "Напиток": drink.name || "",
                "Цена напитка (₽)": parseFloat(drink.price) || 0,
                "Техника приготовления": drink.tech || ""
            };
            
            if (!drink.recipe || drink.recipe.length === 0) {
                data.push(baseRow);
            } else {
                drink.recipe.forEach(r => {
                    let prod = catOrderLookup.find(c => c.name === r.name) || {};
                    data.push({
                        ...baseRow,
                        "Ингредиент": r.name || "",
                        "Кол-во (гр/мл/шт)": r.qty || 0,
                        "Поставщик": prod.vendor || "Лента",
                        "Цена ингредиента (за ед)": parseFloat(prod.price) || 0
                    });
                });
            }
        });

        if(data.length === 0) {
            alert("Меню пустое, нечего экспортировать!");
            return;
        }

        const ws = XLSX.utils.json_to_sheet(data);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Меню и Рецепты");
        XLSX.writeFile(wb, "Coffee_Menu_Recipes.xlsx");
    }

    // ==========================================
    // ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ
    // ==========================================
    function updateVal(id, field, val) { 
        if (val === "НОВАЯ ГЛОБАЛЬНАЯ" || val === "НОВАЯ КАТЕГОРИЯ") {
            let newCat = prompt("Введите название новой категории:");
            if (newCat) {
                currentCatalog[id][field] = newCat;
                if (currentPath.includes('order')) renderCatalogOrder();
                else if (currentPath.includes('stoplist')) renderCatalogStoplist();
                else renderCatalogChecklist();
            } else {
                if (currentPath.includes('order')) renderCatalogOrder();
                else if (currentPath.includes('stoplist')) renderCatalogStoplist();
                else renderCatalogChecklist();
                return;
            }
        } else {
            currentCatalog[id][field] = val; 
        }
    }
    
    function addItemOrder() { 
        let id = "item_" + Date.now(); 
        currentCatalog[id] = { globalCat: "!!! НОВОЕ", cat: "!!! НОВОЕ", name: "Новая позиция", photo: "", vendor: "Лента", price: 0, price2: 0, link: "", link2: "", fallback: "" }; 
        renderCatalogOrder();
    }
    
    function addItemChecklist() { 
        let id = "item_" + Date.now(); 
        currentCatalog[id] = { globalCat: "!!! НОВОЕ", cat: "!!! НОВОЕ", name: "Новая позиция", photo: "", unit: "текст" }; 
        renderCatalogChecklist();
    }

    function addItemStoplist() { 
        let id = "stop_" + Date.now(); 
        currentCatalog[id] = { cat: "Новая", name: "", sez: "", main: "" }; 
        renderCatalogStoplist();
    }
    
    async function deleteItem(id) { 
        if(confirm("Вы уверены, что хотите УДАЛИТЬ эту позицию НАВСЕГДА?")) { 
            await fetch(`${FB_URL}/${currentPath}/${id}.json`, { method: 'DELETE' });
            delete currentCatalog[id]; 
            loadTab(currentTabType, document.querySelector('.tab-btn.active'));
        } 
    }

    async function deleteOrder(key) {
        if(confirm("Вы уверены, что хотите УДАЛИТЬ этот заказ навсегда?")) {
            await fetch(`${FB_URL}/orders/${key}.json`, { method: 'DELETE' });
            delete cachedData.orders[key]; 
            if (currentTabType === 'orders') renderOrdersSvod();
            if (currentTabType === 'stoplists') renderStoplists();
        }
    }

    async function toggleSetting(key, val) {
        appSettings[key] = val;
        await fetch(`${FB_URL}/settings.json`, { method: 'PUT', body: JSON.stringify(appSettings) });
    }

    async function toggleHiddenCategory(cat, isHidden) {
        appSettings.hidden_categories[cat] = isHidden;
        await fetch(`${FB_URL}/settings/hidden_categories.json`, { method: 'PUT', body: JSON.stringify(appSettings.hidden_categories) });
    }

    async function saveCatalog(btn) {
        let originalText = btn ? btn.innerHTML : "💾 Сохранить в базу";
        if (btn) btn.innerHTML = "⌛ СОХРАНЕНИЕ...";
        try { 
            await fetch(`${FB_URL}/${currentPath}.json`, { method: 'PUT', body: JSON.stringify(currentCatalog) }); 
            alert("✅ База обновлена и мгновенно доступна сотрудникам!"); 
            loadTab(currentTabType, document.querySelector('.tab-btn.active'));
        } catch(e) { 
            alert("❌ Ошибка при сохранении!"); 
            if (btn) btn.innerHTML = originalText;
        }
    }

    // ==========================================
    // ФОНОВОЕ ОБНОВЛЕНИЕ ДАННЫХ (Тихое)
    // ==========================================
    async function quietRefreshOrders() {
        if (currentTabType !== 'orders' || isSvodEditMode) return;
        try {
            let ordersSnap = await firebase.database().ref("orders").limitToLast(1500).once("value");
            let ordersObj = ordersSnap.val() || {};
            Object.keys(ordersObj).forEach(k => { if (ordersObj[k]) ordersObj[k].key = k; });
            cachedData.orders = ordersObj;
            renderOrdersSvod();
        } catch(e) {}
    }
    
    setInterval(quietRefreshOrders, 15000);

    // Загрузка нужной вкладки при старте
    window.onload = () => {
        loadUIState();
        let savedTab = localStorage.getItem('activeTab') || 'orders';
        let tabBtn = document.querySelector(`.tab-btn[onclick*="'${savedTab}'"]`) || document.querySelector('.tab-btn.active');
        loadTab(savedTab, tabBtn);
    };
</script>
