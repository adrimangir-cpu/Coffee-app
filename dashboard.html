    <style>
        /* =========================================
           ОБЩИЕ СТИЛИ И САЙДБАР (БОКОВОЕ МЕНЮ)
        ========================================= */
        * { box-sizing: border-box; }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;

        /* =========================================
           ОСНОВНОЙ КОНТЕНТ И ПЛАВАЮЩАЯ ПАНЕЛЬ ДЕЙСТВИЙ
        ========================================= */

        .close-sidebar-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 5px 10px; border-radius: 6px; cursor: pointer; font-weight: bold;}

        .action-bar-toggle-btn { background: #ede7f6; color: #4A148C; font-weight: 900; text-align: center; padding: 12px; border-radius: 12px; cursor: pointer; border: 1px dashed #b39ddb; margin-bottom: 10px; transition: 0.2s; }
        .action-bar-toggle-btn:hover { background: #d1c4e9; }
        
        #dynamic-action-bar {
            background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(8px); padding: 15px; border-radius: 16px; 
            box-shadow: 0 10px 30px rgba(49, 27, 146, 0.15); border: 2px solid #e1bee7; margin-bottom: 20px;

           ПОЛЯ ВВОДА И ТАБЛИЦЫ

       /* Стили для таблицы графиков и скролла */
        .graphs-wrapper {
            max-height: 70vh; /* ⚡ Ограничиваем высоту экраном, чтобы нижний ползунок всегда был на виду */
            overflow: auto;

        .graphs-wrapper table { 
            margin-top: 0; 
            table-layout: fixed; 
            width: auto; 
            min-width: 100%;
            border-collapse: separate; /* ⚡ Важно для липкой шапки */
            border-spacing: 0;

        .graphs-wrapper th, .graphs-wrapper td { 
            border: 1px solid #ccc;
            padding: 4px;
            text-align: center;

        /* ⚡ ЖЕЛЕЗОБЕТОННОЕ ЗАКРЕПЛЕНИЕ ШАПКИ (ИМЕНА) */
        .graphs-wrapper thead th {
            position: sticky;
            top: 0;
            z-index: 50; /* ⚡ Поверх всего контента таблицы */
            background: #e8eaf6;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            border-top: none;

        /* Подсветка строки в графике при наведении и редактировании */
        .graph-row { transition: background-color 0.2s; }
        .graph-row:hover td { background-color: #f1f8e9 !important; cursor: pointer; }
        .graph-row:focus-within td { background-color: #e3f2fd !important; }
        
        .graphs-wrapper th.user-header-cell, .graphs-wrapper td.user-data-cell {

        }
        
        .graphs-wrapper th.check-cell, .graphs-wrapper td.check-cell {

            min-width: 340px;
            text-align: left;
        }
        
        .graph-input {
            width: 100%; min-width: 50px; border: none; text-align: center; font-size: 15px; 
            text-transform: uppercase; background: transparent; font-weight: 900; color: #333; outline: none;
        }
        .graph-input:focus { background: #fffde7; }

        /* Расширение инпутов для цен */
        .price-input-container input[type="number"], 
        .price-input-container input[type="text"] {
            min-width: 110px !important;
            width: 130px !important;
        }
        
        input[list]:focus, input[type="text"]:focus, input[type="number"]:focus {
        background-color: #ffffff !important;
        border-color: #4CAF50 !important;
    }

        /* ⚡ АДАПТАЦИЯ ДЛЯ ТЕЛЕФОНОВ (MOBILE FRIENDLY) */
        @media (max-width: 900px) {
            .sidebar { transform: translateX(-100%); z-index: 4000; width: 280px; }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0 !important; min-width: 100vw !important; width: 100vw; padding: 10px; overflow-x: hidden; }
            .top-nav { flex-direction: column; align-items: stretch; gap: 10px; }
            .top-nav h2 { font-size: 18px !important; }
            
            #mobile-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 3500; }
            #mobile-overlay.show { display: block; }
            
            .action-container { flex-direction: column !important; }
            .action-container button { width: 100%; margin-left: 0 !important; margin-right: 0 !important; }
            
            .summary-block { flex-direction: column; align-items: center; text-align: center; }
            .summary-total { border-left: none !important; border-top: 2px solid #eee; padding-left: 0 !important; padding-top: 15px; width: 100%; }
            
            #dynamic-action-bar { padding: 10px; }
        }
        
    </style>
</head>
<body>

<!-- ⚡ ОСНОВНОЙ КОНТЕНТ С ПЛАВАЮЩЕЙ ПАНЕЛЬЮ КНОПОК -->
<div id="main-content" class="main-content expanded">
    <div class="top-nav">
        <div style="display:flex; align-items:center; gap:15px;">
            <button onclick="toggleSidebar()" class="open-sidebar-btn">☰ Вкладки</button>
            <h2 style="margin:0; font-size:22px; color:#311B92;" id="page-title-display">Свод и Заказы</h2>

        <div id="db-status" style="font-size:14px; font-weight:bold; color:#2e7d32; background:#e8f5e9; padding:8px 12px; border-radius:8px;">☁️ База активна</div>

</div>

<script>
   // ==========================================
    // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ И ПОДКЛЮЧЕНИЕ
    // ==========================================
    const FB_URL = "https://project-lenta22-default-rtdb.firebaseio.com"; // ⚡ ВОЗВРАЩАЕМ ЭТУ СТРОЧКУ!
    const ADMIN_CHAT_ID = "708179577"; 
    const BOSS_CHAT_ID = "634812312";   
    let catalogChanges = {}; // Трекер изменений для закупки/чек-листов
    let menuChanges = {};    // Трекер изменений для техкарт напитков
    const firebaseConfig = {
      apiKey: "AIzaSyDQ_-YPu7gxKruOzOFy_zeNfDqF3xs3xts",
      authDomain: "project-lenta22.firebaseapp.com",
      databaseURL: FB_URL, // Берем ссылку из нашей переменной
      projectId: "project-lenta22",
      messagingSenderId: "710046255007",
      appId: "1:710046255007:web:0f67964bee3c88253adfaa"
    };
    
    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    
    const db = firebase.database();
    
    // ⚡ ГЛОБАЛЬНЫЙ ПЕРЕХВАТЧИК "Failed to fetch" (ЛЕЧИТ БЛОКИРОВКИ СЕТИ) ⚡
    const originalFetch = window.fetch;
    window.fetch = async function(url, options = {}) {
        if (typeof url === 'string' && url.startsWith(FB_URL)) {
            let method = (options.method || 'GET').toUpperCase();
            let path = new URL(url).pathname.replace(/^\//, '').replace(/\.json$/, '');
            try {
                if (method === 'GET') {
                    let snap = await db.ref(path).once('value');
                    return { ok: true, json: async () => snap.val() };
                } else if (method === 'PUT') {
                    let data = options.body ? JSON.parse(options.body) : null;
                    await db.ref(path).set(data);
                    return { ok: true, json: async () => data };
                } else if (method === 'PATCH') {
                    let data = options.body ? JSON.parse(options.body) : null;
                    await db.ref(path).update(data);
                    return { ok: true, json: async () => data };
                } else if (method === 'POST') {
                    let data = options.body ? JSON.parse(options.body) : null;
                    let ref = await db.ref(path).push(data);
                    return { ok: true, json: async () => ({ name: ref.key }) };
                } else if (method === 'DELETE') {
                    await db.ref(path).remove();
                    return { ok: true, json: async () => null };
                }
            } catch (e) {
                console.error("Firebase SDK Override Error:", e);
                throw new TypeError("Failed to fetch");
            }
        }
        return originalFetch.apply(this, arguments);
    };
    
    let currentCatalog = {};
    let currentMenu = {}; 
    let currentPath = "";
    let currentTabType = "";
    let isNewShopCatalog = false; 
    let appSettings = { hidden_categories: {}, new_shop_order_active: false };
    let cachedData = {};
    
    // Режимы редактирования и память
    let isChecklistEditMode = false;
    let isSvodEditMode = false;
    let svodDeletions = []; 
    let tempSvodQty = {}; 
    let tempSvodStatus = {}; 
    let tempSvodVendor = {}; 
    let tempSvodShop = {};
    let tempSvodNewRows = []; 
    
    let isMissingEditMode = false;
    let missingDeletions = new Set();
    let tempMissingStatus = {};
    
    let isMpEditMode = false;
    let mpDeletions = new Set();
    let mpViewMonth = 'current';

    let graphViewMonth = 'next'; // По умолчанию показываем следующий месяц
    let isGraphCompareMode = false;
    let originalGraphDraft = null;
    
    let expandedDivs = new Set();
    const shopListAll = ["Бояринова", "Гагарина", "Вертолетчиков", "Липчанского", "Новокосино", "Новокосино 2", "Старое Павлино", "Красноказарменная", "Ухтомского ополчения"];
    let draggedRecipeItem = null;

    // ⚡ АВТО-МИГРАЦИЯ: Спасаем потерянные недовозы из мини-приложения
    setTimeout(() => {
        db.ref('push_items_missing').once('value', snap => {
            let badData = snap.val();
            if (badData) {
                let updates = {};
                for (let k in badData) {
                    updates[`missing_items/${k}`] = badData[k];
                    updates[`push_items_missing/${k}`] = null;
                }
                db.ref().update(updates);
                console.log("✅ Недовозы успешно перенесены в правильную базу!");
            }
        });
    }, 2000);

    // ⚡ СТРОГАЯ ЛОГИКА ДЛЯ СВЕРКИ ПОВТОРОВ И НЕДОВОЗОВ
    window.getOzonRepeatStatus = function(shop, itemName, cachedData, vendor) {
        if (!cachedData || !cachedData.orders) return { isRepeat: false, isReceived: false, dateStr: "" };
        
        let pastOrders = Object.values(cachedData.orders)
            .filter(o => o && (o.mode === 'order' || o.mode === 'new_shop') && o.ordered && o.shop === shop)
            .sort((a,b) => b.timestamp - a.timestamp);
        
        if (pastOrders.length === 0) return { isRepeat: false, isReceived: false, dateStr: "" };

        let lastOrder = pastOrders[0];
        let lastOrderItems = Array.isArray(lastOrder.items) ? lastOrder.items : (typeof lastOrder.items === 'object' && lastOrder.items !== null ? Object.values(lastOrder.items) : []);
        
        let exactNameLow = String(itemName).trim().toLowerCase();
        let itemInLast = lastOrderItems.find(i => 
            i && String(i.name).trim().toLowerCase() === exactNameLow && 
            (i.status === 'ordered' || i.status === 'already_received' || i.status === 'from_stoplist')
        );
        
        if (!itemInLast) return { isRepeat: false, isReceived: false, dateStr: "" };

        let isReceived = false;
        let dateStr = "";

        let missingData = cachedData.missing || {};
        let missingItem = Object.values(missingData)
            .sort((a,b) => b.timestamp - a.timestamp)
            .find(m => m && m.shop === shop && String(m.name).trim().toLowerCase() === exactNameLow && m.timestamp >= (lastOrder.timestamp - 5000));

        let vLower = (vendor || 'озон').toLowerCase();
        let isOzon = vLower.includes('озон') || vLower.includes('ozon');
        let isKuper = vLower.includes('купер') || vLower.includes('kuper');
        let isLenta = vLower.includes('лента') || vLower.includes('lenta');
        
        let orderReceivedFlag = false;
        let orderReceivedTs = lastOrder.timestamp;

        if (isOzon) {
            orderReceivedFlag = lastOrder.ozon_received;
            if (lastOrder.ozon_received_ts) orderReceivedTs = lastOrder.ozon_received_ts;
        } else if (isKuper) {
            orderReceivedFlag = lastOrder.kuper_received;
            if (lastOrder.kuper_received_ts) orderReceivedTs = lastOrder.kuper_received_ts;
        } else if (isLenta) {
            orderReceivedFlag = lastOrder.lenta_received;
            if (lastOrder.lenta_received_ts) orderReceivedTs = lastOrder.lenta_received_ts;
        }

        // ⚡ ВАЖНО: Если товар есть в Недовозах, он НЕ принят, пока у него статус не станет arrived!
        if (missingItem) {
            if (missingItem.status === 'arrived') {
                isReceived = true;
                dateStr = new Date(missingItem.timestamp).toLocaleDateString('ru-RU', {day: '2-digit', month: '2-digit'});
            } else {
                isReceived = false; // Точно недовоз!
                dateStr = ""; 
            }
        } else {
            // Если товара нет в недовозах, смотрим на статус приемки заказа
            if (orderReceivedFlag) {
                isReceived = true;
                dateStr = new Date(orderReceivedTs).toLocaleDateString('ru-RU', {day: '2-digit', month: '2-digit'});
            }
        }
        
        return { isRepeat: true, isReceived: isReceived, dateStr: dateStr };
    };

    // ПРОФЕССИОНАЛЬНЫЙ УЛЬТРА-КЭШ ДЛЯ ДАШБОРДА
    // ==========================================
    const IDB_NAME = "TeikuDashboardDB";
    const IDB_STORE = "dashboardStore";

    function initIndexedDB() {
        return new Promise((resolve) => {
            let request = indexedDB.open(IDB_NAME, 1);
            request.onupgradeneeded = function(event) {
                let db = event.target.result;
                if (!db.objectStoreNames.contains(IDB_STORE)) db.createObjectStore(IDB_STORE);
            };
            request.onsuccess = () => resolve(request.result);
            request.onerror = () => resolve(null);
        });
    }

    async function saveToCache(path, data) {
        try {
            let db = await initIndexedDB();
            if (db) db.transaction(IDB_STORE, "readwrite").objectStore(IDB_STORE).put(data, path);
        } catch (e) {}
    }

    async function loadFromCache(path) {
        try {
            let db = await initIndexedDB();
            if (!db) return null;
            return new Promise(resolve => {
                let req = db.transaction(IDB_STORE, "readonly").objectStore(IDB_STORE).get(path);
                req.onsuccess = () => resolve(req.result);
                req.onerror = () => resolve(null);
            });
        } catch (e) { return null; }
    }

    async function fetchOptimistic(path) {
        let cached = await loadFromCache(path);
        
        // ⚡ Сетевой запрос уходит чисто в фон, чтобы не тормозить переключение вкладок
        fetch(`${FB_URL}/${path}.json`).then(r => r.json()).then(data => {
            let finalData = data || {};
            saveToCache(path, finalData); // Тихо обновляем кэш на фоне
        }).catch(e => null);

        if (cached && Object.keys(cached).length > 0) {
            return cached; // ⚡ МГНОВЕННО отдаем данные из памяти
        } else {
            // Ждем ответа от сети ТОЛЬКО если кэш абсолютно пустой (самый первый запуск)
            let fresh = await fetch(`${FB_URL}/${path}.json`).then(r => r.json()).catch(e => null);
            if (fresh) saveToCache(path, fresh);
            return fresh || {};
        }
    }

    // Функция для тяжелых фото: мгновенно из кэша, потом тихо обновляет
    async function fetchHeavyCatalog(pathKey) {
        let cached = await loadFromCache(pathKey);
        // Фоновое тихое обновление (не заставляет экран виснуть)
        fetch(`${FB_URL}/${pathKey}.json`).then(r=>r.json()).then(d=>{ if(d) saveToCache(pathKey, d); }).catch(e=>{});
        if (cached) return cached; // Если есть кэш - отдаем сразу!
        
        // Если кэша нет (самый первый запуск) - ждем сеть
        let d = await fetch(`${FB_URL}/${pathKey}.json`).then(r=>r.json()).catch(e=>({}));
        if (d) saveToCache(pathKey, d);
        return d || {};
    }

    // Функция для быстрых текстовых данных (всегда свежие заказы и графики)
    async function fetchDynamicData(pathKey) {
        return await fetch(`${FB_URL}/${pathKey}.json`).then(r=>r.json()).catch(e=>({})) || {};
    }
    
    function escCss(str) {
        if (!str) return "";
        return str.replace(/\\/g, '\\\\').replace(/"/g, '\\"').replace(/'/g, "\\'");
    }

    function cleanName(str) {
        if (!str) return "";
        return str.toLowerCase()
            .replace(/ё/g, 'е')
            .replace(/\([^)]*\)/g, '') 
            .replace(/[0-9.,]+\s*(кг|г|мл|л|шт)/g, '') 
            .replace(/(брекет|коробка)/g, '') 
            .replace(/[^a-zа-я0-9]/g, ''); 
    }

    function escapeName(str) {
        return String(str).replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, '&quot;');
    }

    function loadUIState() {
        try { expandedDivs = new Set(JSON.parse(localStorage.getItem('expandedDivs') || '[]')); } catch(e) {}
    }

    function updateExpanded(id, isOpen) {
        if(isOpen) expandedDivs.add(id); else expandedDivs.delete(id);
        localStorage.setItem('expandedDivs', JSON.stringify([...expandedDivs]));
    }

    function getSafeId(str) {
        if (!str) return "id_empty_" + Math.floor(Math.random() * 10000);
        let res = "";
        for (let i = 0; i < str.length; i++) res += str.charCodeAt(i).toString(16);
        return "id_" + res;
    }

   // ⚡ ЕДИНАЯ ПЛАВАЮЩАЯ ПАНЕЛЬ (БЕЗ ДУБЛЕЙ И ОБРЕЗАНИЙ)
    function setupUniversalActionBar(htmlContent, isOpen, toggleId) {
        let uab = document.getElementById('dynamic-action-bar');
        let wrapper = document.getElementById('action-bar-wrapper');
        
        let toggleBtn = document.getElementById('main-action-toggle');
        if (!toggleBtn) {
            toggleBtn = document.createElement('div');
            toggleBtn.id = 'main-action-toggle';
            toggleBtn.className = 'action-bar-toggle-btn';
            wrapper.insertBefore(toggleBtn, uab);
            
            toggleBtn.onclick = function() {
                let contentDiv = uab.querySelector('.action-panel-dropdown');
                if (contentDiv) {
                    let isHidden = contentDiv.style.display === 'none';
                    contentDiv.style.display = isHidden ? 'flex' : 'none';
                    toggleBtn.innerHTML = isHidden ? '⚙️ Скрыть панель действий ▲' : '⚙️ Показать действия и настройки ▼';
                    updateExpanded('main_action_bar_state', isHidden); // Запоминаем состояние
                }
            };
        }

        if (!htmlContent) { 
            uab.style.display = 'none'; 
            uab.innerHTML = ''; 
            toggleBtn.style.display = 'none';
            return; 
        }
        
        uab.innerHTML = htmlContent; 
        uab.style.display = 'block';
        toggleBtn.style.display = 'block';

        // ⚡ Берем состояние из памяти
        let isMemoryOpen = expandedDivs.has('main_action_bar_state');
        let finalOpen = isOpen || isMemoryOpen;

        let contentDiv = uab.querySelector('.action-panel-dropdown');
        if (contentDiv) {
            contentDiv.style.display = finalOpen ? 'flex' : 'none';
            toggleBtn.innerHTML = finalOpen ? '⚙️ Скрыть панель действий ▲' : '⚙️ Показать действия и настройки ▼';

        // Убираем старые "шапки" у кнопок внутри экшен-бара, так как теперь есть единая главная кнопка
        let internalHeaders = uab.querySelectorAll('.cat-group-header');
        internalHeaders.forEach(h => h.style.display = 'none');
    }


    function toggleCatElements(cls, arrowId) { 
        let els = document.querySelectorAll('.' + cls);
        if (els.length === 0) return;
        
        let isOpening = els[0].style.display === 'none';
        
        // ⚡ ИСПРАВЛЕНИЕ: Теперь система будет запоминать состояние панелей действий!
        updateExpanded(cls, isOpening);
        
        els.forEach(el => {
            if (el.tagName === 'TR') el.style.display = isOpening ? 'table-row' : 'none';
            else if (el.classList.contains('action-container') || el.style.gap) el.style.display = isOpening ? 'flex' : 'none';
            else el.style.display = isOpening ? 'block' : 'none';
        }); 
        
        if (arrowId) {
            let arrowEl = document.getElementById(arrowId);
            if (arrowEl) arrowEl.innerText = isOpening ? "▲" : "▼";
        }
    }

    function toggleLvl1(gcId) {
        let subs = document.querySelectorAll('.lvl2_' + gcId);
        if (subs.length === 0) return;
        
        let isClosing = subs[0].style.display !== 'none';
        updateExpanded('lvl2_' + gcId, !isClosing);
        
        let arrowEl = document.getElementById('arrow_lvl1_' + gcId) || document.getElementById('arrow_lvl1_' + gcId.replace(/^(chksub_|stopsub_|menu_)/, ''));
        if (arrowEl) arrowEl.innerText = isClosing ? "▼" : "▲";

        subs.forEach(el => {
            el.style.display = isClosing ? 'none' : 'table-row';
        });

        if (isClosing) {
            // ⚡ 1. Прячем все товары внутри
            document.querySelectorAll('.lvl3_of_' + gcId).forEach(el => el.style.display = 'none');
            
            // ⚡ 2. Жестко "забываем" состояние подкатегорий (сворачиваем их лесенкой)
            subs.forEach(sub => {
                let onclickAttr = sub.getAttribute('onclick');
                if (onclickAttr) {
                    let matchTarget = onclickAttr.match(/toggleCatElements\('([^']+)'/);
                    let matchArrow = onclickAttr.match(/,\s*'([^']+)'/);
                    if (matchTarget && matchTarget[1]) updateExpanded(matchTarget[1], false); // Стираем из памяти
                    if (matchArrow && matchArrow[1]) {
                        let a = document.getElementById(matchArrow[1]);
                        if (a) a.innerText = "▼"; // Меняем стрелочку на закрытую
                    }
                }
            });
        }
    }

    async function syncStoplistWithMenu() {
        let seasonChoice = prompt("Введите название сезонной категории (например: Сезонное меню), из которой нужно подтянуть напитки:", "Сезонное меню");
        if (!seasonChoice) return;
        seasonChoice = seasonChoice.trim();

        showReportOverlay("Синхронизация с техкартами...");
        try {
            let resMenu = await fetch(`${FB_URL}/catalogs/menu.json`).then(r => r.json()) || {};
            let resStop = await fetch(`${FB_URL}/catalogs/stoplist.json`).then(r => r.json()) || {};
            
            let updatedStoplist = { ...resStop };
            let seasonIngredients = {};

            // 1. Ищем ингредиенты ТОЛЬКО в выбранном сезоне
            Object.values(resMenu).forEach(drink => {
                if (!drink || !drink.name) return;
                
                let gc = drink.globalCat || "Основное меню";
                if (gc.toLowerCase() !== seasonChoice.toLowerCase()) return; // Пропускаем всё, кроме сезона
                
                let blocks = drink.blocks || [drink.recipe || []];
                blocks.forEach(block => {
                    if (!block) return;
                    block.forEach(ingredient => {
                        if (!ingredient || !ingredient.name) return;
                        
                        let ingName = ingredient.name.trim();
                        if (!seasonIngredients[ingName]) seasonIngredients[ingName] = new Set();
                        seasonIngredients[ingName].add(drink.name);
                    });
                });
            });

            // 2. Добавляем/обновляем ТОЛЬКО строки выбранного сезона
            let changes = 0;
            for (let prodName in seasonIngredients) {
                let seasonDrinksStr = Array.from(seasonIngredients[prodName]).sort().join(", ");
                
                // Ищем категорию
                let catName = "Прочее";
                if (cachedData.catalogOrder) {
                    let foundInOrder = Object.values(cachedData.catalogOrder).find(c => c && cleanName(c.name) === cleanName(prodName));
                    if (foundInOrder && foundInOrder.cat) catName = foundInOrder.cat;
                }
                if (prodName.toLowerCase().includes("сироп")) catName = "Сиропы";

                // Ищем существующую строку ЭТОГО сезона для ЭТОГО продукта
                let existingKey = Object.keys(updatedStoplist).find(k => 
                    updatedStoplist[k] && 
                    cleanName(updatedStoplist[k].name) === cleanName(prodName) &&
                    (updatedStoplist[k].globalCat || "").toLowerCase() === seasonChoice.toLowerCase()
                );

                if (existingKey) {
                    // Обновляем только столбец сезона, столбец основы не трогаем!
                    updatedStoplist[existingKey].sez = seasonDrinksStr;
                    if(catName === "Сиропы") updatedStoplist[existingKey].cat = "Сиропы";
                    changes++;
                } else {
                    // Создаем новую строку для сезона (Основа пустая)
                    let newId = "stop_auto_s_" + Date.now() + Math.floor(Math.random() * 10000);
                    updatedStoplist[newId] = {
                        globalCat: seasonChoice, 
                        cat: catName,
                        name: prodName,
                        sez: seasonDrinksStr,
                        main: "" 
                    };
                    changes++;
                }
            }

            await fetch(`${FB_URL}/catalogs/stoplist.json`, { method: 'PUT', body: JSON.stringify(updatedStoplist) });
            currentCatalog = updatedStoplist;
            
            hideReportOverlay();
            alert(`✅ Синхронизация завершена!\nНайдено продуктов в сезоне "${seasonChoice}": ${Object.keys(seasonIngredients).length}.\nВсе они записаны в справочник (Отключает Основное = пусто).`);
            renderCatalogStoplist();
        } catch (e) {
            hideReportOverlay();
            alert("❌ Ошибка при синхронизации: " + e.message);
        }
    }

    function crossFillDrinks() {
        let seasonChoice = prompt("С какой сезонной категорией взаимозаполнить Основное меню?\n(Введите название, например: Сезонное меню)", "Сезонное меню");
        if (!seasonChoice) return;
        seasonChoice = seasonChoice.trim();

        let changesCount = 0;
        
        // 1. ОЧИСТКА: Удаляем сезонные позиции СТРОГО ТОЛЬКО в Основном меню
        Object.keys(currentCatalog).forEach(k => {
            let item = currentCatalog[k];
            let gc = item.globalCat || "Основное меню";
            if (gc.toLowerCase() === "основное меню" && item.sez && item.sez.trim() !== "") {
                item.sez = "";
                changesCount++;
            }
        });

        // 2. ПОИСК СОВПАДЕНИЙ
        let mainItems = {}; // Ключ: имя продукта, Значение: список id из основного меню
        let seasonItems = {}; // Ключ: имя продукта, Значение: список id из сезона
        
        Object.keys(currentCatalog).forEach(k => {
            let item = currentCatalog[k];
            if (!item || !item.name) return;
            
            let nameKey = cleanName(item.name);
            let gc = item.globalCat || "Основное меню";
            
            if (gc.toLowerCase() === "основное меню") {
                if (!mainItems[nameKey]) mainItems[nameKey] = [];
                mainItems[nameKey].push(k);
            } else if (gc.toLowerCase() === seasonChoice.toLowerCase()) {
                if (!seasonItems[nameKey]) seasonItems[nameKey] = [];
                seasonItems[nameKey].push(k);
            }
        });

        // 3. ВЗАИМОЗАПОЛНЕНИЕ (только там, где есть совпадения продуктов)
        Object.keys(mainItems).forEach(nameKey => {
            // Если продукт есть и в Основном, и в Сезонном
            if (seasonItems[nameKey]) {
                
                // Собираем все основные напитки из Основного меню
                let allMainDrinks = new Set();
                mainItems[nameKey].forEach(k => {
                    let mainStr = currentCatalog[k].main || "";
                    mainStr.split(',').forEach(d => { if(d.trim()) allMainDrinks.add(d.trim()); });
                });
                let mergedMain = Array.from(allMainDrinks).sort().join(", ");

                // Собираем все сезонные напитки из Сезонного меню
                let allSeasonDrinks = new Set();
                seasonItems[nameKey].forEach(k => {
                    let sezStr = currentCatalog[k].sez || "";
                    sezStr.split(',').forEach(d => { if(d.trim()) allSeasonDrinks.add(d.trim()); });
                });
                let mergedSez = Array.from(allSeasonDrinks).sort().join(", ");

                // В Основном меню: записываем собранные сезонные напитки 
                mainItems[nameKey].forEach(k => {
                    if (currentCatalog[k].sez !== mergedSez) {
                        currentCatalog[k].sez = mergedSez;
                        changesCount++;
                    }
                });

                // В Сезонном меню: записываем собранные основные напитки
                seasonItems[nameKey].forEach(k => {
                    if (currentCatalog[k].main !== mergedMain) {
                        currentCatalog[k].main = mergedMain;
                        changesCount++;
                    }
                });
            }
        });

        if (changesCount > 0) {
            alert(`✅ Напитки успешно взаимозаполнены между Основным меню и ${seasonChoice}!\nОбновлено записей: ${changesCount}.\nНе забудьте нажать "💾 Сохранить в базу".`);
            renderCatalogStoplist();
        } else {
            alert(`ℹ️ Изменений не произошло.\nПродукты либо не совпали, либо уже заполнены.`);
        }
    }

    // ⚡ ФУНКЦИЯ СЖАТИЯ: Уменьшает вес фото в 20 раз перед отправкой
    function compressImageToBase64(file, maxWidth = 600, quality = 0.7) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = event => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;

                    if (width > maxWidth) {
                        height = Math.round(height * (maxWidth / width));
                        width = maxWidth;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Получаем легкую микро-строку Base64 вместо тяжелого файла
                    const compressedBase64 = canvas.toDataURL('image/jpeg', quality);
                    resolve(compressedBase64);
                };
                img.onerror = error => reject(error);
            };
            reader.onerror = error => reject(error);
        });
    }

            let sevenDaysAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);

            Object.values(orders).forEach(o => {
                if (!o) return;
                if (o.mode === 'stoplist_fill') {
                    if (!latestStoplistMap[o.shop] || o.timestamp > latestStoplistMap[o.shop].timestamp) {
                        latestStoplistMap[o.shop] = o;
                    }
                }
                if ((o.mode === 'order' || o.mode === 'new_shop') && (!o.lenta_received && !o.ozon_received)) {
                    if (!o.ordered || o.timestamp >= sevenDaysAgo) {
                        if (!activeOrdersMap[o.shop]) activeOrdersMap[o.shop] = {};
                        let itemsArr = Array.isArray(o.items) ? o.items : (typeof o.items === 'object' && o.items !== null ? Object.values(o.items) : []);
                        itemsArr = itemsArr.filter(i => i !== null && i !== undefined);

                        itemsArr.forEach(i => {
                            if (i && i.name && i.name !== "НЕТ ЗАКАЗА") {
                                let cName = cleanName(i.name);
                                let stat = 'pending';
                                if (o.svod) {
                                    if (i.status === 'error' || i.bot_error) stat = 'error';
                                    else if (i.status === 'ordered') stat = 'ordered';
                                    else if (i.status === 'not_needed') stat = 'not_needed';
                                    else if (i.status === 'from_stoplist') stat = 'from_stoplist';
                                }
                                if (o.ordered && !o.svod) stat = 'ordered'; 
                                
                                if (stat !== 'error' && stat !== 'not_needed') {
                                    activeOrdersMap[o.shop][cName] = stat;
                                }
                            }
                        });
                    }
                }
            });

            let newItemsToAppend = {};

            for (let shop in latestStoplistMap) {
                let stop = latestStoplistMap[shop];
                let itemsArr = Array.isArray(stop.items) ? stop.items : (typeof stop.items === 'object' && stop.items !== null ? Object.values(stop.items) : []);
                itemsArr = itemsArr.filter(i => i !== null && i !== undefined);
                
                itemsArr.forEach(i => {
                    if (i && i.name && i.qty === 'Закончилось') {
                        let cName = cleanName(i.name);
                        let catItem = Object.values(catalog || {}).find(c => c && cleanName(c.name) === cName);
                        
                        if (catItem) {
                            let isTransit = missingStatusMap[shop] && (missingStatusMap[shop][cName] === 'transit' || missingStatusMap[shop][cName] === 'pending');
                            let isActiveOrder = activeOrdersMap[shop] && activeOrdersMap[shop][cName] !== undefined;

                            if (!isTransit && !isActiveOrder) {
                                if (!newItemsToAppend[shop]) newItemsToAppend[shop] = [];
                                newItemsToAppend[shop].push({
                                    name: catItem.name,
                                    qty: 1, 
                                    vendor: catItem.vendor || 'Лента',
                                    status: 'from_stoplist',
                                    bot_error: false,
                                    cat: catItem.cat || "Прочее"
                                });
                            }
                        }
                    }
                });
            }

            if (Object.keys(newItemsToAppend).length === 0) {
                hideReportOverlay();
                alert("✅ Все товары из стоп-листов уже добавлены в закупку или находятся в пути!");
                return;
            }

            let updates = {};
            for (let shop in newItemsToAppend) {
                let targetOrderKey = Object.keys(orders).find(k => {
                    let o = orders[k];
                    return o && o.shop === shop && !o.ordered && (o.mode === 'order' || o.mode === 'new_shop');
                });

                if (targetOrderKey) {
                    let currentItems = Array.isArray(orders[targetOrderKey].items) ? orders[targetOrderKey].items : (typeof orders[targetOrderKey].items === 'object' && orders[targetOrderKey].items !== null ? Object.values(orders[targetOrderKey].items) : []);
                    currentItems = currentItems.filter(i => i !== null && i !== undefined && i.name !== 'НЕТ ЗАКАЗА');
                    newItemsToAppend[shop].forEach(ni => currentItems.push(ni));
                    updates[targetOrderKey + "/items"] = currentItems;
                } else {
                    let newKey = "auto_" + Date.now() + Math.random().toString(36).substr(2, 5);
                    updates[newKey] = {
                        shop: shop,
                        mode: 'order',
                        items: newItemsToAppend[shop],
                        comment: "Авто-перенос из стоп-листа",
                        timestamp: Date.now(),
                        svod: false,
                        ordered: false,
                        userId: "admin_auto"
                    };
                }
            }

            await fetch(`${FB_URL}/orders.json`, { method: 'PATCH', body: JSON.stringify(updates) });
            
            hideReportOverlay();
            alert("✅ Недостающие товары перенесены из стоп-листов со статусом 'Из стоп-листа'. Проверьте Свод!");
            
            let resOrdersUpdated = await fetch(`${FB_URL}/orders.json`);
            let ordersObjUpdated = await resOrdersUpdated.json() || {};
            Object.keys(ordersObjUpdated).forEach(k => { if (ordersObjUpdated[k]) ordersObjUpdated[k].key = k; });
            cachedData.orders = ordersObjUpdated;
            if (currentTabType === 'orders') renderOrdersSvod();
            
        } catch(e) {
            hideReportOverlay();
            alert("❌ Ошибка при сравнении: " + e.message);
        }
    }

    async function buildSvodReport() {
        if(!confirm("Вы уверены, что хотите СОБРАТЬ СВОД?\nЭто переведет все ожидающие заказы в статус Свода, посчитает итоги и отправит оповещение в Телеграм.")) return;
        
        showReportOverlay("Сборка закупки (Выполняю команду)...");
        try {
            const [resOrders, resCatalog, resMissing] = await Promise.all([
               fetch(`${FB_URL}/orders.json`), 
               fetch(`${FB_URL}/catalogs/order.json`), 
               fetch(`${FB_URL}/missing_items.json`)
            ]);
            
            let ordersSnap = await resOrders.json() || {};
            let catalog = await resCatalog.json() || {}; 
            let missingData = await resMissing.json() || {};
            
            let updates = {}; 
            let totalSvod = 0; 
            let totalLentaAll = 0; 
            let totalOzonAll = 0; 
            let totalKuperAll = 0;

            let activeMissing = {};
            Object.values(missingData).forEach(m => {
                if (m && m.status !== 'arrived' && m.status !== 'canceled') {
                    if (!activeMissing[m.shop]) activeMissing[m.shop] = {};
                    activeMissing[m.shop][m.name] = m.status;
                }
            });

            let shopLentaSums = {};
            let svodByShop = {};

            Object.keys(ordersSnap).forEach(key => {
                let o = ordersSnap[key];
                if (o && (o.mode === 'order' || o.mode === 'new_shop') && o.svod === false) {
                    if(!shopLentaSums[o.shop]) shopLentaSums[o.shop] = 0;
                    if(!svodByShop[o.shop]) svodByShop[o.shop] = 0;
                    
                    let itemsArr = Array.isArray(o.items) ? o.items : (typeof o.items === 'object' && o.items !== null ? Object.values(o.items) : []);
                    itemsArr = itemsArr.filter(i => i !== null && i !== undefined);

                    itemsArr.forEach(i => {
                        if(i && i.name && i.name !== "НЕТ ЗАКАЗА") {
                            let catItem = Object.values(catalog).find(cat => cat && cat.name === i.name) || {};
                            let vendor = (i.vendor || catItem.vendor || 'Лента').toLowerCase();
                            let missingStat = activeMissing[o.shop] ? activeMissing[o.shop][i.name] : null;
                            let inTransit = missingStat === 'transit';
                            
                            // ⚡ ИСКЛЮЧАЕМ "УЖЕ ПРИНЯТ" ИЗ ИТОГОВОГО СВОДА 
                            if (!inTransit && i.status !== 'error' && i.status !== 'not_needed' && i.status !== 'already_received' && (vendor.includes('лента') || vendor.includes('lenta'))) {
                                shopLentaSums[o.shop] += (parseFloat(i.qty) * (parseFloat(catItem.price)||0));
                            }
                        }
                    });
                }
            });

            Object.keys(ordersSnap).forEach(key => {
                let o = ordersSnap[key];
                if (o && (o.mode === 'order' || o.mode === 'new_shop') && o.svod === false) {
                    updates[key + "/svod"] = true; 
                    let itemsArr = Array.isArray(o.items) ? o.items : (typeof o.items === 'object' && o.items !== null ? Object.values(o.items) : []);
                    itemsArr = itemsArr.filter(i => i !== null && i !== undefined);

                    let changed = false;

                    itemsArr.forEach(i => {
                        if(i && i.name && i.name !== "НЕТ ЗАКАЗА") {
                            let catItem = Object.values(catalog).find(cat => cat && cat.name === i.name) || {};
                            let vendor = (i.vendor || catItem.vendor || 'Лента').toLowerCase();
                            let missingStat = activeMissing[o.shop] ? activeMissing[o.shop][i.name] : null;
                            let inTransit = missingStat === 'transit';
                            
                            if (inTransit || i.status === 'error') {
                                i.status = 'error'; 
                                i.bot_error = true; 
                                changed = true;
                            } else if (i.status === 'not_needed' || i.status === 'already_received') {
                                // ⚡ Товары со статусом "Уже принят" или "Не надо" не учитываются в сумме
                            } else {
                                let isAutoKuper = false;
                                let isLenta = vendor.includes('лента') || vendor.includes('lenta');
                                
                                if (isLenta && shopLentaSums[o.shop] > 0 && shopLentaSums[o.shop] < 2000) {
                                    vendor = 'купер (авто)';
                                    isAutoKuper = true;
                                    if (i.vendor !== 'Купер (Авто)') {
                                        i.vendor = 'Купер (Авто)';
                                        changed = true;
                                    }
                                }
                                
                                let price1 = parseFloat(catItem.price) || 0;
                                let price2 = parseFloat(catItem.price2) || 0;
                                let isRegularKuper = !isAutoKuper && (vendor.includes('купер') || vendor.includes('kuper'));
                                let finalPrice = (isRegularKuper && price2 > 0) ? price2 : price1;

                                let cost = finalPrice * parseFloat(i.qty);
                                totalSvod += cost;
                                svodByShop[o.shop] += cost;
                                
                                if (vendor.includes('лента') || vendor.includes('lenta')) {
                                    totalLentaAll += cost;
                                } else if (vendor.includes('озон') || vendor.includes('ozon')) {
                                    totalOzonAll += cost;
                                } else {
                                    totalKuperAll += cost;
                                }
                            }
                        }
                    });
                    if (changed) updates[key + "/items"] = itemsArr;
                }
            });

            if (Object.keys(updates).length > 0) {
                await fetch(`${FB_URL}/orders.json`, { method: 'PATCH', body: JSON.stringify(updates) });
                
                let textToBot = `📊 **СВОД ГОТОВ К СБОРКЕ!**\n\n`;
                for(let shopName in svodByShop) {
                    if (svodByShop[shopName] > 0) {
                        textToBot += `📍 ${shopName}: **${Math.round(svodByShop[shopName])} ₽**\n`;
                    }
                }
                textToBot += `➖➖➖➖➖➖➖➖\n💵 ИТОГО: **${Math.round(totalSvod)} ₽**`;
                
                await fetch(`${FB_URL}/bot_control/notifications.json`, { method: 'POST', body: JSON.stringify({ type: "svod_ready_text", text: textToBot, timestamp: Date.now() }) });
                
                alert("✅ Свод успешно собран и отправлен в Телеграм!");
            } else {
                alert("ℹ️ Нет новых заказов для сборки свода.");
            }
            
            hideReportOverlay();
            loadTab('orders', document.querySelector('.tab-btn.active'));
        } catch (e) { 
            hideReportOverlay();
            alert("❌ Ошибка формирования свода: " + e.message); 
        }
    }
    
    async function autoRemoveFromStoplist(shop, itemNamesArray) {
        if (!itemNamesArray || itemNamesArray.length === 0) return;
        try {
            let snap = await fetch(`${FB_URL}/orders.json`).then(r => r.json());
            if (!snap) return;
            let shopOrders = [];
            for (let k in snap) {
                let val = snap[k];
                if (val && val.shop === shop && val.mode === 'stoplist_fill') {
                    val.key = k;
                    shopOrders.push(val);
                }
            }
            if (shopOrders.length === 0) return;
            shopOrders.sort((a,b) => b.timestamp - a.timestamp);
            let latestStoplist = shopOrders[0];
            if (!latestStoplist.items) return;
            
            let itemsArr = Array.isArray(latestStoplist.items) ? latestStoplist.items : (typeof latestStoplist.items === 'object' && latestStoplist.items !== null ? Object.values(latestStoplist.items) : []);
            itemsArr = itemsArr.filter(i => i !== null && i !== undefined);

            let namesToRemove = itemNamesArray.map(n => String(n).trim().toLowerCase());
            let newItems = itemsArr.filter(i => {
                if (!i || !i.name) return false;
                let iName = String(i.name).trim().toLowerCase();
                return !namesToRemove.includes(iName);
            });
            
            if (newItems.length !== itemsArr.length) {
                if (newItems.length === 0) {
                    await fetch(`${FB_URL}/orders/${latestStoplist.key}/items.json`, {
                        method: 'PUT', 
                        body: JSON.stringify([{name: "Всё в наличии", qty: "В наличии"}])
                    });
                } else {
                    await fetch(`${FB_URL}/orders/${latestStoplist.key}/items.json`, {
                        method: 'PUT', 
                        body: JSON.stringify(newItems)
                    });
                }
            }
        } catch(e) {
            console.error("Auto stoplist update failed:", e);
        }
    }

    async function saveSvodEdits() {
        let btn = document.getElementById('svod-btn-edit'); 
        let origText = btn.innerHTML;
        btn.innerHTML = "⌛ СОХРАНЕНИЕ...";
        preserveSvodInputs(); 
        
        try {
            let promises = []; 
            let moves = [];
            let newItemsByOrder = {};
            let newOrdersToCreate = {};

            document.querySelectorAll('.new-svod-row').forEach(row => {
                let nameInp = row.querySelector('.new-svod-name');
                let qtyInp = row.querySelector('.new-svod-qty');
                let vendorSel = row.querySelector('.new-svod-vendor');
                let statusSel = row.querySelector('.new-svod-status');

                let dateStr = nameInp.getAttribute('data-date');
                let shop = nameInp.getAttribute('data-shop').replace(/&quot;/g, '"');
                let name = nameInp.value.replace(/&quot;/g, '"');
                let qty = parseFloat(qtyInp.value) || 0;
                let vendor = vendorSel.value;
                let status = statusSel.value;

                if(!name || qty <= 0) return;

                let catItem = Object.values(cachedData.catalogOrder).find(c => c && c.name === name) || {};
                let cat = catItem.cat || "Прочее";

                let targetOrderKey = Object.keys(cachedData.orders).find(k => {
                    let o = cachedData.orders[k];
                    return o && o.shop === shop && !o.ordered && new Date(o.timestamp).toLocaleDateString('ru-RU') === dateStr;
                });

                let itemObj = { name: name, qty: qty, vendor: vendor, status: status, bot_error: false, cat: cat };

                if (targetOrderKey) {
                    if(!newItemsByOrder[targetOrderKey]) newItemsByOrder[targetOrderKey] = [];
                    newItemsByOrder[targetOrderKey].push(itemObj);
                } else {
                    let pseudoKey = "new_" + dateStr + "_" + shop;
                    if(!newOrdersToCreate[pseudoKey]) {
                        let [d, m, y] = dateStr.split('.');
                        let ts = new Date(y, m-1, d).getTime();
                        newOrdersToCreate[pseudoKey] = { shop: shop, mode: 'order', items: [], timestamp: ts, svod: false, ordered: false, userId: 'admin_dashboard' };
                    }
                    newOrdersToCreate[pseudoKey].items.push(itemObj);
                }
            });
            
            for (let k in cachedData.orders) {
                let o = cachedData.orders[k];
                if (o && (o.mode === 'order' || o.mode === 'new_shop') && !o.ordered) {
                    let dKey = new Date(o.timestamp).toLocaleDateString('ru-RU');
                    let needsUpdate = false;
                    let itemsArr = Array.isArray(o.items) ? o.items : (typeof o.items === 'object' && o.items !== null ? Object.values(o.items) : []);
                    let newItemsArr = [];
                    
                    for (let i = 0; i < itemsArr.length; i++) {
                        let itm = itemsArr[i]; 
                        if (!itm || !itm.name) continue;
                        
                        let isDeleted = svodDeletions.some(d => d.date === dKey && d.shop === o.shop && d.name === itm.name);
                        if (isDeleted) { 
                            needsUpdate = true; 
                            continue; 
                        }
                        
                        let updatedQty = (tempSvodQty[dKey] && tempSvodQty[dKey][o.shop] && tempSvodQty[dKey][o.shop][itm.name] !== undefined) ? tempSvodQty[dKey][o.shop][itm.name] : undefined;
                        let updatedStatus = (tempSvodStatus[dKey] && tempSvodStatus[dKey][o.shop] && tempSvodStatus[dKey][o.shop][itm.name] !== undefined) ? tempSvodStatus[dKey][o.shop][itm.name] : undefined;
                        let updatedVendor = (tempSvodVendor[dKey] && tempSvodVendor[dKey][o.shop] && tempSvodVendor[dKey][o.shop][itm.name]) ? tempSvodVendor[dKey][o.shop][itm.name] : undefined;
                        let newTargetShop = (tempSvodShop[dKey] && tempSvodShop[dKey][o.shop] && tempSvodShop[dKey][o.shop][itm.name]) ? tempSvodShop[dKey][o.shop][itm.name] : o.shop;
                        
                        let catItem = Object.values(cachedData.catalogOrder).find(c => c && c.name === itm.name) || {};

                        if (updatedVendor !== undefined && (itm.vendor || catItem.vendor || 'Лента').toLowerCase() !== updatedVendor.toLowerCase()) {
                            needsUpdate = true;
                            itm.vendor = updatedVendor;
                        }
                        
                        let finalQty = updatedQty !== undefined ? updatedQty : itm.qty;
                        let finalStatus = updatedStatus !== undefined ? updatedStatus : itm.status;
                        let finalBotError = (finalStatus === 'error') ? true : itm.bot_error;

                        if (newTargetShop !== o.shop) {
                            needsUpdate = true;
                            moves.push({
                                date: dKey,
                                fromShop: o.shop,
                                toShop: newTargetShop,
                                item: { ...itm, qty: finalQty, status: finalStatus, bot_error: finalBotError }
                            });
                            continue; 
                        }

                        if (updatedStatus !== undefined && itm.status !== updatedStatus) {
                            needsUpdate = true;
                            if (updatedStatus === 'error' && itm.status !== 'error') {
                                let newMissing = { shop: o.shop, name: itm.name, qty: finalQty, status: 'canceled', timestamp: Date.now() };
                                promises.push(fetch(`${FB_URL}/missing_items.json`, { method: 'POST', body: JSON.stringify(newMissing) }));
                            }
                            itm.status = updatedStatus; 
                            itm.bot_error = (updatedStatus === 'error'); 
                            itm.not_found = (updatedStatus === 'error'); 
                            itm.error = (updatedStatus === 'error');
                        }
                        
                        if (updatedQty !== undefined && String(updatedQty) !== String(itm.qty)) { 
                            needsUpdate = true;
                            itm.qty = updatedQty; 
                        }

                        if (parseFloat(itm.qty) > 0 || itm.name === "НЕТ ЗАКАЗА") {
                            newItemsArr.push(itm);
                        } else if (parseFloat(itm.qty) === 0) {
                            needsUpdate = true;
                        }
                    }
                    
                    if (newItemsByOrder[k]) {
                        needsUpdate = true;
                        newItemsArr = newItemsArr.filter(i => i.name !== "НЕТ ЗАКАЗА");
                        newItemsByOrder[k].forEach(newItem => {
                            let existing = newItemsArr.find(i => i.name === newItem.name);
                            if (existing) {
                                existing.qty = parseFloat(existing.qty) + parseFloat(newItem.qty);
                            } else {
                                newItemsArr.push(newItem);
                            }
                        });
                    }

                    if (needsUpdate) {
                        if (newItemsArr.length === 0) newItemsArr = [{name: "НЕТ ЗАКАЗА", qty: 0}];
                        promises.push(fetch(`${FB_URL}/orders/${k}/items.json`, {method:'PUT', body: JSON.stringify(newItemsArr)}));
                    }
                }
            }
            
            for (let pseudoKey in newOrdersToCreate) {
                promises.push(fetch(`${FB_URL}/orders.json`, {method:'POST', body: JSON.stringify(newOrdersToCreate[pseudoKey])}));
            }

            for (let move of moves) {
                let targetOrderKey = Object.keys(cachedData.orders).find(k => {
                    let to = cachedData.orders[k];
                    return to && to.shop === move.toShop && !to.ordered && new Date(to.timestamp).toLocaleDateString('ru-RU') === move.date;
                });
                if (targetOrderKey) {
                    let targetOrder = cachedData.orders[targetOrderKey];
                    let tItems = Array.isArray(targetOrder.items) ? targetOrder.items : (typeof targetOrder.items === 'object' && targetOrder.items !== null ? Object.values(targetOrder.items) : []);
                    let existingItem = tItems.find(i => i.name === move.item.name);
                    if (existingItem) {
                        existingItem.qty = parseFloat(existingItem.qty) + parseFloat(move.item.qty);
                    } else {
                        tItems = tItems.filter(i => i.name !== "НЕТ ЗАКАЗА");
                        tItems.push(move.item);
                    }
                    promises.push(fetch(`${FB_URL}/orders/${targetOrderKey}/items.json`, {method:'PUT', body: JSON.stringify(tItems)}));
                } else {
                    let [d, m, y] = move.date.split('.');
                    let ts = new Date(y, m-1, d).getTime();
                    let newOrder = { shop: move.toShop, mode: 'order', items: [move.item], timestamp: ts, svod: false, ordered: false, userId: 'admin_move' };
                    promises.push(fetch(`${FB_URL}/orders.json`, {method:'POST', body: JSON.stringify(newOrder)}));
                }
            }

            await Promise.all(promises);
            isSvodEditMode = false; 
            svodDeletions = []; 
            tempSvodQty = {}; 
            tempSvodStatus = {};
            tempSvodVendor = {};
            tempSvodShop = {};
            tempSvodNewRows = [];
            
            if(btn) btn.innerHTML = "✅ СОХРАНЕНО!";
            renderOrdersSvod(); 
            setTimeout(() => {
                if(btn) btn.innerHTML = origText;
            }, 1000);
        } catch (e) { 
            if(btn) btn.innerHTML = origText; 
            alert("❌ Ошибка при сохранении: " + e.message); 
        }
    }

    function recalcSvodTotals() {
        preserveSvodInputs();
        let totalLentaAll = 0, totalLentaRem = 0; 
        let totalOzonAll = 0, totalOzonRem = 0; 
        let totalKuperAll = 0, totalKuperRem = 0;
        let shopLentaSums = {};
        
        const calculateRow = (shop, name, date, qty, vendor, itemStatus, isDeleted, inTransit) => {
            let catItem = Object.values(cachedData.catalogOrder).find(c => c && c.name === name) || {};
            let isAutoKuper = false;
            let isLenta = vendor.includes('лента') || vendor.includes('lenta');
            
            if (isLenta && shopLentaSums[shop] > 0 && shopLentaSums[shop] < 2000) {
                vendor = 'купер (авто)';
                isAutoKuper = true;
            }

            if (!shopLentaSums[shop]) shopLentaSums[shop] = 0;
            if (!isDeleted && !inTransit && itemStatus !== 'error' && itemStatus !== 'not_needed' && itemStatus !== 'already_received' && (isLenta || isAutoKuper)) {
                shopLentaSums[shop] += (qty * (parseFloat(catItem.price)||0));
            }
            
            let price1 = parseFloat(catItem.price) || 0;
            let price2 = parseFloat(catItem.price2) || 0;
            let isRegularKuper = !isAutoKuper && (vendor.includes('купер') || vendor.includes('kuper'));
            let finalPrice = (isRegularKuper && price2 > 0) ? price2 : price1;
            
            let cost = finalPrice * (isDeleted ? 0 : qty);
            
            // Если ошибка, не надо или удалено — не считаем никуда
            if (inTransit || itemStatus === 'error' || itemStatus === 'not_needed' || isDeleted) cost = 0;
            
            // Если товар уже "Принят", он идет только в итог, но НЕ в остаток
            let isRemaining = (itemStatus === 'pending' || itemStatus === 'from_stoplist' || itemStatus === 'partial');
            
            if (vendor.includes('лента') || vendor.includes('lenta')) {
                totalLentaAll += cost;
                if (isRemaining) totalLentaRem += cost;
            } else if (vendor.includes('озон') || vendor.includes('ozon')) {
                totalOzonAll += cost;
                if (isRemaining) totalOzonRem += cost;
            } else if (vendor.includes('купер') || vendor.includes('kuper')) {
                totalKuperAll += cost;
                if (isRemaining) totalKuperRem += cost;
            }
        };

        // 1. Прогоняем текущие строки
        document.querySelectorAll('.edit-svod-input').forEach(inp => {
            let shop = inp.getAttribute('data-shop');
            let name = inp.getAttribute('data-item');
            let date = inp.getAttribute('data-date');
            
            let vendorSelect = document.querySelector(`.edit-svod-vendor-select[data-item="${escCss(name)}"][data-date="${date}"][data-shop="${escCss(shop)}"]`);
            let vendor = vendorSelect ? vendorSelect.value.toLowerCase() : (inp.getAttribute('data-vendor') || 'лента').toLowerCase();
            let targetShop = (tempSvodShop[date] && tempSvodShop[date][shop] && tempSvodShop[date][shop][name]) ? tempSvodShop[date][shop][name] : shop;
            let inTransit = inp.getAttribute('data-transit') === 'true';
            let isDeleted = inp.getAttribute('data-deleted') === 'true';
            let itemStatus = inp.getAttribute('data-status');
            let qty = parseFloat(inp.value) || 0;

            calculateRow(targetShop, name, date, qty, vendor, itemStatus, isDeleted, inTransit);
        });

        // 2. Прогоняем новые ручные строки
        document.querySelectorAll('.new-svod-row').forEach(row => {
            let name = row.querySelector('.new-svod-name').value;
            let shop = row.querySelector('.new-svod-name').getAttribute('data-shop').replace(/&quot;/g, '"');
            let date = row.querySelector('.new-svod-name').getAttribute('data-date');
            let qty = parseFloat(row.querySelector('.new-svod-qty').value) || 0;
            let vendor = row.querySelector('.new-svod-vendor').value.toLowerCase();
            let status = row.querySelector('.new-svod-status').value;
            
            if(name && qty > 0) calculateRow(shop, name, date, qty, vendor, status, false, false);
        });
        let sb = document.getElementById('svod-summary-block');
        if(sb) sb.style.display = 'flex';
        let elLenta = document.getElementById('svod-total-lenta');
        let remLenta = document.getElementById('svod-rem-lenta');
        let elOzon = document.getElementById('svod-total-ozon');
        let remOzon = document.getElementById('svod-rem-ozon');
        let elKuper = document.getElementById('svod-total-kuper');
        let remKuper = document.getElementById('svod-rem-kuper');
        let elAll = document.getElementById('svod-total-all');
        let remAll = document.getElementById('svod-rem-all');
        
        if(elLenta) elLenta.innerText = Math.round(totalLentaAll) + " ₽";
        if(remLenta) remLenta.innerText = Math.round(totalLentaRem) + " ₽";
        if(elOzon) elOzon.innerText = Math.round(totalOzonAll) + " ₽";
        if(remOzon) remOzon.innerText = Math.round(totalOzonRem) + " ₽";
        if(elKuper) elKuper.innerText = Math.round(totalKuperAll) + " ₽";
        if(remKuper) remKuper.innerText = Math.round(totalKuperRem) + " ₽";
        if(elAll) elAll.innerText = Math.round(totalLentaAll + totalOzonAll + totalKuperAll) + " ₽";
        if(remAll) remAll.innerText = Math.round(totalLentaRem + totalOzonRem + totalKuperRem) + " ₽";
    }

    async function mergePendingOrders() {
        if(!confirm("Объединить все ожидающие заказы по кофейням?\n\nДополненные в разные дни заказы сольются в один общий заказ для каждого адреса.")) return;
        
        showReportOverlay("Объединяю заказы...");
        try {
            let pendingByShop = {};
            for(let key in cachedData.orders) {
                let o = cachedData.orders[key];
                if(o && (o.mode === 'order' || o.mode === 'new_shop') && !o.ordered) {
                    if(!pendingByShop[o.shop]) pendingByShop[o.shop] = [];
                    pendingByShop[o.shop].push(o);
                }
            }
            
            let hasMerges = false;
            let deletes = [];
            let updates = {};
            
            for(let shop in pendingByShop) {
                let shopOrders = pendingByShop[shop];
                if(shopOrders.length > 1) {
                    hasMerges = true;
                    let mergedItems = {};
                    let comments = [];
                    let latestTime = 0;
                    
                    shopOrders.forEach(o => {
                        if(o.timestamp > latestTime) latestTime = o.timestamp;
                        if(o.comment && o.comment.trim() !== "") comments.push(o.comment.trim());
                        
                        let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                        itemsArr.forEach(i => {
                            if(i && i.name && i.name !== "НЕТ ЗАКАЗА") {
                                if(!mergedItems[i.name]) {
                                    mergedItems[i.name] = { ...i, qty: parseFloat(i.qty) || 0 };
                                } else {
                                    mergedItems[i.name].qty += (parseFloat(i.qty) || 0);
                                }
                            }
                        });
                        deletes.push(o.key);
                    });
                    
                    let newItemsArr = Object.values(mergedItems);
                    if(newItemsArr.length === 0) newItemsArr = [{name: "НЕТ ЗАКАЗА", qty: 0}];
                    
                    let randomKey = "merged_" + Date.now() + "_" + Math.floor(Math.random()*10000);
                    updates[randomKey] = {
                        shop: shop,
                        mode: 'order',
                        items: newItemsArr,
                        comment: comments.join(" | "),
                        timestamp: latestTime,
                        svod: false,
                        ordered: false,
                        userId: "admin_merge"
                    };
                }
            }

            if(!hasMerges) {
                hideReportOverlay();
                return alert("ℹ️ Нет адресов с несколькими разрозненными заказами для объединения.");
            }

            for(let k of deletes) {
                await fetch(`${FB_URL}/orders/${k}.json`, { method: 'DELETE' });
            }
            
            if(Object.keys(updates).length > 0) {
                await fetch(`${FB_URL}/orders.json`, { method: 'PATCH', body: JSON.stringify(updates) });
            }
            
            hideReportOverlay();
            loadTab('orders', document.querySelector('.tab-btn.active'));
        } catch(e) {
            hideReportOverlay();
            alert("❌ Ошибка объединения: " + e.message);
        }
    }

    // ⚡ Функция полного удаления заказов (За день или за конкретную кофейню)
    async function deleteOrdersFromSvod(event, dateStr, shop = null) {
        event.stopPropagation(); // ⚡ Блокируем сворачивание папки при клике на кнопку
        
        let confirmMsg = shop 
            ? `Вы уверены, что хотите БЕЗВОЗВРАТНО УДАЛИТЬ заказ кофейни "${shop}" за ${dateStr}?` 
            : `🚨 ВНИМАНИЕ! 🚨\n\nВы уверены, что хотите БЕЗВОЗВРАТНО УДАЛИТЬ вообще ВСЕ заказы (весь день) за ${dateStr}?`;
            
        if (!confirm(confirmMsg)) return;

        showReportOverlay("Удаляем заказы...");
        try {
            let ordersToDelete = [];
            for (let k in cachedData.orders) {
                let o = cachedData.orders[k];
                // Ищем только неоформленные заказы (которые висят в Своде)
                if (o && (o.mode === 'order' || o.mode === 'new_shop') && !o.ordered) {
                    let dKey = new Date(o.timestamp).toLocaleDateString('ru-RU');
                    if (dKey === dateStr) {
                        if (!shop || o.shop === shop) {
                            ordersToDelete.push(k);
                        }
                    }
                }
            }

            if (ordersToDelete.length === 0) {
                hideReportOverlay();
                alert("Заказы не найдены.");
                return;
            }

            // Удаляем сразу всё массивом (параллельно) для скорости
            let promises = ordersToDelete.map(k => fetch(`${FB_URL}/orders/${k}.json`, { method: 'DELETE' }));
            await Promise.all(promises);

            // Удаляем из локальной памяти, чтобы пропало с экрана мгновенно
            ordersToDelete.forEach(k => delete cachedData.orders[k]);

            hideReportOverlay();
            renderOrdersSvod(); // ⚡ Мгновенно перерисовываем
        } catch (e) {
            hideReportOverlay();
            alert("❌ Ошибка при удалении: " + e.message);
        }
    }

// ⚡ ОПТИМИЗИРОВАННАЯ ФУНКЦИЯ: Мгновенный возврат заказов без зависания экрана
async function restoreOrdersFromHistory() {
    let checkboxes = document.querySelectorAll('.hist-checkbox:checked');
    if (checkboxes.length === 0) {
        alert("Выберите хотя бы один заказ для возврата!");
        return;
    }
    if (!confirm(`Вы уверены, что хотите вернуть ${checkboxes.length} заказ(ов) обратно в работу?`)) return;

    // Вместо тяжелого оверлея меняем текст прямо на кнопке
    let btn = document.querySelector('button[onclick="restoreOrdersFromHistory()"]');
    let origText = btn ? btn.innerHTML : "↩️ Вернуть выбранные заказы в работу (Шаг назад)";
    if (btn) {
        btn.disabled = true;
        btn.innerHTML = "⏳ Секунду, возвращаю...";
    }

    let updates = {};
    checkboxes.forEach(cb => {
        let oKey = cb.value;
        let o = cachedData.orders[oKey];
        if (o) {
            // ⚡ МГНОВЕННЫЙ АПДЕЙТ В ПАМЯТИ: меняем локально для моментального эффекта
            o.ordered = false;
            o.svod = false;

            updates[oKey + "/ordered"] = false;
            updates[oKey + "/svod"] = false;
            
            if (o.items) {
                let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items);
                itemsArr.forEach(i => {
                    if (i && i.name !== "НЕТ ЗАКАЗА" && i.status === 'ordered') {
                        i.status = 'pending';
                    }
                });
                o.items = itemsArr; // Обновляем локальную копию
                updates[oKey + "/items"] = itemsArr;
            }
        }
    });

    if (Object.keys(updates).length > 0) {
        // ⚡ ЭФФЕКТ МОЛНИИ: Перерисовываем экран прямо сейчас, не дожидаясь ответа от серверов
        renderOrdersSvod();

        // Отправляем пакет изменений в сеть на фоне (без await), разгружая процессор
        fetch(`${FB_URL}/orders.json`, { method: 'PATCH', body: JSON.stringify(updates) })
            .then(() => {
                if (btn) {
                    btn.innerHTML = "✅ Успешно возвращены!";
                    setTimeout(() => {
                        btn.innerHTML = origText;
                        btn.disabled = false;
                    }, 1200);
                }
            })
            .catch(e => {
                alert("❌ Сетевая ошибка синхронизации, но локально данные обновлены: " + e.message);
                if (btn) {
                    btn.innerHTML = origText;
                    btn.disabled = false;
                }
                renderOrdersSvod();
            });
    } else {
        if (btn) btn.disabled = false;
    }
}
    
async function renderOrdersSvod() {
      try {
        const box = document.getElementById('content');
        let svodActionBar = document.getElementById('svod-action-bar');
        if (!svodActionBar) {
            svodActionBar = document.getElementById('dynamic-action-bar');
        }
        
        let totalLentaAll = 0, totalLentaRem = 0;
        let totalOzonAll = 0, totalOzonRem = 0;
        let totalKuperAll = 0, totalKuperRem = 0;
        let isOrdHistOpen = expandedDivs.has('history_orders_list');

        let vendorMap = {};
        if (cachedData.catalogOrder) Object.values(cachedData.catalogOrder).forEach(c => { if (c && c.name) vendorMap[c.name] = (c.vendor || 'Лента').toLowerCase(); });

        let todaysOrders = [];
        let historyOrdersList = [];
        let allOrders = Object.values(cachedData.orders || {}).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
        let cutoffMonth = Date.now() - (30 * 24 * 60 * 60 * 1000); 

        allOrders.forEach(o => {
            if (o && (o.mode === 'order' || o.mode === 'new_shop')) {
                if (!o.ordered) todaysOrders.push(o);
                else if ((o.timestamp || 0) >= cutoffMonth) {
                    historyOrdersList.push(o);
                }
            }
        });

        historyOrdersList = historyOrdersList.slice(0, 150); 
        let keysToDelete = [], shopHasRealOrder = {};
        todaysOrders.forEach(o => { 
            let itemsArr = Array.isArray(o.items) ? o.items : (typeof o.items === 'object' && o.items !== null ? Object.values(o.items) : []); 
            if (itemsArr.some(i => i && i.name && i.name !== "НЕТ ЗАКАЗА")) shopHasRealOrder[o.shop] = true; 
        });
        
        todaysOrders = todaysOrders.filter(o => {
            let itemsArr = Array.isArray(o.items) ? o.items : (typeof o.items === 'object' && o.items !== null ? Object.values(o.items) : []);
            if ((itemsArr.length === 1 && itemsArr[0].name === "НЕТ ЗАКАЗА" && shopHasRealOrder[o.shop]) || itemsArr.length === 0) { 
                keysToDelete.push(o.key); return false; 
            }
            return true;
        });

        if (keysToDelete.length > 0) keysToDelete.forEach(k => { fetch(`${FB_URL}/orders/${k}.json`, { method: 'DELETE' }).catch(e=>{}); delete cachedData.orders[k]; });

        let svodDataByDate = {}; 
        todaysOrders.forEach(o => {
            let dateKey = new Date(o.timestamp).toLocaleDateString('ru-RU');
            if (!svodDataByDate[dateKey]) svodDataByDate[dateKey] = {};
            if (!svodDataByDate[dateKey][o.shop]) svodDataByDate[dateKey][o.shop] = { items: {}, comments: [], all_svod: true, no_order: false };
            let sd = svodDataByDate[dateKey][o.shop];
            if (o.comment && o.comment.trim() !== "") sd.comments.push(o.comment);
            if (!o.svod) sd.all_svod = false;

            let itemsArr = Array.isArray(o.items) ? o.items : (typeof o.items === 'object' && o.items !== null ? Object.values(o.items) : []);
            itemsArr.forEach(i => {
                if (i && i.name) {
                    if (i.name === "НЕТ ЗАКАЗА") { sd.no_order = true; return; }
                    if (!sd.items[i.name]) sd.items[i.name] = { qty: 0, bot_error: false, status: 'pending', vendor: i.vendor };
                    sd.items[i.name].qty += parseFloat(i.qty) || 0;
                    
                    if (i.bot_error || i.not_found || i.error || i.status === 'error') { sd.items[i.name].bot_error = true; sd.items[i.name].status = 'error'; } 
                    else if (i.status === 'ordered') sd.items[i.name].status = 'ordered';
                    else if (i.status === 'not_needed') sd.items[i.name].status = 'not_needed';
                    else if (i.status === 'from_stoplist') sd.items[i.name].status = 'from_stoplist';
                    else if (i.status === 'already_received') sd.items[i.name].status = 'already_received';
                }
            });
        });

        let shopLentaSums = {};
        Object.keys(svodDataByDate).forEach(dateStr => {
            Object.keys(svodDataByDate[dateStr]).forEach(shop => {
                if (!shopLentaSums[shop]) shopLentaSums[shop] = 0;
                let itemsObj = svodDataByDate[dateStr][shop].items;
                Object.keys(itemsObj).forEach(name => {
                    let vendor = itemsObj[name].vendor || (Object.values(cachedData.catalogOrder || {}).find(c => c && c.name === name) || {}).vendor || 'Лента';
                    let actualVendor = (tempSvodVendor[dateStr] && tempSvodVendor[dateStr][shop] && tempSvodVendor[dateStr][shop][name]) ? tempSvodVendor[dateStr][shop][name] : vendor;
                    let actualShop = (tempSvodShop[dateStr] && tempSvodShop[dateStr][shop] && tempSvodShop[dateStr][shop][name]) ? tempSvodShop[dateStr][shop][name] : shop;
