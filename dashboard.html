<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Coffee CRM - Управление сетью</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #FFF0F5 0%, #ede7f6 100%); 
            margin: 0; 
            padding: 20px; 
            color: #333; 
            min-height: 100vh; 
        }
        
        .nav { 
            background: linear-gradient(135deg, #F48FB1 0%, #7E57C2 100%); 
            color: white; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
        }
        
        .tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
            overflow-x: auto; 
            padding-bottom: 10px; 
        }
        
        .tab-btn { 
            padding: 14px 25px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            background: #ffffff; 
            color:#7E57C2; 
            font-weight: 800; 
            font-size: 15px; 
            transition: 0.3s; 
            white-space: nowrap; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
        }
        
        .tab-btn.active { 
            background: linear-gradient(135deg, #7E57C2 0%, #4A148C 100%); 
            color: white; 
        }
        
        .card { 
            background: white; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            overflow-x: auto; 
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 10px; 
            font-size: 15px; 
            min-width: 900px; 
        }
        
        th { 
            background: #fdfcff; 
            padding: 14px 12px; 
            text-align: left; 
            border-bottom: 2px solid #e1bee7; 
            color: #4A148C; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            font-weight: 800; 
        }
        
        td { 
            padding: 12px; 
            border-bottom: 1px solid #f0f0f0; 
        }
        
        input, select { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-family: inherit; 
            box-sizing: border-box; 
            font-size:14px; 
        }
        
        input:focus, select:focus { 
            border-color: #7E57C2; 
            outline: none; 
            background: #faf8ff; 
        }
        
        .btn-del { 
            color: #d32f2f; 
            cursor: pointer; 
            border: none; 
            background: #ffebee; 
            border-radius: 8px; 
            padding: 8px 12px; 
            font-size: 16px; 
            font-weight: bold; 
        }
        
        .btn-save { 
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%); 
            color: white; 
            padding: 18px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 800; 
            width: 100%; 
            margin-top: 25px; 
            font-size: 18px; 
            box-shadow: 0 4px 15px rgba(76,175,80,0.3); 
        }
        
        .btn-add { 
            background: linear-gradient(135deg, #03a9f4 0%, #0277bd 100%); 
            color: white; 
            padding: 12px 25px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 800; 
            font-size:15px; 
        }
        
        .repeat-row { 
            background-color: #ffebee !important; 
        }
        
        .order-row:hover { 
            background-color: #f9f9f9; 
        }
        
        .cat-group-header { 
            background: #ede7f6; 
            font-weight: 800; 
            cursor: pointer; 
            color: #311b92; 
            transition: 0.2s; 
        }
        
        .cat-group-header:hover { 
            background: #d1c4e9; 
        }
        
        .chk-row:hover { 
            background-color: #f1f8e9 !important; 
            transition: 0.2s; 
        }
        
        .ch-val { 
            text-align: center; 
            font-weight: bold; 
            font-size:16px; 
        }
        
        .ch-full { color: #2e7d32; }
        .ch-empty { color: #c62828; }
        
        .settings-panel { 
            background: #f8f9fa; 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #e0e0e0; 
        }
        
        .toggle-label { 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            margin-bottom: 10px; 
            font-weight: bold; 
            color: #4A148C; 
        }
        
        .toggle-label input { 
            width: auto; 
            margin-right: 10px; 
            transform: scale(1.5); 
        }
    </style>
</head>
<body>

<div class="nav">
    <h2 style="margin:0;">💼 Coffee CRM</h2>
    <div id="db-status">☁️ База активна</div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="loadTab('orders', this)">📋 Свод и Заказы</button>
    <button class="tab-btn" onclick="loadTab('checks_table', this)">✅ Таблица Чек-листов</button>
    <button class="tab-btn" onclick="loadTab('stoplists', this)">🛑 Стоп-листы</button>
    <button class="tab-btn" onclick="loadTab('missing', this)">‼️ Недовозы</button>
    <button class="tab-btn" onclick="loadTab('catalog_order', this)">🛒 Справочник Закупки</button>
    <button class="tab-btn" onclick="loadTab('catalog_checklist', this)">📝 Справочник Чек-листа</button>
</div>

<div class="card" id="content">Загрузка данных...</div>

<script>
    const FB_URL = "https://project-lenta22-default-rtdb.firebaseio.com";
    let currentCatalog = {};
    let currentPath = "";
    let appSettings = { hidden_categories: {}, new_shop_order_active: false };

    async function loadTab(type, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const box = document.getElementById('content');
        box.innerHTML = "<div style='text-align:center; padding:40px; font-weight:bold; font-size:18px; color:#7E57C2;'>⌛ Синхронизация данных из Firebase...</div>";

        // ==========================================
        // 1. РЕДАКТОР ЗАКУПОК + НАСТРОЙКИ
        // ==========================================
        if (type === 'catalog_order') {
            currentPath = "catalogs/order";
            
            let [res, setRes] = await Promise.all([
                fetch(`${FB_URL}/${currentPath}.json`),
                fetch(`${FB_URL}/settings.json`)
            ]);
            
            currentCatalog = await res.json() || {};
            appSettings = await setRes.json() || { hidden_categories: {}, new_shop_order_active: false };
            if(!appSettings.hidden_categories) appSettings.hidden_categories = {};
            
            let globalCats = [...new Set(Object.values(currentCatalog).map(i => i.globalCat).filter(c => c))];
            let subCats = [...new Set(Object.values(currentCatalog).map(i => i.cat).filter(c => c))];

            let html = `
            <div class="settings-panel">
                <h4 style="margin-top:0; color:#d32f2f;">⚙️ Настройки Мини-приложения (Скрывать категории)</h4>
                <div style="display:flex; flex-wrap:wrap; gap:20px;">
                    <label class="toggle-label" style="color:#2e7d32;">
                        <input type="checkbox" onchange="toggleSetting('new_shop_order_active', this.checked)" ${appSettings.new_shop_order_active ? 'checked' : ''}> 
                        Показывать кнопку "Закупка на новую кофейню"
                    </label>
            `;
            
            globalCats.forEach(gc => {
                let isHidden = appSettings.hidden_categories[gc];
                html += `<label class="toggle-label">
                            <input type="checkbox" onchange="toggleHiddenCategory('${gc}', this.checked)" ${isHidden ? 'checked' : ''}> 
                            Скрыть "${gc}" из закупки
                         </label>`;
            });
            
            html += `</div></div>
            
            <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
                <h3 style="margin:0; color:#4A148C;">Редактор товаров: ЗАКУПКА</h3>
                <button class="btn-add" onclick="addItemOrder()">➕ Добавить позицию</button>
            </div>
            <table style="min-width:1300px;"><tr>
                <th style="width:150px;">Глоб. Категория<br><small>(Весеннее, Основное)</small></th>
                <th style="width:140px;">Подкатегория</th>
                <th style="width:180px;">Наименование</th>
                <th style="width:100px;">Поставщик</th>
                <th style="width:80px;">Цена (₽)</th>
                <th>Ссылка (Wildberries/Ozon)</th>
                <th style="width:50px;">Удалить</th>
            </tr>`;

            let grouped = {};
            Object.keys(currentCatalog).forEach(k => {
                let item = currentCatalog[k];
                let gc = item.globalCat || "Основное меню";
                let sc = item.cat || "Прочее";
                if(!grouped[gc]) grouped[gc] = {};
                if(!grouped[gc][sc]) grouped[gc][sc] = [];
                grouped[gc][sc].push({k: k, item: item});
            });

            Object.keys(grouped).sort().forEach(gc => {
                let safeGc = gc.replace(/[^a-zA-Z0-9а-яА-Я]/g, '');
                html += `<tr class="cat-group-header" onclick="toggleCatGroup('g_${safeGc}')"><td colspan="7" style="padding:15px; background:#d1c4e9;">🌍 <b>${gc}</b> <span style="float:right;">▼</span></td></tr>`;
                
                Object.keys(grouped[gc]).sort().forEach(sc => {
                    let safeSc = sc.replace(/[^a-zA-Z0-9а-яА-Я]/g, '');
                    html += `<tr class="cat-group-header group-g_${safeGc}" onclick="toggleCatGroup('s_${safeSc}')"><td colspan="7" style="padding:10px 15px; padding-left:30px;">📂 ${sc} <span style="float:right;">▼</span></td></tr>`;
                    
                    grouped[gc][sc].forEach(data => {
                        let k = data.k; 
                        let item = data.item;
                        
                        let gcatOptions = `<option value="${item.globalCat || 'Основное меню'}">${item.globalCat || 'Основное меню'}</option>`;
                        globalCats.forEach(c => { if(c !== (item.globalCat || 'Основное меню')) gcatOptions += `<option value="${c}">${c}</option>`; });
                        gcatOptions += `<option value="НОВАЯ ГЛОБАЛЬНАЯ">-- Создать --</option>`;

                        let catOptions = `<option value="${item.cat}">${item.cat}</option>`;
                        subCats.forEach(c => { if(c !== item.cat) catOptions += `<option value="${c}">${c}</option>`; });
                        catOptions += `<option value="НОВАЯ КАТЕГОРИЯ">-- Создать --</option>`;

                        html += `<tr class="chk-row group-g_${safeGc} group-s_${safeSc}">
                            <td><select onchange="handleCatSelect('${k}', this.value, 'catalog_order', 'globalCat')">${gcatOptions}</select></td>
                            <td><select onchange="handleCatSelect('${k}', this.value, 'catalog_order', 'cat')">${catOptions}</select></td>
                            <td><input type="text" style="font-weight:bold; color:#311b92;" value="${item.name || ''}" onchange="updateVal('${k}','name',this.value)"></td>
                            <td><input type="text" placeholder="Лента/Озон" value="${item.vendor || 'Лента'}" onchange="updateVal('${k}','vendor',this.value)"></td>
                            <td><input type="number" value="${item.price || 0}" onchange="updateVal('${k}','price',this.value)"></td>
                            <td><input type="text" placeholder="URL" value="${item.link || ''}" onchange="updateVal('${k}','link',this.value)"></td>
                            <td style="text-align:center;"><button class="btn-del" onclick="deleteItem('${k}')">✕</button></td>
                        </tr>`;
                    });
                });
            });

            box.innerHTML = html + "</table><button class='btn-save' onclick='saveCatalog()'>💾 СОХРАНИТЬ В БАЗУ ДАННЫХ</button>";

        } 
        // ==========================================
        // 2. РЕДАКТОР ЧЕК-ЛИСТА
        // ==========================================
        else if (type === 'catalog_checklist') {
            currentPath = "catalogs/checklist";
            let res = await fetch(`${FB_URL}/${currentPath}.json`);
            currentCatalog = await res.json() || {};
            
            let uniqueCats = [...new Set(Object.values(currentCatalog).map(i => i.cat).filter(c => c))];
            
            let html = `<div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
                <h3 style="margin:0; color:#4A148C;">Редактор товаров: ЧЕК-ЛИСТ</h3>
                <button class="btn-add" onclick="addItemChecklist()">➕ Добавить позицию</button>
            </div>
            <table style="min-width:600px;"><tr>
                <th>Категория</th>
                <th>Наименование</th>
                <th style="width:200px;">Формат ввода</th>
                <th style="width:50px;">Удалить</th>
            </tr>`;
            
            let sortedKeys = Object.keys(currentCatalog).sort((a,b) => (currentCatalog[a].cat||'').localeCompare(currentCatalog[b].cat||''));
            
            sortedKeys.forEach(k => {
                let item = currentCatalog[k];
                let catOptions = `<option value="${item.cat}">${item.cat}</option>`;
                uniqueCats.forEach(c => { if(c !== item.cat) catOptions += `<option value="${c}">${c}</option>`; });
                catOptions += `<option value="НОВАЯ КАТЕГОРИЯ">-- Создать новую --</option>`;

                let isVol = (item.unit && item.unit.toLowerCase().includes("объем"));

                html += `<tr>
                    <td><select onchange="handleCatSelect('${k}', this.value, 'catalog_checklist', 'cat')" style="font-weight:bold; color:#7E57C2;">${catOptions}</select></td>
                    <td><input type="text" style="font-weight:bold; font-size:16px; color:#311b92;" value="${item.name || ''}" onchange="updateVal('${k}','name',this.value)"></td>
                    <td><select onchange="updateVal('${k}','unit',this.value)">
                            <option value="текст" ${!isVol?'selected':''}>Текст (Шт / Уп)</option>
                            <option value="объем" ${isVol?'selected':''}>Объем (Полная / Половина)</option>
                        </select></td>
                    <td style="text-align:center;"><button class="btn-del" onclick="deleteItem('${k}')">✕</button></td>
                </tr>`;
            });
            box.innerHTML = html + "</table><button class='btn-save' onclick='saveCatalog()'>💾 СОХРАНИТЬ В БАЗУ ДАННЫХ</button>";

        } 
        // ==========================================
        // 3. УПРАВЛЕНИЕ НЕДОВОЗАМИ
        // ==========================================
        else if (type === 'missing') {
            let res = await fetch(`${FB_URL}/missing_items.json`);
            let missing = await res.json() || {};
            
            let html = "<h3 style='color:#E53935;'>‼️ Актуальные Недовозы</h3><table><tr><th>Точка</th><th>Товар</th><th>Кол-во</th><th>Установить статус</th></tr>";
            
            for(let k in missing) {
                let m = missing[k];
                html += `<tr>
                    <td><b style="font-size:16px; color:#311b92;">${m.shop}</b></td>
                    <td style="font-size:16px;">${m.name}</td>
                    <td style="font-size:16px; font-weight:bold;">${m.qty}</td>
                    <td>
                        <select onchange="updateMissingStatus('${k}', this.value)" style="padding:10px; border-radius:8px; border:2px solid #e1bee7; font-weight:bold;">
                            <option value="pending" ${m.status==='pending'?'selected':''}>Ожидает проверки админом</option>
                            <option value="transit" ${m.status==='transit'?'selected':''}>В пути</option>
                            <option value="canceled" ${m.status==='canceled'?'selected':''}>ОТМЕНЕН (Вернуть в корзину сотруднику)</option>
                            <option value="oos" ${m.status==='oos'?'selected':''}>Нет в наличии</option>
                        </select>
                    </td>
                </tr>`;
            }
            
            box.innerHTML = html + "</table><p style='margin-top:20px; font-size:15px; color:#777; background:#fff9c4; padding:15px; border-radius:10px;'>💡 <b>Подсказка:</b> Если выбрать статус 'ОТМЕНЕН', этот товар автоматически появится в корзине сотрудника при следующем открытии закупки.</p>";

        }
        // ==========================================
        // 4. ВКЛАДКА СТОП-ЛИСТЫ (ПЛИТКА С ССЫЛКАМИ)
        // ==========================================
        else if (type === 'stoplists') {
            let resOrders = await fetch(`${FB_URL}/orders.json`);
            let orders = await resOrders.json() || {};
            
            let catRes = await fetch(`${FB_URL}/catalogs/order.json`);
            let catalogOrder = await catRes.json() || {};

            let shops = ["Бояринова", "Гагарина", "Вертолетчиков", "Липчанского", "Новокосино", "Новокосино 2", "Старое Павлино", "Красноказарменная", "Ухтомского ополчения"];
            
            let latestStops = {};
            Object.values(orders).forEach(o => {
                if (o && o.mode === 'stoplist_fill') {
                    if (!latestStops[o.shop] || o.timestamp > latestStops[o.shop].timestamp) {
                        latestStops[o.shop] = o;
                    }
                }
            });

            let html = `<h3 style="color:#D50000; margin-bottom:20px;">🛑 Актуальные Стоп-листы на точках</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:20px;">`;
            
            shops.forEach(s => {
                let stop = latestStops[s];
                html += `<div class="card" style="flex: 1 1 calc(33% - 20px); min-width:300px; padding:20px; background:#fff; border-radius:16px; box-shadow:0 4px 15px rgba(0,0,0,0.05);">
                            <h4 style="margin-top:0; color:#311b92; font-size:18px; border-bottom:2px solid #eee; padding-bottom:10px;">${s}</h4>`;
                
                if (stop && stop.items) {
                    html += `<div style="font-size:12px; color:#888; margin-bottom:15px;">Обновлено: ${new Date(stop.timestamp).toLocaleString()}</div>`;
                    let itemsArr = Array.isArray(stop.items) ? stop.items : Object.values(stop.items);
                    let foundItems = false;
                    
                    itemsArr.forEach(i => {
                        if (i && i.name) {
                            let catInfo = Object.values(catalogOrder).find(c => c && String(c.name).trim() === String(i.name).trim()) || {};
                            let linkBtn = catInfo.link ? `<a href="${catInfo.link}" target="_blank" style="color:#fff; background:#0288d1; padding:4px 10px; border-radius:6px; text-decoration:none; font-size:12px; font-weight:bold; float:right;">🛒 Заказать</a>` : "";
                            html += `<div style="padding:8px 0; border-bottom:1px dashed #eee; font-size:15px; display:flex; justify-content:space-between; align-items:center;">
                                        <b style="color:#333;">${i.name}</b> ${linkBtn}
                                     </div>`;
                            foundItems = true;
                        }
                    });
                    
                    if(!foundItems) html += `<div style="color:#4caf50; font-weight:bold; padding:10px 0;">Стоп-лист пуст (всё в наличии)</div>`;
                } else {
                    html += `<div style="color:#888; padding:10px 0;">Нет данных о стоп-листе</div>`;
                }
                
                html += `</div>`;
            });
            
            html += `</div>`;
            box.innerHTML = html;
        }
        // ==========================================
        // 5. ТАБЛИЦА ЧЕК-ЛИСТОВ (ГРУППИРОВКА)
        // ==========================================
        else if (type === 'checks_table') {
            let resCheck = await fetch(`${FB_URL}/catalogs/checklist.json`);
            let catalog = await resCheck.json() || {};
            
            let resOrders = await fetch(`${FB_URL}/orders.json`);
            let orders = await resOrders.json() || {};

            let today = new Date().setHours(0,0,0,0);
            let shops = ["Бояринова", "Гагарина", "Вертолетчиков", "Липчанского", "Новокосино", "Новокосино 2", "Старое Павлино", "Красноказарменная", "Ухтомского ополчения"];
            
            let todaysChecklists = {};
            Object.values(orders).forEach(o => {
                if (o && o.mode === 'checklist' && (o.timestamp || 0) >= today) {
                    if(!todaysChecklists[o.shop] || o.timestamp > todaysChecklists[o.shop].timestamp) {
                        todaysChecklists[o.shop] = o;
                    }
                }
            });

            let groupedCat = {};
            Object.values(catalog).forEach(i => {
                if(!groupedCat[i.cat]) groupedCat[i.cat] = [];
                groupedCat[i.cat].push(i.name);
            });

            let html = `<h3 style="color:#1a237e; font-size:22px;">✅ Сводная Таблица Чек-листов (Сегодня)</h3>
                        <p style="font-size:14px; color:#7E57C2; font-weight:bold;">Нажмите на категорию, чтобы развернуть список товаров</p>
                        <table style="min-width:1200px;"><tr><th style="width:250px;">Товар</th>`;
            
            shops.forEach(s => html += `<th style="text-align:center; font-size:13px;">${s}</th>`);
            html += `</tr>`;

            Object.keys(groupedCat).sort().forEach(cat => {
                let safeCat = cat.replace(/[^a-zA-Z0-9а-яА-Я]/g, '');
                html += `<tr class="cat-group-header" onclick="toggleCatGroup('${safeCat}')">
                            <td colspan="${shops.length+1}" style="padding:15px;">📂 ${cat} <span style="float:right; opacity:0.5;">▼</span></td>
                         </tr>`;
                
                groupedCat[cat].sort().forEach(itemName => {
                    html += `<tr class="chk-row group-${safeCat}" style="display:none; background-color:#fff;">
                                <td><b>${itemName}</b></td>`;
                    
                    shops.forEach(s => {
                        let val = "-";
                        if(todaysChecklists[s] && todaysChecklists[s].items) {
                            let itemsArr = Array.isArray(todaysChecklists[s].items) ? todaysChecklists[s].items : Object.values(todaysChecklists[s].items);
                            let found = itemsArr.find(i => i && i.name === itemName);
                            if(found) val = found.qty;
                        }
                        
                        let cl = "ch-val ";
                        if(val === "Полная" || val === "В наличии" || val === "1") cl += "ch-full";
                        else if(val === "0" || val === "Меньше половины" || val === "Закончилось") cl += "ch-empty";
                        
                        html += `<td class="${cl}">${val}</td>`;
                    });
                    
                    html += `</tr>`;
                });
            });
            box.innerHTML = html + "</table>";

        } 
        // ==========================================
        // 6. ИСТОРИЯ ЗАКАЗОВ И СВОД
        // ==========================================
        else {
            const [ordersRes, catRes] = await Promise.all([
                fetch(`${FB_URL}/orders.json`),
                fetch(`${FB_URL}/catalogs/order.json`)
            ]);
            let orders = await ordersRes.json() || {};
            let catalog = await catRes.json() || {};

            let historyKeys = new Set();
            let todaysOrders = [];
            
            let allOrders = Object.values(orders).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));

            allOrders.forEach(o => {
                if(o && (o.mode === 'order' || o.mode === 'new_shop')) {
                    if(o.svod === true) {
                        let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                        itemsArr.forEach(i => { if(i) historyKeys.add(o.shop + "|" + i.name); });
                    } else {
                        todaysOrders.push(o);
                    }
                }
            });

            let svodData = {};
            todaysOrders.forEach(o => {
                if(!svodData[o.shop]) svodData[o.shop] = { items: {}, lentaSum: 0, ozonSum: 0, kuperSum: 0, comments: [] };
                if(o.comment && o.comment.trim() !== "") svodData[o.shop].comments.push(o.comment);
                
                let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                itemsArr.forEach(i => {
                    if(i) {
                        if(!svodData[o.shop].items[i.name]) svodData[o.shop].items[i.name] = 0;
                        svodData[o.shop].items[i.name] += parseFloat(i.qty) || 0;
                    }
                });
            });

            let html = `<h3 style='color:#311B92; font-size:22px;'>📊 Свод по кофейням (Не обработано)</h3>
                        <table style='margin-bottom:50px;'>
                        <tr>
                            <th>Кофейня / Товар</th>
                            <th style="text-align:center;">Кол-во</th>
                            <th>Поставщик</th>
                            <th>Ссылка</th>
                        </tr>`;
            
            let totalLenta = 0; let totalOzon = 0; let totalKuper = 0;

            for(let shop in svodData) {
                // Сначала вычисляем Ленту для правила Купера
                for(let name in svodData[shop].items) {
                    let catItem = Object.values(catalog).find(c => c && c.name === name) || {};
                    let vendor = catItem.vendor || 'Лента';
                    let price = parseFloat(catItem.price) || 0;
                    if(vendor.toLowerCase() === 'лента') svodData[shop].lentaSum += (svodData[shop].items[name] * price);
                }

                let isKuper = svodData[shop].lentaSum > 0 && svodData[shop].lentaSum < 2000;

                html += `<tr><td colspan="4" style="background:#ede7f6; padding:15px; font-size:18px; color:#311B92;"><b>📍 ${shop}</b></td></tr>`;

                for(let name in svodData[shop].items) {
                    let catItem = Object.values(catalog).find(c => c && c.name === name) || {};
                    let vendor = catItem.vendor || 'Лента';
                    let price = parseFloat(catItem.price) || 0;
                    let qty = svodData[shop].items[name];
                    let isRepeat = historyKeys.has(shop + "|" + name);
                    let link = catItem.link ? `<a href="${catItem.link}" target="_blank" style="color:#0288d1; font-weight:bold;">🔗 Заказать</a>` : "";

                    if(vendor.toLowerCase() === 'лента' && isKuper) {
                        vendor = 'Купер';
                    }

                    let cost = price * qty;
                    if(vendor.toLowerCase() === 'озон' && isRepeat) cost = 0;
                    
                    if (vendor.toLowerCase() === 'лента') totalLenta += cost;
                    else if (vendor.toLowerCase() === 'озон') totalOzon += cost;
                    else if (vendor.toLowerCase() === 'купер') totalKuper += cost;

                    let repeatBadge = isRepeat ? `<span style='color:#d32f2f; font-size:12px; margin-left:5px; font-weight:bold;'>(Повтор)</span>` : ``;

                    html += `<tr>
                        <td style="font-size:15px; padding-left:25px;">${name} ${repeatBadge}</td>
                        <td style="font-size:16px; font-weight:bold; color:#311b92; text-align:center;">${qty}</td>
                        <td style="font-size:14px;">${vendor}</td>
                        <td>${link}</td>
                    </tr>`;
                }
                
                if(svodData[shop].comments.length > 0) {
                    html += `<tr><td colspan="4" style="padding:15px; font-style:italic; font-size:15px; color:#ef6c00; background:#fff3e0;">💬 Комментарий: <b>${svodData[shop].comments.join(' | ')}</b></td></tr>`;
                }
            }
            
            html += `</table>
                    <div style="display:flex; justify-content:flex-end; gap:20px; font-size:18px; background:#fff; padding:20px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.05);">
                        <div style="text-align:center;">🛒 Лента<br><b style="font-size:22px; color:#2e7d32;">${totalLenta} ₽</b></div>
                        <div style="text-align:center;">📦 Озон<br><b style="font-size:22px; color:#0288d1;">${totalOzon} ₽</b></div>
                        <div style="text-align:center;">🛵 Купер<br><b style="font-size:22px; color:#c2185b;">${totalKuper} ₽</b></div>
                        <div style="text-align:center; border-left:2px solid #eee; padding-left:20px;">💵 ИТОГО<br><b style="font-size:26px; color:#4A148C;">${totalLenta+totalOzon+totalKuper} ₽</b></div>
                    </div>`;

            html += "<h3 style='font-size:22px; color:#311B92; margin-top:40px;'>🕒 Вся история операций</h3><table><tr><th>Кофейня</th><th>Тип</th><th>Дата</th><th>Детали</th><th>Комментарий</th></tr>";
            
            allOrders.forEach(o => {
                if(!o) return;
                let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                let itemsStr = itemsArr.map(i => i ? `${i.name} <b>(${i.qty})</b>` : '').join(', ');
                let date = o.timestamp ? new Date(o.timestamp).toLocaleString('ru-RU') : '---';
                let modeLabel = o.mode === 'order' ? '📦 Закупка' : (o.mode === 'stoplist_fill' ? '🛑 Стоп' : '📋 Чек');
                if(o.mode === 'new_shop') modeLabel = '🏗 Новая кофейня';
                
                html += `<tr class="order-row">
                    <td><b style="color:#4A148C;">${o.shop}</b></td>
                    <td><span style="background:#ede7f6; padding:5px 8px; border-radius:5px; font-weight:bold; font-size:13px;">${modeLabel}</span></td>
                    <td style="color:#666; font-size:13px;">${date}</td>
                    <td style="font-size:14px; line-height:1.5;">${itemsStr}</td>
                    <td style="font-style:italic; font-size:13px; color:#888;">${o.comment || ''}</td>
                </tr>`;
            });
            box.innerHTML = html + "</table>";
        }
    }

    // УТИЛИТЫ CRM
    function toggleCatGroup(cls) { 
        document.querySelectorAll('.group-' + cls).forEach(el => {
            el.style.display = el.style.display === 'none' ? 'table-row' : 'none';
        }); 
    }
    
    function updateVal(id, field, val) { 
        currentCatalog[id][field] = val; 
    }

    function handleCatSelect(id, val, targetTab, field) {
        if(val === "НОВАЯ ГЛОБАЛЬНАЯ" || val === "НОВАЯ КАТЕГОРИЯ") {
            let newCat = prompt("Введите название новой категории:");
            if(newCat) currentCatalog[id][field] = newCat;
            else return;
        } else {
            currentCatalog[id][field] = val;
        }
        loadTab(targetTab, document.querySelector('.tab-btn.active'));
    }
    
    function addItemOrder() { 
        let id = "item_" + Date.now(); 
        currentCatalog[id] = { globalCat: "Основное меню", cat: "Новая подкатегория", name: "Название", vendor: "Лента", price: 0, link: "", fallback: "" }; 
        loadTab('catalog_order', document.querySelector('.tab-btn.active')); 
    }
    
    function addItemChecklist() { 
        let id = "item_" + Date.now(); 
        currentCatalog[id] = { cat: "Прочее", name: "Название", unit: "текст" }; 
        loadTab('catalog_checklist', document.querySelector('.tab-btn.active')); 
    }
    
    function deleteItem(id) { 
        if(confirm("Вы уверены, что хотите удалить эту позицию?")) { 
            delete currentCatalog[id]; 
            loadTab(currentPath.includes('order') ? 'catalog_order' : 'catalog_checklist', document.querySelector('.tab-btn.active')); 
        } 
    }

    async function toggleSetting(key, val) {
        appSettings[key] = val;
        await fetch(`${FB_URL}/settings.json`, { method: 'PUT', body: JSON.stringify(appSettings) });
    }

    async function toggleHiddenCategory(cat, isHidden) {
        appSettings.hidden_categories[cat] = isHidden;
        await fetch(`${FB_URL}/settings/hidden_categories.json`, { method: 'PUT', body: JSON.stringify(appSettings.hidden_categories) });
    }

    async function saveCatalog() {
        const btn = document.querySelector('.btn-save'); 
        btn.innerHTML = "⌛ СОХРАНЕНИЕ...";
        try { 
            await fetch(`${FB_URL}/${currentPath}.json`, { method: 'PUT', body: JSON.stringify(currentCatalog) }); 
            alert("✅ База обновлена и мгновенно доступна сотрудникам!"); 
        } catch(e) { 
            alert("❌ Ошибка при сохранении!"); 
        }
        btn.innerHTML = "💾 СОХРАНИТЬ В БАЗУ ДАННЫХ";
    }

    async function updateMissingStatus(key, val) {
        await fetch(`${FB_URL}/missing_items/${key}/status.json`, { method: 'PUT', body: JSON.stringify(val) });
        alert("Статус недовоза успешно сохранен!");
    }
    
    window.onload = () => loadTab('orders', document.querySelector('.tab-btn'));
</script>
</body>
</html>
