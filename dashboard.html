<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Coffee CRM - Управление сетью</title>
    <style>
        /* =========================================
           ОБЩИЕ СТИЛИ
        ========================================= */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #FFF0F5 0%, #ede7f6 100%); 
            margin: 0; 
            padding: 20px; 
            color: #333; 
            min-height: 100vh; 
        }
        
        .nav { 
            background: linear-gradient(135deg, #F06292 0%, #7E57C2 100%); 
            color: white; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
        }
        
        /* =========================================
           ВКЛАДКИ МЕНЮ
        ========================================= */
        .tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
            overflow-x: auto; 
            padding-bottom: 10px; 
        }
        
        .tab-btn { 
            padding: 18px 32px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            background: #ffffff; 
            color:#7E57C2; 
            font-weight: 900; 
            font-size: 17px; 
            transition: 0.3s; 
            white-space: nowrap; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
        }
        
        .tab-btn.active { 
            background: linear-gradient(135deg, #7E57C2 0%, #4A148C 100%); 
            color: white; 
        }
        
        /* =========================================
           КАРТОЧКИ И ТАБЛИЦЫ
        ========================================= */
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            overflow-x: auto; 
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 15px; 
            font-size: 17px; 
            min-width: 1000px; 
        }
        
        th { 
            background: #fdfcff; 
            padding: 16px 14px; 
            text-align: left; 
            border-bottom: 2px solid #e1bee7; 
            color: #4A148C; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            font-weight: 900; 
        }
        
        td { 
            padding: 14px; 
            border-bottom: 1px solid #f0f0f0; 
        }
        
        /* =========================================
           ФОРМЫ ВВОДА
        ========================================= */
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-family: inherit; 
            box-sizing: border-box; 
            font-size:15px; 
            font-weight: bold;
        }
        
        input:focus, select:focus { 
            border-color: #7E57C2; 
            outline: none; 
            background: #faf8ff; 
        }
        
        .btn-del { 
            color: #d32f2f; 
            cursor: pointer; 
            border: none; 
            background: #ffebee; 
            border-radius: 8px; 
            padding: 8px 12px; 
            font-size: 16px; 
            font-weight: bold; 
            transition: 0.2s;
        }

        .btn-del:hover {
            background: #ffcdd2;
        }

        .btn-del:disabled {
            background: #eee;
            color: #aaa;
            cursor: not-allowed;
        }
        
        .btn-save { 
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%); 
            color: white; 
            padding: 20px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 900; 
            font-size: 16px; 
            box-shadow: 0 4px 15px rgba(76,175,80,0.3); 
        }
        
        .btn-add { 
            background: linear-gradient(135deg, #03a9f4 0%, #0277bd 100%); 
            color: white; 
            padding: 14px 28px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 900; 
            font-size:16px; 
        }
        
        .repeat-row { background-color: #ffebee !important; }
        .order-row:hover { background-color: #f9f9f9; }
        
        .cat-group-header { 
            background: #ede7f6; 
            font-weight: 900; 
            cursor: pointer; 
            color: #311b92; 
            transition: 0.2s; 
        }
        
        .cat-group-header:hover { background: #d1c4e9; }
        
        .chk-row:hover { 
            background-color: #f1f8e9 !important; 
            transition: 0.2s; 
        }
        
        .ch-val { text-align: center; font-weight: bold; font-size:16px; }
        .ch-full { color: #2e7d32; }
        .ch-empty { color: #c62828; }
        
        /* Стили для настроек */
        .settings-panel { 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #e0e0e0; 
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .toggle-label { 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            margin-bottom: 10px; 
            font-weight: 900; 
            color: #4A148C; 
            font-size: 17px;
        }
        
        .toggle-label input { 
            width: auto; 
            margin-right: 12px; 
            transform: scale(1.5); 
        }
        
        .edit-chk-input {
            width: 100%;
            text-align: center;
            padding: 8px;
            font-size: 15px;
            font-weight: bold;
            color: #311B92;
            border: 2px solid #7E57C2;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="nav">
    <h2 style="margin:0;">💼 Coffee 21 TEIKU CRM</h2>
    <div id="db-status">☁️ База активна</div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="loadTab('orders', this)">📋 Свод и Заказы</button>
    <button class="tab-btn" onclick="loadTab('checks_table', this)">✅ Таблица Чек-листов</button>
    <button class="tab-btn" onclick="loadTab('stoplists', this)">🛑 Стоп-листы</button>
    <button class="tab-btn" onclick="loadTab('missing', this)">‼️ Недовозы</button>
    <button class="tab-btn" onclick="loadTab('catalog_order', this)">🛒 Справочник Закупки</button>
    <button class="tab-btn" onclick="loadTab('catalog_checklist', this)">📝 Справочник Чек-листа</button>
    <button class="tab-btn" onclick="loadTab('catalog_stoplist', this)">🛑 Справочник Стоп-листа</button>
    <button class="tab-btn" onclick="loadTab('stats', this)">📈 Статистика</button>
</div>

<div class="card" id="content">Загрузка данных...</div>

<script>
    // ==========================================
    // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ И ПОДКЛЮЧЕНИЕ
    // ==========================================
    const FB_URL = "https://project-lenta22-default-rtdb.firebaseio.com";
    let currentCatalog = {};
    let currentPath = "";
    let currentTabType = "";
    let isNewShopCatalog = false; // Для переключения режимов закупки
    let appSettings = { hidden_categories: {}, new_shop_order_active: false };
    let cachedData = {};
    
    // Режимы редактирования
    let isChecklistEditMode = false;
    let isSvodEditMode = false;
    let svodDeletions = []; 

    // УНИВЕРСАЛЬНЫЙ БЕЗОПАСНЫЙ ХЭШ-ID
    function getSafeId(str) {
        if (!str) return "id_empty_" + Math.floor(Math.random() * 10000);
        let res = "";
        for (let i = 0; i < str.length; i++) {
            res += str.charCodeAt(i).toString(16);
        }
        return "id_" + res;
    }

    // УМНОЕ РАСКРЫТИЕ/ЗАКРЫТИЕ
    function toggleElements(cls) { 
        let els = document.querySelectorAll('.' + cls);
        els.forEach(el => {
            if (el.tagName === 'DIV') {
                el.style.display = el.style.display === 'none' ? 'flex' : 'none';
            } else {
                el.style.display = el.style.display === 'none' ? 'table-row' : 'none';
            }
        }); 
    }

    function toggleLvl1(gcId) {
        let subs = document.querySelectorAll('.lvl2_' + gcId);
        let isClosing = false;
        subs.forEach(el => {
            if (el.style.display === 'none') {
                el.style.display = 'table-row';
            } else {
                el.style.display = 'none';
                isClosing = true;
            }
        });
        if (isClosing) {
            let items = document.querySelectorAll('.lvl3_of_' + gcId);
            items.forEach(el => el.style.display = 'none');
        }
    }

    // ==========================================
    // ГЛАВНАЯ ФУНКЦИЯ ЗАГРУЗКИ ВЛАДОК
    // ==========================================
    async function loadTab(type, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        
        currentTabType = type;
        const box = document.getElementById('content');
        box.innerHTML = "<div style='text-align:center; padding:40px; font-weight:bold; font-size:22px; color:#7E57C2;'>⌛ Синхронизация данных из Firebase...</div>";

        try {
            if (type === 'catalog_order') {
                isNewShopCatalog = false;
                currentPath = "catalogs/order";
                let [res, setRes] = await Promise.all([
                    fetch(`${FB_URL}/${currentPath}.json`),
                    fetch(`${FB_URL}/settings.json`)
                ]);
                currentCatalog = await res.json() || {};
                appSettings = await setRes.json() || { hidden_categories: {}, new_shop_order_active: false };
                if (!appSettings.hidden_categories) appSettings.hidden_categories = {};
                renderCatalogOrder();
            } 
            else if (type === 'catalog_checklist') {
                currentPath = "catalogs/checklist";
                let res = await fetch(`${FB_URL}/${currentPath}.json`);
                currentCatalog = await res.json() || {};
                renderCatalogChecklist();
            }
            else if (type === 'catalog_stoplist') {
                currentPath = "catalogs/stoplist";
                let res = await fetch(`${FB_URL}/${currentPath}.json`);
                currentCatalog = await res.json() || {};
                renderCatalogStoplist();
            }
            else if (type === 'missing') {
                let res = await fetch(`${FB_URL}/missing_items.json`);
                cachedData.missing = await res.json() || {};
                renderMissing();
            }
            else if (type === 'stoplists') {
                // В стоп-листах загружаем оба справочника закупки для ссылок
                let [resOrders, catRes, newCatRes] = await Promise.all([
                    fetch(`${FB_URL}/orders.json`),
                    fetch(`${FB_URL}/catalogs/order.json`),
                    fetch(`${FB_URL}/catalogs/newshop.json`)
                ]);
                cachedData.orders = await resOrders.json() || {};
                let catOrd = await catRes.json() || {};
                let catNew = await newCatRes.json() || {};
                cachedData.catalogOrder = { ...catNew, ...catOrd };
                renderStoplists();
            }
            else if (type === 'checks_table') {
                let [resCheck, resOrders] = await Promise.all([
                    fetch(`${FB_URL}/catalogs/checklist.json`), 
                    fetch(`${FB_URL}/orders.json`)
                ]);
                cachedData.catalog = await resCheck.json() || {};
                
                let ordersObj = await resOrders.json() || {};
                Object.keys(ordersObj).forEach(k => { 
                    if (ordersObj[k]) ordersObj[k].key = k; 
                });
                cachedData.orders = ordersObj;
                
                isChecklistEditMode = false; 
                renderChecksTable();
            }
            else if (type === 'orders') {
                // Загружаем оба справочника (обычный и новый), чтобы ссылки подтянулись отовсюду
                let [ordersRes, catRes, newCatRes] = await Promise.all([
                    fetch(`${FB_URL}/orders.json`),
                    fetch(`${FB_URL}/catalogs/order.json`),
                    fetch(`${FB_URL}/catalogs/newshop.json`)
                ]);
                
                let ordersObj = await ordersRes.json() || {};
                Object.keys(ordersObj).forEach(k => { 
                    if (ordersObj[k]) ordersObj[k].key = k; 
                });
                
                cachedData.orders = ordersObj;
                
                let catOrd = await catRes.json() || {};
                let catNew = await newCatRes.json() || {};
                cachedData.catalog = { ...catNew, ...catOrd };
                
                isSvodEditMode = false;
                svodDeletions = [];
                renderOrdersSvod();
            }
            else if (type === 'stats') {
                let resOrders = await fetch(`${FB_URL}/orders.json`);
                cachedData.orders = await resOrders.json() || {};
                renderStats();
            }
        } catch (e) {
            box.innerHTML = `<div style="color:red; font-weight:bold; font-size:18px;">Ошибка загрузки: ${e.message}</div>`;
        }
    }

    // ==========================================
    // РЕНДЕР: СТАТИСТИКА
    // ==========================================
    function renderStats() {
        const box = document.getElementById('content');
        let shops = ["Бояринова", "Гагарина", "Вертолетчиков", "Липчанского", "Новокосино", "Новокосино 2", "Старое Павлино", "Красноказарменная", "Ухтомского ополчения"];
        
        let stats = {};
        shops.forEach(s => {
            stats[s] = { emptyCount: {}, orderSum: {}, orderCount: {} };
        });

        Object.values(cachedData.orders).forEach(o => {
            if (!o || !stats[o.shop] || !o.items) return;
            let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items);
            
            if (o.mode === 'checklist') {
                itemsArr.forEach(i => {
                    let val = String(i.qty).trim();
                    if (val === "0" || val === "Закончилось" || val === "Меньше половины") {
                        stats[o.shop].emptyCount[i.name] = (stats[o.shop].emptyCount[i.name] || 0) + 1;
                    }
                });
            } else if (o.mode === 'order') {
                itemsArr.forEach(i => {
                    if (i.name === "НЕТ ЗАКАЗА") return;
                    stats[o.shop].orderSum[i.name] = (stats[o.shop].orderSum[i.name] || 0) + parseFloat(i.qty || 0);
                    stats[o.shop].orderCount[i.name] = (stats[o.shop].orderCount[i.name] || 0) + 1;
                });
            }
        });

        let html = `<h3 style="color:#1a237e; font-size:24px; margin-bottom:20px;">📈 Статистика (за всё время)</h3>
                    <div style="display:flex; flex-wrap:wrap; gap:20px;">`;
        
        shops.forEach(s => {
            html += `<div class="card" style="flex: 1 1 calc(33% - 20px); min-width:320px; padding:25px; background:#fff; border-radius:16px; box-shadow:0 4px 15px rgba(0,0,0,0.05);">
                        <h4 style="margin-top:0; color:#311b92; font-size:20px; border-bottom:2px solid #eee; padding-bottom:10px; font-weight:900;">${s}</h4>`;
            
            // Топ заканчивающихся
            let empties = Object.entries(stats[s].emptyCount).sort((a,b) => b[1] - a[1]).slice(0, 5);
            html += `<b style="color:#D50000; font-size:16px;">🛑 Часто заканчивается (Чек-лист):</b>
                     <ul style="margin-top:5px; padding-left:20px; font-size:15px; color:#555; font-weight:bold;">`;
            if (empties.length > 0) {
                empties.forEach(e => html += `<li>${e[0]} <span style="color:#D50000;">(${e[1]} раз)</span></li>`);
            } else {
                html += `<li>Нет данных</li>`;
            }
            html += `</ul>`;

            // Средний заказ
            let averages = Object.entries(stats[s].orderSum).map(e => {
                let avg = (e[1] / stats[s].orderCount[e[0]]).toFixed(1);
                return [e[0], avg];
            }).sort((a,b) => b[1] - a[1]).slice(0, 5);

            html += `<b style="color:#2e7d32; font-size:16px; margin-top:15px; display:inline-block;">📦 Средний заказ (Топ-5 закупка):</b>
                     <ul style="margin-top:5px; padding-left:20px; font-size:15px; color:#555; font-weight:bold;">`;
            if (averages.length > 0) {
                averages.forEach(a => html += `<li>${a[0]}: <span style="color:#2e7d32;">~${a[1]} шт</span></li>`);
            } else {
                html += `<li>Нет данных</li>`;
            }
            html += `</ul></div>`;
        });
        
        html += `</div>`;
        box.innerHTML = html;
    }

    async function switchOrderCatalog(isNew) {
        isNewShopCatalog = isNew;
        currentPath = isNew ? "catalogs/newshop" : "catalogs/order";
        const box = document.getElementById('content');
        box.innerHTML = "<div style='text-align:center; padding:40px; font-weight:bold; font-size:22px; color:#7E57C2;'>⌛ Загрузка каталога...</div>";
        let res = await fetch(`${FB_URL}/${currentPath}.json`);
        currentCatalog = await res.json() || {};
        renderCatalogOrder();
    }

    // ==========================================
    // 1. РЕНДЕР: СПРАВОЧНИК ЗАКУПКИ
    // ==========================================
    function renderCatalogOrder() {
        const box = document.getElementById('content');
        
        let globalCats = ["Основное меню"];
        Object.values(currentCatalog).forEach(i => {
            if(i.globalCat && !globalCats.includes(i.globalCat) && !i.globalCat.includes("!!!")) {
                globalCats.push(i.globalCat);
            }
        });

        let subCats = [...new Set(Object.values(currentCatalog).map(i => i.cat).filter(c => c && !c.includes("!!!")))];

        let html = `
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
            <h3 style="margin:0; font-size:24px; color:#4A148C;">Редактор товаров: ЗАКУПКА</h3>
            <div style="display:flex; gap:15px;">
                <button class="btn-add" onclick="addItemOrder()">➕ Добавить позицию</button>
                <button class="btn-save" style="margin:0; width:auto; padding:14px 28px;" onclick="saveCatalog()">💾 СОХРАНИТЬ В БАЗУ</button>
            </div>
        </div>

        <div style="margin-bottom: 20px; display: flex; gap: 10px;">
            <button class="tab-btn ${!isNewShopCatalog ? 'active' : ''}" style="padding: 10px 20px; font-size: 15px;" onclick="switchOrderCatalog(false)">📦 Обычная закупка</button>
            <button class="tab-btn ${isNewShopCatalog ? 'active' : ''}" style="padding: 10px 20px; font-size: 15px;" onclick="switchOrderCatalog(true)">🏗 На новую кофейню</button>
        </div>

        <div class="settings-panel">
            <h4 style="margin-top:0; font-size:19px; color:#d32f2f; cursor:pointer; display:flex; justify-content:space-between; align-items:center;" onclick="toggleElements('settings-content-div')">
                <span>⚙️ Настройки (Скрывать глобальные категории в приложении)</span>
                <span>▼</span>
            </h4>
            <div class="settings-content-div" style="display:none; flex-wrap:wrap; gap:20px; margin-top:15px;">
                <label class="toggle-label" style="color:#2e7d32;">
                    <input type="checkbox" onchange="toggleSetting('new_shop_order_active', this.checked)" ${appSettings.new_shop_order_active ? 'checked' : ''}> 
                    Показывать кнопку "Закупка на новую кофейню"
                </label>`;
        
        globalCats.forEach(gc => {
            if(gc.includes("!!!")) return; 
            let isHidden = appSettings.hidden_categories[gc];
            html += `<label class="toggle-label">
                        <input type="checkbox" onchange="toggleHiddenCategory('${gc}', this.checked)" ${isHidden ? 'checked' : ''}> 
                        Скрыть "${gc}"
                     </label>`;
        });
        
        html += `</div></div>
        
        <table style="min-width:1400px;">
            <tr>
                <th style="width:160px;">Глоб. Категория</th>
                <th style="width:160px;">Подкатегория</th>
                <th style="width:200px;">Наименование</th>
                <th style="width:100px;">Поставщик</th>
                <th style="width:80px;">Цена 1 (₽)</th>
                <th>Ссылка 1</th>
                <th style="width:80px;">Цена 2 (₽)</th>
                <th>Ссылка 2</th>
                <th style="width:60px; text-align:center;">Удалить</th>
            </tr>`;

        let grouped = {};
        Object.keys(currentCatalog).forEach(k => {
            let item = currentCatalog[k];
            let gc = item.globalCat || "Основное меню";
            let sc = item.cat || "Прочее";
            if (!grouped[gc]) grouped[gc] = {};
            if (!grouped[gc][sc]) grouped[gc][sc] = [];
            grouped[gc][sc].push({k: k, item: item});
        });

        // Сортировка: Новые папки !!! всегда наверху
        Object.keys(grouped).sort((a,b) => {
            if(a.includes("!!!")) return -1;
            if(b.includes("!!!")) return 1;
            return a.localeCompare(b);
        }).forEach(gc => {
            let safeGc = getSafeId(gc);
            let displayGc = gc.replace("!!! НОВОЕ", "Новая добавленная позиция");
            
            html += `<tr class="cat-group-header" onclick="toggleLvl1('${safeGc}')">
                        <td colspan="9" style="padding:18px; background:#d1c4e9; font-size:20px;">🌍 <b>${displayGc}</b> <span style="float:right;">▼</span></td>
                     </tr>`;
            
            Object.keys(grouped[gc]).sort((a,b) => {
                if(a.includes("!!!")) return -1;
                if(b.includes("!!!")) return 1;
                return a.localeCompare(b);
            }).forEach(sc => {
                let safeSc = getSafeId(gc + "_" + sc); 
                let displaySc = sc.replace("!!! НОВОЕ", "Заполните данные");
                
                let displayStyle = gc.includes("!!!") ? "table-row" : "none";
                
                html += `<tr class="cat-group-header lvl2_${safeGc}" style="display:${displayStyle};" onclick="toggleElements('lvl3_${safeSc}')">
                            <td colspan="9" style="padding:15px; padding-left:30px; font-size:18px;">📂 ${displaySc} <span style="float:right;">▼</span></td>
                         </tr>`;
                
                grouped[gc][sc].sort((a,b) => (a.item.name||'').localeCompare(b.item.name||'')).forEach(data => {
                    let k = data.k; 
                    let item = data.item;
                    
                    let gcatOptions = `<option value="${item.globalCat || 'Основное меню'}">${(item.globalCat || 'Основное меню').replace("!!! НОВОЕ", "Выберите...")}</option>`;
                    globalCats.forEach(c => { 
                        if(c !== (item.globalCat || 'Основное меню')) {
                            gcatOptions += `<option value="${c}">${c}</option>`; 
                        }
                    });
                    gcatOptions += `<option value="НОВАЯ ГЛОБАЛЬНАЯ">-- Создать --</option>`;

    // ==========================================
    // 7. РЕНДЕР: СВОД ЗАКАЗОВ И ИСТОРИЯ
    // ==========================================
    function renderOrdersSvod() {
        const box = document.getElementById('content');
        
        let cutoffMonth = Date.now() - (30 * 24 * 60 * 60 * 1000); 
        let todayStart = new Date().setHours(0,0,0,0);
        
        let historyKeys = new Set();
        let todaysOrders = [];
        let historyOrdersList = [];
        
        let allOrders = Object.values(cachedData.orders).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));

        allOrders.forEach(o => {
            if (o && (o.mode === 'order' || o.mode === 'new_shop')) {
                if ((o.timestamp || 0) < cutoffMonth) return; 
                
                // В свод попадают ТОЛЬКО те, что еще НЕ собирались (svod: false)
                // Если svod вообще не прописан (ошибка базы), тоже считаем как false
                if (o.svod === false || !o.svod || (o.timestamp || 0) >= todayStart) {
                    todaysOrders.push(o);
                } else {
                    if (o.svod === true) {
                        let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                        itemsArr.forEach(i => { 
                            if(i) historyKeys.add(o.shop + "|" + i.name); 
                        });
                    }
                }

                if (o.svod === true) {
                    historyOrdersList.push(o);
                }
            }
        });

        let svodData = {};
        todaysOrders.forEach(o => {
            if (!svodData[o.shop]) {
                svodData[o.shop] = { items: {}, lentaSum: 0, ozonSum: 0, kuperSum: 0, comments: [] };
            }
            if (o.comment && o.comment.trim() !== "") {
                svodData[o.shop].comments.push(o.comment);
            }
            
            let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
            itemsArr.forEach(i => {
                if (i) {
                    if (!svodData[o.shop].items[i.name]) {
                        svodData[o.shop].items[i.name] = 0;
                    }
                    svodData[o.shop].items[i.name] += parseFloat(i.qty) || 0;
                }
            });
        });

        let btnEditColor = isSvodEditMode ? "#f44336" : "#0288d1";
        let btnEditText = isSvodEditMode ? "❌ Выйти из редактирования" : "✏️ Режим редактирования";

        let html = `<div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;">
                        <h3 style='color:#311B92; font-size:24px; margin:0;'>📊 Свод по кофейням (Ожидают сборки)</h3>
                        <button onclick="toggleSvodEdit()" class="btn-add" style="background:${btnEditColor};">${btnEditText}</button>
                    </div>`;

        if (isSvodEditMode) {
            html += `<button onclick="saveSvodEdits()" class="btn-save" style="margin-top:0; margin-bottom:20px;">💾 СОХРАНИТЬ И УДАЛИТЬ ПОЗИЦИИ</button>`;
        }

        html += `<table style='margin-bottom:20px;'>
                    <tr>
                        <th>Кофейня / Товар</th>
                        <th style="text-align:center;">Кол-во</th>
                        <th>Поставщик</th>
                        <th style="text-align:center;">${isSvodEditMode ? 'Удалить' : 'Ссылка'}</th>
                    </tr>`;
        
        let totalLenta = 0; let totalOzon = 0; let totalKuper = 0;

        if (Object.keys(svodData).length === 0) {
            html += `<tr><td colspan="4" style="text-align:center; padding:20px; font-weight:bold; font-size:18px; color:#888;">Нет заказов, ожидающих сборки</td></tr>`;
        } else {
            for(let shop in svodData) {
                // Сначала вычисляем предварительную сумму Ленты для логики Купера
                for(let name in svodData[shop].items) {
                    let catItem = Object.values(cachedData.catalog).find(c => c && c.name === name) || {};
                    let vendor = catItem.vendor || 'Лента';
                    let price = parseFloat(catItem.price) || 0;
                    if(vendor.toLowerCase() === 'лента') {
                        svodData[shop].lentaSum += (svodData[shop].items[name] * price);
                    }
                }

                let isKuper = svodData[shop].lentaSum > 0 && svodData[shop].lentaSum < 2000;

                let safeShopId = getSafeId(shop);
                html += `<tr class="cat-group-header" onclick="toggleElements('svod_${safeShopId}')">
                            <td colspan="4" style="background:#ede7f6; padding:15px; font-size:19px; color:#311B92;"><b>📍 ${shop}</b> <span style="float:right;">▼</span></td>
                         </tr>`;

                let sortedItemNames = Object.keys(svodData[shop].items).sort((a,b) => {
                    let catItemA = Object.values(cachedData.catalog).find(c => c && c.name === a) || {};
                    let catItemB = Object.values(cachedData.catalog).find(c => c && c.name === b) || {};
                    let vendorA = (catItemA.vendor || 'Лента').toLowerCase();
                    let vendorB = (catItemB.vendor || 'Лента').toLowerCase();
                    
                    if (vendorA < vendorB) return -1;
                    if (vendorA > vendorB) return 1;
                    return a.localeCompare(b);
                });

                sortedItemNames.forEach(name => {
                    let catItem = Object.values(cachedData.catalog).find(c => c && c.name === name) || {};
                    let vendor = catItem.vendor || 'Лента';
                    let price = parseFloat(catItem.price) || 0;
                    let qty = svodData[shop].items[name];
                    let isRepeat = historyKeys.has(shop + "|" + name);
                    
                    let link1 = catItem.link ? `<a href="${catItem.link}" target="_blank" style="color:#0288d1; font-weight:bold;">🔗 Осн</a>` : "";
                    let link2 = catItem.link2 ? `<a href="${catItem.link2}" target="_blank" style="color:#e53935; font-weight:bold; margin-left:8px;">🔗 Рез</a>` : "";
                    let linksHtml = [link1, link2].filter(Boolean).join(" ");

                    if(vendor.toLowerCase() === 'лента' && isKuper) vendor = 'Купер';

                    let isDeleted = svodDeletions.some(d => d.shop === shop && d.name === name);
                    let displayQty = isDeleted ? 0 : qty;

                    let cost = price * displayQty;
                    if(vendor.toLowerCase() === 'озон' && isRepeat) cost = 0;
                    
                    if (vendor.toLowerCase() === 'лента') totalLenta += cost;
                    else if (vendor.toLowerCase() === 'озон') totalOzon += cost;
                    else if (vendor.toLowerCase() === 'купер') totalKuper += cost;

                    let repeatBadge = isRepeat ? `<span style='color:#d32f2f; font-size:13px; margin-left:5px; font-weight:bold;'>(Повтор)</span>` : ``;
                    
                    let safeNameParam = name.replace(/'/g, "\\'");

                    if (isSvodEditMode) {
                        html += `<tr class="svod_${safeShopId}" style="display:none;">
                            <td style="font-size:17px; padding-left:25px; font-weight:bold; color:${isDeleted ? '#aaa' : '#333'}">${name} ${repeatBadge}</td>
                            <td style="font-size:18px; font-weight:bold; color:${isDeleted ? '#aaa' : '#311b92'}; text-align:center;">${qty}</td>
                            <td style="font-size:16px; color:${isDeleted ? '#aaa' : '#333'}">${vendor}</td>
                            <td style="text-align:center;">
                                <button class="btn-del" ${isDeleted ? 'disabled' : ''} onclick="markSvodDelete(this, '${shop}', '${safeNameParam}')">🗑</button>
                            </td>
                        </tr>`;
                    } else {
                        html += `<tr class="svod_${safeShopId}" style="display:none;">
                            <td style="font-size:17px; padding-left:25px; font-weight:bold;">${name} ${repeatBadge}</td>
                            <td style="font-size:18px; font-weight:bold; color:#311b92; text-align:center;">${qty}</td>
                            <td style="font-size:16px;">${vendor}</td>
                            <td style="text-align:center;">${linksHtml}</td>
                        </tr>`;
                    }
                });
                
                if(svodData[shop].comments.length > 0) {
                    html += `<tr class="svod_${safeShopId}" style="display:none;"><td colspan="4" style="padding:15px; font-style:italic; font-size:17px; color:#ef6c00; background:#fff3e0;">💬 Комментарий: <b>${svodData[shop].comments.join(' | ')}</b></td></tr>`;
                }
            }
        }
        
        html += `</table>`;

        if (Object.keys(svodData).length > 0) {
            html += `<div style="display:flex; justify-content:flex-end; gap:30px; font-size:19px; background:#fff; padding:25px; border-radius:12px; box-shadow:0 4px 15px rgba(0,0,0,0.05);">
                        <div style="text-align:center;">🛒 Лента<br><b style="font-size:24px; color:#2e7d32;">${totalLenta} ₽</b></div>
                        <div style="text-align:center;">📦 Озон<br><b style="font-size:24px; color:#0288d1;">${totalOzon} ₽</b></div>
                        <div style="text-align:center;">🛵 Купер<br><b style="font-size:24px; color:#c2185b;">${totalKuper} ₽</b></div>
                        <div style="text-align:center; border-left:2px solid #eee; padding-left:25px;">💵 ИТОГО<br><b style="font-size:28px; color:#4A148C;">${totalLenta+totalOzon+totalKuper} ₽</b></div>
                    </div>`;
        }

        html += `
            <div onclick="toggleElements('history-content')" style="cursor:pointer; background:#ede7f6; padding:18px; border-radius:12px; font-weight:900; color:#311B92; margin-top:40px; display:flex; justify-content:space-between; font-size:20px;">
                <span>🕒 История операций (Собранные закупки за месяц)</span><span>▼</span>
            </div>
            
            <div class="history-content" style="display:none; margin-top:15px;">
                <table>
                    <tr>
                        <th>Кофейня</th>
                        <th>Тип</th>
                        <th>Дата</th>
                        <th>Детали</th>
                        <th>Комментарий</th>
                        <th style="text-align:center;">Удалить</th>
                    </tr>`;
        
        if (historyOrdersList.length === 0) {
            html += `<tr><td colspan="6" style="text-align:center; color:#888; font-size:17px; font-weight:bold;">История пуста</td></tr>`;
        } else {
            historyOrdersList.forEach(o => {
                let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                let itemsStr = itemsArr.map(i => i ? `${i.name} <b>(${i.qty})</b>` : '').join(', ');
                let date = o.timestamp ? new Date(o.timestamp).toLocaleString('ru-RU') : '---';
                let modeLabel = o.mode === 'new_shop' ? '🏗 Новая кофейня' : '📦 Закупка';
                
                html += `<tr class="order-row">
                    <td><b style="color:#311B92; font-size:17px;">${o.shop}</b></td>
                    <td><span style="background:#ede7f6; padding:6px 10px; border-radius:6px; font-weight:bold; font-size:14px;">${modeLabel}</span></td>
                    <td style="color:#666; font-size:14px; font-weight:bold;">${date}</td>
                    <td style="font-size:15px; line-height:1.5;">${itemsStr}</td>
                    <td style="font-style:italic; font-size:14px; color:#888;">${o.comment || ''}</td>
                    <td style="text-align:center;">
                        <button class="btn-del" onclick="deleteOrder('${o.key}')">🗑</button>
                    </td>
                </tr>`;
            });
        }
        html += `</table></div>`;
        
        box.innerHTML = html;
    }

    // ==========================================
    // УТИЛИТЫ CRM, СОХРАНЕНИЯ И УДАЛЕНИЯ
    // ==========================================
    function toggleSvodEdit() {
        isSvodEditMode = !isSvodEditMode;
        svodDeletions = [];
        renderOrdersSvod();
    }

    function markSvodDelete(btn, shop, name) {
        let tr = btn.closest('tr');
        tr.style.opacity = '0.4';
        tr.style.textDecoration = 'line-through';
        svodDeletions.push({shop: shop, name: name});
        btn.disabled = true;
        renderOrdersSvod(); 
    }

    async function saveSvodEdits() {
        if (svodDeletions.length === 0) {
            toggleSvodEdit();
            return;
        }
        
        const btn = document.querySelector('.btn-save');
        if(btn) btn.innerHTML = "⌛ СОХРАНЕНИЕ...";

        try {
            let todayStart = new Date().setHours(0,0,0,0);
            
            for (let k in cachedData.orders) {
                let o = cachedData.orders[k];
                if (o && (o.mode === 'order' || o.mode === 'new_shop') && (o.svod === false || !o.svod || (o.timestamp || 0) >= todayStart)) {
                    
                    let needsUpdate = false;
                    let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                    
                    let newItemsArr = itemsArr.filter(i => {
                        let match = svodDeletions.find(d => d.shop === o.shop && d.name === i.name);
                        if (match) {
                            needsUpdate = true;
                            return false;
                        }
                        return true;
                    });
                    
                    if (needsUpdate) {
                        if (newItemsArr.length === 0) {
                            newItemsArr = [{name: "НЕТ ЗАКАЗА", qty: 0}];
                        }
                        await fetch(`${FB_URL}/orders/${k}/items.json`, {method:'PUT', body: JSON.stringify(newItemsArr)});
                    }
                }
            }
            
            alert("✅ Лишние позиции успешно удалены!");
            isSvodEditMode = false;
            loadTab('orders', document.querySelector('.tab-btn.active'));
        } catch (e) {
            alert("❌ Ошибка при удалении: " + e.message);
        }
    }

    function toggleChecklistEdit() {
        isChecklistEditMode = !isChecklistEditMode;
        renderChecksTable();
    }

    async function saveChecklistEdits() {
        let inputs = document.querySelectorAll('.edit-chk-input');
        let updates = {};
        
        inputs.forEach(input => {
            let oKey = input.getAttribute('data-order');
            let item = input.getAttribute('data-item');
            let val = input.value.trim();
            if(!updates[oKey]) updates[oKey] = {};
            updates[oKey][item] = val;
        });

        const btn = document.querySelector('.btn-save');
        if(btn) btn.innerHTML = "⌛ СОХРАНЕНИЕ...";

        try {
            for(let oKey in updates) {
                let order = cachedData.orders[oKey];
                if(!order) continue;
                let itemsArr = Array.isArray(order.items) ? order.items : Object.values(order.items||{});
                
                for(let item in updates[oKey]) {
                    let found = itemsArr.find(i => i && i.name === item);
                    if(found) {
                        found.qty = updates[oKey][item];
                    } else {
                        itemsArr.push({name: item, qty: updates[oKey][item], cat: "Прочее"});
                    }
                }
                await fetch(`${FB_URL}/orders/${oKey}/items.json`, {method:'PUT', body: JSON.stringify(itemsArr)});
            }
            alert("✅ Изменения в чек-листе успешно сохранены в базе!");
            loadTab('checks_table', document.querySelector('.tab-btn.active'));
        } catch(e) {
            alert("❌ Ошибка сохранения: " + e.message);
        }
    }

    function updateVal(id, field, val) { 
        if (val === "НОВАЯ ГЛОБАЛЬНАЯ" || val === "НОВАЯ КАТЕГОРИЯ") {
            let newCat = prompt("Введите название новой категории:");
            if (newCat) {
                currentCatalog[id][field] = newCat;
                if (currentPath.includes('order')) renderCatalogOrder();
                else if (currentPath.includes('stoplist')) renderCatalogStoplist();
                else renderCatalogChecklist();
            } else {
                if (currentPath.includes('order')) renderCatalogOrder();
                else if (currentPath.includes('stoplist')) renderCatalogStoplist();
                else renderCatalogChecklist();
                return;
            }
        } else {
            currentCatalog[id][field] = val; 
        }
    }
    
    function addItemOrder() { 
        let id = "item_" + Date.now(); 
        currentCatalog[id] = { globalCat: "!!! НОВОЕ", cat: "!!! НОВОЕ", name: "Новая позиция", vendor: "Лента", price: 0, price2: 0, link: "", link2: "", fallback: "" }; 
        renderCatalogOrder();
    }
    
    function addItemChecklist() { 
        let id = "item_" + Date.now(); 
        currentCatalog[id] = { globalCat: "!!! НОВОЕ", cat: "!!! НОВОЕ", name: "Новая позиция", unit: "текст" }; 
        renderCatalogChecklist();
    }

    function addItemStoplist() { 
        let id = "stop_" + Date.now(); 
        currentCatalog[id] = { cat: "!!! НОВОЕ", name: "Новый продукт", sez: "", main: "" }; 
        renderCatalogStoplist();
    }
    
    async function deleteItem(id) { 
        if(confirm("Вы уверены, что хотите УДАЛИТЬ эту позицию НАВСЕГДА?")) { 
            await fetch(`${FB_URL}/${currentPath}/${id}.json`, { method: 'DELETE' });
            delete currentCatalog[id]; 
            
            loadTab(currentTabType, document.querySelector('.tab-btn.active'));
        } 
    }

    async function deleteOrder(key) {
        if(confirm("Вы уверены, что хотите УДАЛИТЬ этот заказ навсегда?")) {
            await fetch(`${FB_URL}/orders/${key}.json`, { method: 'DELETE' });
            alert("Заказ удален!");
            loadTab('orders', document.querySelector('.tab-btn.active'));
        }
    }

    async function deleteMissing(key) {
        if(confirm("Вы уверены, что хотите УДАЛИТЬ этот недовоз навсегда?")) {
            await fetch(`${FB_URL}/missing_items/${key}.json`, { method: 'DELETE' });
            alert("Недовоз удален!");
            loadTab('missing', document.querySelector('.tab-btn.active'));
        }
    }

    async function toggleSetting(key, val) {
        appSettings[key] = val;
        await fetch(`${FB_URL}/settings.json`, { method: 'PUT', body: JSON.stringify(appSettings) });
    }

    async function toggleHiddenCategory(cat, isHidden) {
        appSettings.hidden_categories[cat] = isHidden;
        await fetch(`${FB_URL}/settings/hidden_categories.json`, { method: 'PUT', body: JSON.stringify(appSettings.hidden_categories) });
    }

    async function saveCatalog() {
        const btn = document.querySelector('.btn-save'); 
        btn.innerHTML = "⌛ СОХРАНЕНИЕ...";
        try { 
            await fetch(`${FB_URL}/${currentPath}.json`, { method: 'PUT', body: JSON.stringify(currentCatalog) }); 
            alert("✅ База обновлена и мгновенно доступна сотрудникам!"); 
            loadTab(currentTabType, document.querySelector('.tab-btn.active'));
        } catch(e) { 
            alert("❌ Ошибка при сохранении!"); 
        }
    }

    async function updateMissingStatus(key, val) {
        await fetch(`${FB_URL}/missing_items/${key}/status.json`, { method: 'PUT', body: JSON.stringify(val) });
        alert("Статус недовоза успешно сохранен!");
    }
    
    window.onload = () => loadTab('orders', document.querySelector('.tab-btn'));
</script>
</body>
</html>
