<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Coffee CRM - Управление сетью</title>
    <style>
        /* =========================================
           ОБЩИЕ СТИЛИ
        ========================================= */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: linear-gradient(135deg, #FFF0F5 0%, #ede7f6 100%); 
            margin: 0; 
            padding: 20px; 
            color: #333; 
            min-height: 100vh; 
        }
        
        .nav { 
            background: linear-gradient(135deg, #F06292 0%, #7E57C2 100%); 
            color: white; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
        }
        
        /* =========================================
           ВКЛАДКИ МЕНЮ
        ========================================= */
        .tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 20px; 
            overflow-x: auto; 
            padding-bottom: 10px; 
        }
        
        .tab-btn { 
            padding: 18px 32px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            background: #ffffff; 
            color:#7E57C2; 
            font-weight: 900; 
            font-size: 17px; 
            transition: 0.3s; 
            white-space: nowrap; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
        }
        
        .tab-btn.active { 
            background: linear-gradient(135deg, #7E57C2 0%, #4A148C 100%); 
            color: white; 
        }
        
        /* =========================================
           КАРТОЧКИ И ТАБЛИЦЫ
        ========================================= */
        .card { 
            background: white; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            overflow-x: auto; 
        }
        
        table { 
            width: 100%; 
            border-collapse: collapse; 
            margin-top: 15px; 
            font-size: 17px; 
            min-width: 1000px; 
        }
        
        th { 
            background: #fdfcff; 
            padding: 16px 14px; 
            text-align: left; 
            border-bottom: 2px solid #e1bee7; 
            color: #4A148C; 
            text-transform: uppercase; 
            letter-spacing: 0.5px; 
            font-weight: 900; 
        }
        
        td { 
            padding: 14px; 
            border-bottom: 1px solid #f0f0f0; 
        }
        
        /* =========================================
           ФОРМЫ ВВОДА
        ========================================= */
        input, select { 
            width: 100%; 
            padding: 12px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-family: inherit; 
            box-sizing: border-box; 
            font-size:15px; 
            font-weight: bold;
        }
        
        input:focus, select:focus { 
            border-color: #7E57C2; 
            outline: none; 
            background: #faf8ff; 
        }
        
        .btn-del { 
            color: #d32f2f; 
            cursor: pointer; 
            border: none; 
            background: #ffebee; 
            border-radius: 8px; 
            padding: 8px 12px; 
            font-size: 16px; 
            font-weight: bold; 
            transition: 0.2s;
        }

        .btn-del:hover { background: #ffcdd2; }
        .btn-del:disabled { background: #eee; color: #aaa; cursor: not-allowed; }

        .btn-save { 
            background: linear-gradient(135deg, #4caf50 0%, #2e7d32 100%); 
            color: white; 
            padding: 20px; 
            border: none; 
            border-radius: 12px; 
            cursor: pointer; 
            font-weight: 900; 
            font-size: 20px; 
            box-shadow: 0 4px 15px rgba(76,175,80,0.3); 
        }
        
        .btn-add { 
            background: linear-gradient(135deg, #03a9f4 0%, #0277bd 100%); 
            color: white; 
            padding: 14px 28px; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: 900; 
            font-size:16px; 
        }
        
        .repeat-row { background-color: #ffebee !important; }
        .order-row:hover { background-color: #f9f9f9; }
        
        .cat-group-header { 
            background: #ede7f6; 
            font-weight: 900; 
            cursor: pointer; 
            color: #311b92; 
            transition: 0.2s; 
        }
        
        .cat-group-header:hover { background: #d1c4e9; }
        
        .chk-row:hover { 
            background-color: #f1f8e9 !important; 
            transition: 0.2s; 
        }
        
        .ch-val { text-align: center; font-weight: bold; font-size:16px; }
        .ch-full { color: #2e7d32; }
        .ch-empty { color: #c62828; }
        
        /* Стили для настроек */
        .settings-panel { 
            background: #f8f9fa; 
            padding: 20px; 
            border-radius: 12px; 
            margin-bottom: 20px; 
            border: 1px solid #e0e0e0; 
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }
        
        .toggle-label { 
            display: flex; 
            align-items: center; 
            cursor: pointer; 
            margin-bottom: 10px; 
            font-weight: 900; 
            color: #4A148C; 
            font-size: 17px;
        }
        
        .toggle-label input { 
            width: auto; 
            margin-right: 12px; 
            transform: scale(1.5); 
        }
        
        .edit-chk-input {
            width: 100%;
            text-align: center;
            padding: 8px;
            font-size: 15px;
            font-weight: bold;
            color: #311B92;
            border: 2px solid #7E57C2;
            border-radius: 6px;
        }
    </style>
</head>
<body>

<div class="nav">
    <h2 style="margin:0;">💼 Coffee TEIKU CRM</h2>
    <div id="db-status">☁️ База активна</div>
</div>

<div class="tabs">
    <button class="tab-btn active" onclick="loadTab('orders', this)">📋 Свод и Заказы</button>
    <button class="tab-btn" onclick="loadTab('checks_table', this)">✅ Таблица Чек-листов</button>
    <button class="tab-btn" onclick="loadTab('stoplists', this)">🛑 Стоп-листы</button>
    <button class="tab-btn" onclick="loadTab('missing', this)">‼️ Недовозы</button>
    <button class="tab-btn" onclick="loadTab('catalog_order', this)">🛒 Справочник Закупки</button>
    <button class="tab-btn" onclick="loadTab('catalog_checklist', this)">📝 Справочник Чек-листа</button>
    <button class="tab-btn" onclick="loadTab('catalog_stoplist', this)">🛑 Справочник Стоп-листа</button>
    <button class="tab-btn" onclick="loadTab('stats', this)">📈 Статистика</button>
</div>

<div class="card" id="content">Загрузка данных...</div>

<script>
    // ==========================================
    // ГЛОБАЛЬНЫЕ ПЕРЕМЕННЫЕ И ПОДКЛЮЧЕНИЕ
    // ==========================================
    const FB_URL = "https://project-lenta22-default-rtdb.firebaseio.com";
    let currentCatalog = {};
    let currentPath = "";
    let currentTabType = "";
    let isNewShopCatalog = false; 
    let appSettings = { hidden_categories: {}, new_shop_order_active: false };
    let cachedData = {};
    
    // Переменные режимов редактирования
    let isChecklistEditMode = false;
    let isSvodEditMode = false;
    let svodDeletions = []; 
    let tempSvodQty = {}; 
    let tempSvodStatus = {};
    let openSvodShops = new Set();

    // БЕЗОПАСНЫЙ ХЭШ-ID
    function getSafeId(str) {
        if (!str) return "id_empty_" + Math.floor(Math.random() * 10000);
        let res = "";
        for (let i = 0; i < str.length; i++) {
            res += str.charCodeAt(i).toString(16);
        }
        return "id_" + res;
    }

    // УМНОЕ РАСКРЫТИЕ/ЗАКРЫТИЕ
    function toggleElements(cls) { 
        let els = document.querySelectorAll('.' + cls);
        if (els.length === 0) {
            let single = document.getElementById(cls);
            if (single) single.style.display = single.style.display === 'none' ? 'block' : 'none';
            return;
        }
        els.forEach(el => {
            if (el.tagName === 'DIV') {
                el.style.display = el.style.display === 'none' ? 'flex' : 'none';
            } else {
                el.style.display = el.style.display === 'none' ? 'table-row' : 'none';
            }
        }); 
    }

    function toggleLvl1(gcId) {
        let subs = document.querySelectorAll('.lvl2_' + gcId);
        let isClosing = false;
        subs.forEach(el => {
            if (el.style.display === 'none') {
                el.style.display = 'table-row';
            } else {
                el.style.display = 'none';
                isClosing = true;
            }
        });
        if (isClosing) {
            let items = document.querySelectorAll('.lvl3_of_' + gcId);
            items.forEach(el => el.style.display = 'none');
        }
    }

    // ТУМБЛЕР ДЛЯ СВОДА (С ПАМЯТЬЮ СОСТОЯНИЯ)
    function toggleSvodShop(safeShopId) {
        let els = document.querySelectorAll('.svod_' + safeShopId);
        let isOpening = false;
        els.forEach(el => {
            if (el.style.display === 'none' || el.style.display === '') {
                el.style.display = 'table-row';
                isOpening = true;
            } else {
                el.style.display = 'none';
            }
        });
        if (isOpening) openSvodShops.add(safeShopId);
        else openSvodShops.delete(safeShopId);
    }

    async function triggerPcBuild(cmd) {
        if (!confirm(`Отправить команду ${cmd} на ПК?`)) return;
        try {
            await fetch(`${FB_URL}/bot_control/pc_command.json`, {
                method: 'PUT',
                body: JSON.stringify({ command: cmd, timestamp: Date.now() })
            });
            alert(`✅ Команда ${cmd} успешно отправлена боту-снайперу!`);
        } catch (e) {
            alert(`❌ Ошибка: ` + e.message);
        }
    }

    // ==========================================
    // ГЛАВНАЯ ФУНКЦИЯ ЗАГРУЗКИ ВЛАДОК
    // ==========================================
    async function loadTab(type, btn) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        
        currentTabType = type;
        const box = document.getElementById('content');
        box.innerHTML = "<div style='text-align:center; padding:40px; font-weight:bold; font-size:22px; color:#7E57C2;'>⌛ Синхронизация данных из Firebase...</div>";

        try {
            let [resCat, resNewCat] = await Promise.all([
                fetch(`${FB_URL}/catalogs/order.json`),
                fetch(`${FB_URL}/catalogs/newshop.json`)
            ]);
            let catOrd = await resCat.json() || {};
            let catNew = await resNewCat.json() || {};
            cachedData.catalogOrder = { ...catOrd, ...catNew };
            cachedData.catalog = cachedData.catalogOrder;

            if (type === 'catalog_order') {
                isNewShopCatalog = false;
                currentPath = "catalogs/order";
                let [res, setRes] = await Promise.all([
                    fetch(`${FB_URL}/${currentPath}.json`),
                    fetch(`${FB_URL}/settings.json`)
                ]);
                currentCatalog = await res.json() || {};
                appSettings = await setRes.json() || { hidden_categories: {}, new_shop_order_active: false };
                if (!appSettings.hidden_categories) appSettings.hidden_categories = {};
                renderCatalogOrder();
            } 
            else if (type === 'catalog_checklist') {
                currentPath = "catalogs/checklist";
                let res = await fetch(`${FB_URL}/${currentPath}.json`);
                currentCatalog = await res.json() || {};
                renderCatalogChecklist();
            }
            else if (type === 'catalog_stoplist') {
                currentPath = "catalogs/stoplist";
                let res = await fetch(`${FB_URL}/${currentPath}.json`);
                currentCatalog = await res.json() || {};
                renderCatalogStoplist();
            }
            else if (type === 'missing') {
                let [resMiss, catRes, newCatRes] = await Promise.all([
                    fetch(`${FB_URL}/missing_items.json`),
                    fetch(`${FB_URL}/catalogs/order.json`),
                    fetch(`${FB_URL}/catalogs/newshop.json`)
                ]);
                cachedData.missing = await resMiss.json() || {};
                renderMissing();
            }
            else if (type === 'stoplists') {
                let [resOrders, catRes, newCatRes] = await Promise.all([
                    fetch(`${FB_URL}/orders.json`),
                    fetch(`${FB_URL}/catalogs/order.json`),
                    fetch(`${FB_URL}/catalogs/newshop.json`)
                ]);
                cachedData.orders = await resOrders.json() || {};
                renderStoplists();
            }
            else if (type === 'checks_table') {
                let [resCheck, resOrders] = await Promise.all([
                    fetch(`${FB_URL}/catalogs/checklist.json`), 
                    fetch(`${FB_URL}/orders.json`)
                ]);
                cachedData.catalog = await resCheck.json() || {};
                let ordersObj = await resOrders.json() || {};
                Object.keys(ordersObj).forEach(k => { if (ordersObj[k]) ordersObj[k].key = k; });
                cachedData.orders = ordersObj;
                isChecklistEditMode = false; 
                renderChecksTable();
            }
            else if (type === 'orders') {
                let [ordersRes, catRes, newCatRes] = await Promise.all([
                    fetch(`${FB_URL}/orders.json`),
                    fetch(`${FB_URL}/catalogs/order.json`),
                    fetch(`${FB_URL}/catalogs/newshop.json`)
                ]);
                let ordersObj = await ordersRes.json() || {};
                Object.keys(ordersObj).forEach(k => { if (ordersObj[k]) ordersObj[k].key = k; });
                cachedData.orders = ordersObj;
                
                isSvodEditMode = false;
                svodDeletions = [];
                tempSvodQty = {}; 
                tempSvodStatus = {};
                openSvodShops.clear(); 
                renderOrdersSvod();
            }
            else if (type === 'stats') {
                let resOrders = await fetch(`${FB_URL}/orders.json`);
                cachedData.orders = await resOrders.json() || {};
                renderStats();
            }
        } catch (e) {
            box.innerHTML = `<div style="color:red; font-weight:bold; font-size:18px;">Ошибка загрузки: ${e.message}</div>`;
        }
    }

    // ==========================================
    // РЕНДЕР: СТАТИСТИКА
    // ==========================================
    function renderStats() {
        const box = document.getElementById('content');
        let shops = ["Бояринова", "Гагарина", "Вертолетчиков", "Липчанского", "Новокосино", "Новокосино 2", "Старое Павлино", "Красноказарменная", "Ухтомского ополчения"];
        let stats = {};
        shops.forEach(s => { stats[s] = { emptyCount: {}, orderSum: {}, orderCount: {} }; });

        Object.values(cachedData.orders).forEach(o => {
            if (!o || !stats[o.shop] || !o.items) return;
            let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items);
            if (o.mode === 'checklist') {
                itemsArr.forEach(i => {
                    let val = String(i.qty).trim();
                    if (val === "0" || val === "Закончилось" || val === "Меньше половины") {
                        stats[o.shop].emptyCount[i.name] = (stats[o.shop].emptyCount[i.name] || 0) + 1;
                    }
                });
            } else if (o.mode === 'order') {
                itemsArr.forEach(i => {
                    if (i.name === "НЕТ ЗАКАЗА") return;
                    stats[o.shop].orderSum[i.name] = (stats[o.shop].orderSum[i.name] || 0) + parseFloat(i.qty || 0);
                    stats[o.shop].orderCount[i.name] = (stats[o.shop].orderCount[i.name] || 0) + 1;
                });
            }
        });

        let html = `<h3 style="color:#1a237e; font-size:24px; margin-bottom:20px;">📈 Статистика (за всё время)</h3><div style="display:flex; flex-wrap:wrap; gap:20px;">`;
        shops.forEach(s => {
            let displayName = s === 'Красноказарменная' ? 'МЭИ' : s;
            html += `<div class="card" style="flex: 1 1 calc(33% - 20px); min-width:320px; padding:25px; background:#fff; border-radius:16px; box-shadow:0 4px 15px rgba(0,0,0,0.05);">
                        <h4 style="margin-top:0; color:#311b92; font-size:20px; border-bottom:2px solid #eee; padding-bottom:10px; font-weight:900;">${displayName}</h4>`;
            
            let empties = Object.entries(stats[s].emptyCount).sort((a,b) => b[1] - a[1]).slice(0, 5);
            html += `<b style="color:#D50000; font-size:16px;">🛑 Часто заканчивается (Чек-лист):</b><ul style="margin-top:5px; padding-left:20px; font-size:15px; color:#555; font-weight:bold;">`;
            if (empties.length > 0) {
                empties.forEach(e => html += `<li>${e[0]} <span style="color:#D50000;">(${e[1]} раз)</span></li>`);
            } else { html += `<li>Нет данных</li>`; }
            html += `</ul>`;

            let averages = Object.entries(stats[s].orderSum).map(e => {
                let avg = (e[1] / stats[s].orderCount[e[0]]).toFixed(1);
                return [e[0], avg];
            }).sort((a,b) => b[1] - a[1]).slice(0, 5);
            html += `<b style="color:#2e7d32; font-size:16px; margin-top:15px; display:inline-block;">📦 Средний заказ (Топ-5 закупка):</b><ul style="margin-top:5px; padding-left:20px; font-size:15px; color:#555; font-weight:bold;">`;
            if (averages.length > 0) {
                averages.forEach(a => html += `<li>${a[0]}: <span style="color:#2e7d32;">~${a[1]} шт</span></li>`);
            } else { html += `<li>Нет данных</li>`; }
            html += `</ul></div>`;
        });
        html += `</div>`;
        box.innerHTML = html;
    }

    async function switchOrderCatalog(isNew) {
        isNewShopCatalog = isNew;
        currentPath = isNew ? "catalogs/newshop" : "catalogs/order";
        const box = document.getElementById('content');
        box.innerHTML = "<div style='text-align:center; padding:40px; font-weight:bold; font-size:22px; color:#7E57C2;'>⌛ Загрузка каталога...</div>";
        let res = await fetch(`${FB_URL}/${currentPath}.json`);
        currentCatalog = await res.json() || {};
        renderCatalogOrder();
    }

    // ==========================================
    // 1. РЕНДЕР: СПРАВОЧНИК ЗАКУПКИ
    // ==========================================
    function renderCatalogOrder() {
        const box = document.getElementById('content');
        let globalCats = ["Основное меню"];
        Object.values(currentCatalog).forEach(i => {
            if(i.globalCat && !globalCats.includes(i.globalCat) && !i.globalCat.includes("!!!")) globalCats.push(i.globalCat);
        });
        let subCats = [...new Set(Object.values(currentCatalog).map(i => i.cat).filter(c => c && !c.includes("!!!")))];

        let html = `
        <div style="display:flex; justify-content:space-between; margin-bottom:10px; align-items:center;">
            <h3 style="margin:0; font-size:24px; color:#4A148C;">Редактор товаров: ЗАКУПКА</h3>
            <div style="display:flex; gap:15px;">
                <button class="btn-add" onclick="addItemOrder()">➕ Добавить позицию</button>
                <button class="btn-save" style="margin:0; width:auto; padding:14px 28px;" onclick="saveCatalog()">💾 СОХРАНИТЬ В БАЗУ</button>
            </div>
        </div>
        <div style="margin-bottom: 20px; display: flex; gap: 10px;">
            <button class="tab-btn ${!isNewShopCatalog ? 'active' : ''}" style="padding: 10px 20px; font-size: 15px;" onclick="switchOrderCatalog(false)">📦 Обычная закупка</button>
            <button class="tab-btn ${isNewShopCatalog ? 'active' : ''}" style="padding: 10px 20px; font-size: 15px;" onclick="switchOrderCatalog(true)">🏗 На новую кофейню</button>
        </div>
        <div class="settings-panel">
            <h4 style="margin-top:0; font-size:19px; color:#d32f2f; cursor:pointer; display:flex; justify-content:space-between; align-items:center;" onclick="toggleElements('settings-content-div')">
                <span>⚙️ Настройки (Скрывать глобальные категории в приложении)</span><span>▼</span>
            </h4>
            <div class="settings-content-div" style="display:none; flex-wrap:wrap; gap:20px; margin-top:15px;">
                <label class="toggle-label" style="color:#2e7d32;"><input type="checkbox" onchange="toggleSetting('new_shop_order_active', this.checked)" ${appSettings.new_shop_order_active ? 'checked' : ''}> Показывать кнопку "Закупка на новую кофейню"</label>`;
        globalCats.forEach(gc => {
            if(gc.includes("!!!")) return; 
            html += `<label class="toggle-label"><input type="checkbox" onchange="toggleHiddenCategory('${gc}', this.checked)" ${appSettings.hidden_categories[gc] ? 'checked' : ''}> Скрыть "${gc}"</label>`;
        });
        html += `</div></div><table style="min-width:1400px;"><tr><th style="width:160px;">Глоб. Категория</th><th style="width:160px;">Подкатегория</th><th style="width:200px;">Наименование</th><th style="width:100px;">Поставщик</th><th style="width:80px;">Цена 1 (₽)</th><th>Ссылка 1</th><th style="width:80px;">Цена 2 (₽)</th><th>Ссылка 2</th><th style="width:60px; text-align:center;">Удалить</th></tr>`;

        let grouped = {};
        Object.keys(currentCatalog).forEach(k => {
            let item = currentCatalog[k]; let gc = item.globalCat || "Основное меню"; let sc = item.cat || "Прочее";
            if (!grouped[gc]) grouped[gc] = {}; if (!grouped[gc][sc]) grouped[gc][sc] = [];
            grouped[gc][sc].push({k: k, item: item});
        });
        Object.keys(grouped).sort((a,b) => { if(a.includes("!!!")) return -1; if(b.includes("!!!")) return 1; return a.localeCompare(b); }).forEach(gc => {
            let safeGc = getSafeId(gc); let displayGc = gc.replace("!!! НОВОЕ", "Новая добавленная позиция");
            html += `<tr class="cat-group-header" onclick="toggleLvl1('${safeGc}')"><td colspan="9" style="padding:18px; background:#d1c4e9; font-size:20px;">🌍 <b>${displayGc}</b> <span style="float:right;">▼</span></td></tr>`;
            Object.keys(grouped[gc]).sort((a,b) => { if(a.includes("!!!")) return -1; if(b.includes("!!!")) return 1; return a.localeCompare(b); }).forEach(sc => {
                let safeSc = getSafeId(gc + "_" + sc); let displaySc = sc.replace("!!! НОВОЕ", "Заполните данные"); let displayStyle = gc.includes("!!!") ? "table-row" : "none";
                html += `<tr class="cat-group-header lvl2_${safeGc}" style="display:${displayStyle};" onclick="toggleElements('lvl3_${safeSc}')"><td colspan="9" style="padding:15px; padding-left:30px; font-size:18px;">📂 ${displaySc} <span style="float:right;">▼</span></td></tr>`;

    function renderMissing() {
        const box = document.getElementById('content');
        let activeHtml = "<h3 style='color:#E53935; font-size:24px; margin-bottom:15px;'>‼️ Актуальные Недовозы</h3><table style='margin-bottom:20px;'><tr><th>Точка</th><th>Товар / Ссылки</th><th style='text-align:center;'>Кол-во</th><th>Статус</th><th style='text-align:center;'>Удалить</th></tr>";
        let historyHtml = "<table style='margin-top:15px;'><tr><th>Точка</th><th>Товар</th><th style='text-align:center;'>Кол-во</th><th>Статус</th><th style='text-align:center;'>Удалить</th></tr>";
        let hasActive = false; let hasHistory = false; let cutoff = Date.now() - (30 * 24 * 60 * 60 * 1000);
        let missingArr = Object.keys(cachedData.missing).map(k => ({key: k, ...cachedData.missing[k]}));
        missingArr.sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));

        missingArr.forEach(m => {
            if ((m.timestamp || 0) < cutoff && m.status !== 'pending' && m.status !== 'transit' && m.status !== 'oos' && m.status !== 'reorder') return; 
            let iNameLow = String(m.name).trim().toLowerCase();
            let catInfo = Object.values(cachedData.catalogOrder || {}).find(ci => {
                if(!ci || !ci.name) return false; let cName = String(ci.name).trim().toLowerCase();
                return cName === iNameLow || cName.includes(iNameLow) || iNameLow.includes(cName);
            }) || {};
            let displayName = m.shop === 'Красноказарменная' ? 'МЭИ' : m.shop;
            
            if (m.status === 'canceled' || m.status === 'arrived') {
                hasHistory = true;
                let statColor = m.status === 'arrived' ? '#4caf50' : '#888'; let statText = m.status === 'arrived' ? '✅ Доехал' : '🔄 Возвращен в корзину';
                let dateStr = m.timestamp ? new Date(m.timestamp).toLocaleDateString('ru-RU') : '';
                historyHtml += `<tr style="background:#fafafa;"><td><b style="font-size:16px; color:#311b92;">${displayName}</b><br><span style="font-size:12px; color:#888;">${dateStr}</span></td><td style="font-size:15px;">${m.name}</td><td style="font-size:16px; font-weight:bold; text-align:center;">${m.qty}</td><td style="font-size:14px; color:${statColor}; font-weight:bold;">${statText}</td><td style="text-align:center;"><button class="btn-del" style="padding:4px 8px; font-size:14px;" onclick="deleteMissing('${m.key}')">🗑</button></td></tr>`;
            } else {
                hasActive = true;
                let link1 = catInfo.link ? `<a href="${catInfo.link}" target="_blank" style="color:#0288d1; font-weight:bold; margin-right:8px; text-decoration:none;">🔗 Осн</a>` : "";
                let link2 = catInfo.link2 ? `<a href="${catInfo.link2}" target="_blank" style="color:#e53935; font-weight:bold; text-decoration:none;">🔗 Рез</a>` : "";
                let linksHtml = (link1 || link2) ? `<br><span style="font-size:14px; background:#f0f0f0; padding:4px 8px; border-radius:6px; display:inline-block; margin-top:5px;">Заказать: ${link1}${link2}</span>` : "";
                activeHtml += `<tr><td><b style="font-size:18px; color:#311b92;">${displayName}</b></td><td style="font-size:17px;">${m.name} ${linksHtml}</td><td style="font-size:18px; font-weight:bold; text-align:center;">${m.qty}</td><td><select onchange="updateMissingStatus('${m.key}', this.value)" style="padding:10px; border-radius:8px; border:2px solid #e1bee7; font-weight:bold; font-size:15px; width:100%;"><option value="pending" ${m.status==='pending'?'selected':''}>Ожидает проверки админом</option><option value="transit" ${m.status==='transit'?'selected':''}>В пути (от поставщика)</option><option value="reorder" ${m.status==='reorder'?'selected':''}>Отменен (Админ закажет сам)</option><option value="canceled" ${m.status==='canceled'?'selected':''}>ОТМЕНЕН (Вернуть в корзину)</option><option value="oos" ${m.status==='oos'?'selected':''}>Нет в наличии</option></select></td><td style="text-align:center;"><button class="btn-del" onclick="deleteMissing('${m.key}')">🗑</button></td></tr>`;
            }
        });
        
        activeHtml += "</table>"; historyHtml += "</table>";
        if (!hasActive) activeHtml = `<h3 style='color:#E53935; font-size:24px; margin-bottom:15px;'>‼️ Актуальные Недовозы</h3><div class='card' style='text-align:center; font-weight:900; color:#888; margin-bottom:20px;'>Нет активных недовозов.</div>`;
        let html = activeHtml + `<p style='margin-top:0px; margin-bottom:30px; font-size:16px; color:#777; background:#fff9c4; padding:15px; border-radius:10px;'>💡 <b>Подсказка:</b> Статус "Отменен (Админ закажет сам)" будет отображаться у бариста как "В пути". Если выбрать "ОТМЕНЕН (Вернуть в корзину)", товар снова появится в закупке у сотрудника.</p>`;
        
        if (hasHistory) {
            html += `<div onclick="toggleElements('missing-history-content')" style="cursor:pointer; background:#ede7f6; padding:18px; border-radius:12px; font-weight:900; color:#311B92; margin-top:20px; display:flex; justify-content:space-between; font-size:20px;"><span>🕒 История недовозов (за 30 дней)</span><span>▼</span></div><div class="missing-history-content" style="display:none;">${historyHtml}</div>`;
        }
        box.innerHTML = html;
    }

    async function updateMissingStatus(key, val) {
        await fetch(`${FB_URL}/missing_items/${key}.json`, { method: 'PATCH', body: JSON.stringify({status: val, timestamp: Date.now()}) });
        if (val === 'canceled') alert("Статус обновлен. Товар возвращен в корзину сотруднику и скрыт из списка недовозов.");
        else if (val === 'arrived') alert("Статус обновлен. Товар отмечен как доставленный и скрыт из списка недовозов.");
        else alert("Статус недовоза успешно обновлен!");
        loadTab('missing', document.querySelector('.tab-btn.active')); 
    }

    function renderStoplists() {
        const box = document.getElementById('content');
        let shops = ["Бояринова", "Гагарина", "Вертолетчиков", "Липчанского", "Новокосино", "Новокосино 2", "Старое Павлино", "Красноказарменная", "Ухтомского ополчения"];
        let latestStops = {};
        let activeOrdersMap = {}; // Карта для хранения статусов текущих заказов

        Object.values(cachedData.orders).forEach(o => {
            if (!o) return;
            if (o.mode === 'stoplist_fill') {
                if (!latestStops[o.shop] || o.timestamp > latestStops[o.shop].timestamp) { latestStops[o.shop] = o; }
            }
            // Формируем карту активного свода для подтягивания статусов
            if ((o.mode === 'order' || o.mode === 'new_shop') && o.ordered !== true) {
                if (!activeOrdersMap[o.shop]) activeOrdersMap[o.shop] = {};
                let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                itemsArr.forEach(i => {
                    if (i && i.name) {
                        let stat = 'pending';
                        if (o.svod) {
                            if (i.status === 'error' || i.bot_error) stat = 'error';
                            else if (i.status === 'ordered') stat = 'ordered';
                            else stat = 'pending';
                        }
                        activeOrdersMap[o.shop][i.name] = stat;
                    }
                });
            }
        });
        
        let html = `<h3 style="color:#D50000; margin-bottom:20px; font-size:24px;">🛑 Актуальные Стоп-листы на точках</h3><div style="display:flex; flex-wrap:wrap; gap:20px;">`;

            if (stop && stop.items) {
                html += `<div style="font-size:14px; color:#888; margin-bottom:15px; font-weight:bold;">Обновлено: ${new Date(stop.timestamp).toLocaleString()}</div>`;
                let itemsArr = Array.isArray(stop.items) ? stop.items : Object.values(stop.items);
                let foundItems = false;
                itemsArr.forEach(i => {
                    if (i && i.name) {
                        let iNameLow = String(i.name).trim().toLowerCase();
                        let catInfo = Object.values(catalog).find(c => {
                            if(!c || !c.name) return false; let cName = String(c.name).trim().toLowerCase();
                            return cName === iNameLow || cName.includes(iNameLow) || iNameLow.includes(cName);
                        }) || {};
                        
                        let l1 = catInfo.link ? `<a href="${catInfo.link}" target="_blank" style="color:#fff; background:#0288d1; padding:4px 8px; border-radius:6px; text-decoration:none; font-size:12px; font-weight:bold;">🔗 Осн</a>` : "";

                        let linksHtml = [l1, l2].filter(Boolean).join(" ");
                        
                        // Логика подтягивания статуса из активного Свода
                        let statHtml = "";
                        let itemStatus = activeOrdersMap[s] ? activeOrdersMap[s][i.name] : null;
                        if (itemStatus === 'ordered') {
                            statHtml = `<span style="background:#e8f5e9; color:#2e7d32; padding:3px 6px; border-radius:6px; font-size:12px; font-weight:900; margin-right:8px;">Заказано ✅</span>`;

                        html += `<div style="padding:10px 0; border-bottom:1px dashed #eee; font-size:17px; display:flex; justify-content:space-between; align-items:center;"><b style="color:#333;">${i.name}</b> ${linkBtn}</div>`;

            } else { html += `<div style="color:#888; font-size:17px; padding:10px 0; font-weight:bold;">Нет данных о стоп-листе</div>`; }

        });
        html += `</div>`;

    // 5. РЕНДЕР: ТАБЛИЦА ЧЕК-ЛИСТОВ
    // ==========================================
    function renderChecksTable() {

        Object.values(cachedData.orders).forEach(o => {

                if (!latestChecklists[o.shop] || o.timestamp > latestChecklists[o.shop].timestamp) { latestChecklists[o.shop] = o; }
            }
        });
        
        const catOrderArr = ["Стаканы и крышки", "Расходники", "Пищевые расходники", "Зерно", "Бабл ти", "Пищевые порошки", "Сиропы"];

        let sortedCats = Object.keys(groupedCat).sort((a,b) => {

        let html = `<div style="display:flex; justify-content:space-between; margin-bottom:15px; align-items:center;"><h3 style="color:#1a237e; font-size:24px; margin:0;">✅ Сводная Таблица Чек-листов (Актуальные данные)</h3><button onclick="toggleChecklistEdit()" class="btn-add" style="background:${btnEditColor};">${btnEditText}</button></div>`;
        if (isChecklistEditMode) html += `<button onclick="saveChecklistEdits()" class="btn-save" style="margin-top:0; margin-bottom:20px;">💾 СОХРАНИТЬ ВСЕ ИЗМЕНЕНИЯ В БАЗУ</button>`;
        else html += `<p style="font-size:16px; color:#7E57C2; font-weight:bold;">Нажмите на категорию, чтобы развернуть список товаров.</p>`;
        
        html += `<table style="min-width:1200px;"><tr><th style="width:250px;">Товар</th>`;
        shops.forEach(s => {

            if (latestChecklists[s] && latestChecklists[s].timestamp) {
                let d = new Date(latestChecklists[s].timestamp); dateStr = d.toLocaleDateString('ru-RU') + " " + d.toLocaleTimeString('ru-RU', {hour: '2-digit', minute:'2-digit'});
            }
            let displayName = s === 'Красноказарменная' ? 'МЭИ' : s;
            html += `<th style="text-align:center; font-size:15px;">${displayName}<br><span style="font-size:13px; color:#888; font-weight:normal;">${dateStr}</span></th>`;
        });
        html += `<th style="width:250px; text-align:right;">Товар</th></tr>`;
        
        sortedCats.forEach(cat => {
            let safeCat = getSafeId(cat);
            html += `<tr class="cat-group-header" onclick="toggleElements('chk_${safeCat}')"><td colspan="${shops.length+2}" style="padding:15px; font-size:18px;">📂 ${cat} <span style="float:right; opacity:0.5;">▼</span></td></tr>`;
            groupedCat[cat].sort((a,b) => a.localeCompare(b)).forEach(itemName => {
                html += `<tr class="chk-row chk_${safeCat}" style="display:none; background-color:#fff;"><td style="font-size:16px;"><b>${itemName}</b></td>`;
                shops.forEach(s => {
                    let val = "-"; let orderKey = latestChecklists[s] ? latestChecklists[s].key : "";
                    if (latestChecklists[s] && latestChecklists[s].items) {
                        let itemsArr = Array.isArray(latestChecklists[s].items) ? latestChecklists[s].items : Object.values(latestChecklists[s].items);
                        let found = itemsArr.find(i => i && i.name === itemName);
                        if (found && found.qty !== undefined && found.qty !== null && String(found.qty).trim() !== "") { val = String(found.qty); }
                    }
                    if (isChecklistEditMode) {
                        if (orderKey) html += `<td><input type="text" class="edit-chk-input" data-order="${orderKey}" data-item="${itemName.replace(/"/g, '&quot;')}" value="${val}"></td>`;
                        else html += `<td style="text-align:center; color:#aaa; font-style:italic; font-size:14px;">Нет формы</td>`;
                    } else {
                        let cl = "ch-val ";
                        if (val === "Полная" || val === "В наличии" || val === "1") cl += "ch-full";

                    }
                });
                html += `<td style="font-size:16px; text-align:right;"><b>${itemName}</b></td></tr>`;
            });
        });
        box.innerHTML = html + "</table>";
    }

    // ==========================================
    // 7. РЕНДЕР: СВОД ЗАКАЗОВ И ИСТОРИЯ
    // ==========================================
    
    function markSvodStatusChange(shop, name, currentStatus) {
        preserveSvodInputs();
        if (!tempSvodStatus[shop]) tempSvodStatus[shop] = {};
        let newStatus = (currentStatus === 'error') ? 'ordered' : 'error';
        tempSvodStatus[shop][name] = newStatus;
        renderOrdersSvod(); 
    }

    function preserveSvodInputs() {
        let inputs = document.querySelectorAll('.edit-svod-input');
        inputs.forEach(inp => {
            let s = inp.getAttribute('data-shop');
            let n = inp.getAttribute('data-item');
            if (!tempSvodQty[s]) tempSvodQty[s] = {};
            tempSvodQty[s][n] = parseFloat(inp.value) || 0;
        });
    }

    function renderOrdersSvod() {
        const box = document.getElementById('content');
        let cutoffMonth = Date.now() - (30 * 24 * 60 * 60 * 1000); 
        let todayStart = new Date().setHours(0,0,0,0);
        let historyKeys = new Set(); let todaysOrders = []; let historyOrdersList = [];
        let allOrders = Object.values(cachedData.orders).sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));

        allOrders.forEach(o => {
            if (o && (o.mode === 'order' || o.mode === 'new_shop')) {
                let isOrdered = o.ordered === true;
                
                if (!isOrdered) {
                    // Заказы висят здесь пока не нажмут "Оформлено"
                    todaysOrders.push(o);
                } else {
                    if ((o.timestamp || 0) >= cutoffMonth) {
                        historyOrdersList.push(o);
                    }
                    if ((o.timestamp || 0) < todayStart) {
                        let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                        itemsArr.forEach(i => { if(i) historyKeys.add(o.shop + "|" + i.name); });
                    }
                }
            }
        });

        let svodData = {};
        todaysOrders.forEach(o => {
            if (!svodData[o.shop]) svodData[o.shop] = { items: {}, lentaSum: 0, ozonSum: 0, kuperSum: 0, comments: [], all_svod: true };
            if (o.comment && o.comment.trim() !== "") svodData[o.shop].comments.push(o.comment);
            
            if (!o.svod) svodData[o.shop].all_svod = false;

            let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
            let hasRealItems = itemsArr.some(i => i && i.name && i.name !== "НЕТ ЗАКАЗА" && parseFloat(i.qty) > 0);

            itemsArr.forEach(i => {
                if (i && i.name) {
                    if (i.name === "НЕТ ЗАКАЗА" && hasRealItems) return; 

                    if (!svodData[o.shop].items[i.name]) {
                        svodData[o.shop].items[i.name] = { qty: 0, bot_error: false, status: 'pending' };
                    }
                    svodData[o.shop].items[i.name].qty += parseFloat(i.qty) || 0;
                    
                    if (o.svod) {
                        if (i.bot_error === true || i.not_found === true || i.error === true || i.status === 'error') {
                            svodData[o.shop].items[i.name].bot_error = true;
                            svodData[o.shop].items[i.name].status = 'error';

                    let isDeleted = svodDeletions.some(d => d.shop === shop && d.name === name);

                    if(vendor.toLowerCase() === 'лента') {
                        svodData[shop].lentaSum += (displayQty * price);

                    let vendorA = (catItemA.vendor || 'Лента').toLowerCase();
                    let vendorB = (catItemB.vendor || 'Лента').toLowerCase();
                    if (vendorA < vendorB) return -1; if (vendorA > vendorB) return 1; return a.localeCompare(b);

                sortedItemNames.forEach(name => {

                    } else {
                        html += `<tr class="svod_${safeShopId}" style="${displayStyle} ${rowBg}">
                            <td style="padding-left:25px; font-size:17px; font-weight:bold;">${name} ${repeatBadge}</td>

                if(svodData[shop].comments.length > 0) {

                        <th>Детали</th>
                        <th>Комментарий</th>

        if (historyOrdersList.length === 0) {

                let date = o.timestamp ? new Date(o.timestamp).toLocaleString('ru-RU') : '---';

    // ==========================================
    // УТИЛИТЫ CRM, СОХРАНЕНИЯ И УДАЛЕНИЯ
    // ==========================================
    
    async function markOrdersAsPlaced() {
        if(!confirm("Все заказы оформлены? Свод будет очищен, а заказы перенесены в историю (в мини-аппе они останутся в приемке).")) return;
        let updates = {};
        Object.values(cachedData.orders).forEach(o => {
            if (o && (o.mode === 'order' || o.mode === 'new_shop')) {
                let isOrdered = o.ordered === true;
                if (!isOrdered) {
                    updates[o.key + "/ordered"] = true;
                    updates[o.key + "/svod"] = true; 
                    
                    if (o.items) {
                        let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items);
                        let changed = false;
                        itemsArr.forEach(i => {
                            if (i && i.name !== "НЕТ ЗАКАЗА" && (!i.status || i.status === 'pending')) {
                                i.status = 'ordered';
                                changed = true;
                            }
                        });
                        if (changed) updates[o.key + "/items"] = itemsArr;
                    }
                }
            }
        });
        if (Object.keys(updates).length > 0) {
            try {
                await fetch(`${FB_URL}/orders.json`, { method: 'PATCH', body: JSON.stringify(updates) });
                alert("✅ Свод успешно очищен и перенесен в историю!");
                loadTab('orders', document.querySelector('.tab-btn.active'));
            } catch(e) { alert("❌ Ошибка: " + e.message); }
        } else { alert("Нет активных заказов для оформления."); }
    }

    function toggleSvodEdit() {
        isSvodEditMode = !isSvodEditMode;
        svodDeletions = [];
        tempSvodQty = {}; 
        tempSvodStatus = {};
        renderOrdersSvod();
    }

    function markSvodDelete(btn, shop, name) {
        preserveSvodInputs(); 
        svodDeletions.push({shop: shop, name: name});
        renderOrdersSvod(); 
    }

    async function saveSvodEdits() {
        const btn = document.querySelector('.btn-save');
        if(btn) btn.innerHTML = "⌛ СОХРАНЕНИЕ...";
        preserveSvodInputs(); 
        
        try {
            let hasChanges = false;
            let assignedUpdates = {}; 
            
            for (let k in cachedData.orders) {
                let o = cachedData.orders[k];
                if (o && (o.mode === 'order' || o.mode === 'new_shop') && !o.ordered) {
                    
                    let needsUpdate = false;
                    let itemsArr = Array.isArray(o.items) ? o.items : Object.values(o.items || {});
                    let newItemsArr = [];
                    
                    for (let i = 0; i < itemsArr.length; i++) {
                        let itm = itemsArr[i];
                        if (!itm || !itm.name) continue;
                        
                        let isDeleted = svodDeletions.some(d => d.shop === o.shop && d.name === itm.name);
                        if (isDeleted) {
                            needsUpdate = true;
                            continue; 
                        }
                        
                        let updatedQty = (tempSvodQty[o.shop] && tempSvodQty[o.shop][itm.name] !== undefined) ? tempSvodQty[o.shop][itm.name] : undefined;
                        let updatedStatus = (tempSvodStatus[o.shop] && tempSvodStatus[o.shop][itm.name] !== undefined) ? tempSvodStatus[o.shop][itm.name] : undefined;
                        
                        if (updatedStatus !== undefined && itm.status !== updatedStatus) {
                            needsUpdate = true;
                            itm.status = updatedStatus;
                            itm.bot_error = (updatedStatus === 'error');
                            itm.not_found = (updatedStatus === 'error');
                            itm.error = (updatedStatus === 'error');
                        }

                        if (updatedQty !== undefined) {
                            if (!assignedUpdates[o.shop]) assignedUpdates[o.shop] = {};
                            
                            if (!assignedUpdates[o.shop][itm.name]) {
                                if (String(updatedQty) !== String(itm.qty)) {
                                    needsUpdate = true;
                                    itm.qty = updatedQty;
                                }
                                assignedUpdates[o.shop][itm.name] = true;
                                newItemsArr.push(itm);
                            } else {
                                needsUpdate = true; 
                            }
                        } else {
                            newItemsArr.push(itm);
                        }
                    }
                    
                    if (needsUpdate) {
                        hasChanges = true;
                        if (newItemsArr.length === 0) {
                            newItemsArr = [{name: "НЕТ ЗАКАЗА", qty: 0}];
                        }
                        await fetch(`${FB_URL}/orders/${k}/items.json`, {method:'PUT', body: JSON.stringify(newItemsArr)});
                    }
                }
            }
            
            if (hasChanges) {
                alert("✅ Изменения успешно сохранены!");
            } else if (svodDeletions.length > 0) {
                alert("✅ Позиции успешно удалены!");
            } else {
                alert("Изменений не найдено, выходим из режима редактирования.");
            }
            
            isSvodEditMode = false;
            svodDeletions = [];
            tempSvodQty = {};
            tempSvodStatus = {};
            loadTab('orders', document.querySelector('.tab-btn.active'));
        } catch (e) {
            alert("❌ Ошибка при удалении/сохранении: " + e.message);
            if(btn) btn.innerHTML = "💾 СОХРАНИТЬ ИЗМЕНЕНИЯ";
        }
    }

    function toggleChecklistEdit() { isChecklistEditMode = !isChecklistEditMode; renderChecksTable(); }

    async function saveChecklistEdits() {
        let inputs = document.querySelectorAll('.edit-chk-input');
        let updates = {};
        inputs.forEach(input => {
            let oKey = input.getAttribute('data-order'); let item = input.getAttribute('data-item'); let val = input.value.trim();
            if(!updates[oKey]) updates[oKey] = {}; updates[oKey][item] = val;
        });
        const btn = document.querySelector('.btn-save'); if(btn) btn.innerHTML = "⌛ СОХРАНЕНИЕ...";
        try {
            for(let oKey in updates) {
                let order = cachedData.orders[oKey]; if(!order) continue;
                let itemsArr = Array.isArray(order.items) ? order.items : Object.values(order.items||{});
                for(let item in updates[oKey]) {
                    let found = itemsArr.find(i => i && i.name === item);
                    if(found) { found.qty = updates[oKey][item]; } else { itemsArr.push({name: item, qty: updates[oKey][item], cat: "Прочее"}); }
                }
                await fetch(`${FB_URL}/orders/${oKey}/items.json`, {method:'PUT', body: JSON.stringify(itemsArr)});
            }
            alert("✅ Изменения в чек-листе успешно сохранены в базе!");
            loadTab('checks_table', document.querySelector('.tab-btn.active'));
        } catch(e) { alert("❌ Ошибка сохранения: " + e.message); }
    }

    function updateVal(id, field, val) { 
        if (val === "НОВАЯ ГЛОБАЛЬНАЯ" || val === "НОВАЯ КАТЕГОРИЯ") {
            let newCat = prompt("Введите название новой категории:");
            if (newCat) {
                currentCatalog[id][field] = newCat;
                if (currentPath.includes('order')) renderCatalogOrder();
                else if (currentPath.includes('stoplist')) renderCatalogStoplist();
                else renderCatalogChecklist();
            } else {
                if (currentPath.includes('order')) renderCatalogOrder();
                else if (currentPath.includes('stoplist')) renderCatalogStoplist();
                else renderCatalogChecklist();
                return;
            }
        } else {
            currentCatalog[id][field] = val; 
        }
    }
    
    function addItemOrder() { 
        let id = "item_" + Date.now(); 
        currentCatalog[id] = { globalCat: "!!! НОВОЕ", cat: "!!! НОВОЕ", name: "Новая позиция", vendor: "Лента", price: 0, price2: 0, link: "", link2: "", fallback: "" }; 
        renderCatalogOrder();
    }
    
    function addItemChecklist() { 
        let id = "item_" + Date.now(); 
        currentCatalog[id] = { globalCat: "!!! НОВОЕ", cat: "!!! НОВОЕ", name: "Новая позиция", unit: "текст" }; 
        renderCatalogChecklist();
    }

    function addItemStoplist() { 
        let id = "stop_" + Date.now(); 
        currentCatalog[id] = { cat: "Новая", name: "", sez: "", main: "" }; 
        renderCatalogStoplist();
    }
    
    async function deleteItem(id) { 
        if(confirm("Вы уверены, что хотите УДАЛИТЬ эту позицию НАВСЕГДА?")) { 
            await fetch(`${FB_URL}/${currentPath}/${id}.json`, { method: 'DELETE' });
            delete currentCatalog[id]; 
            loadTab(currentTabType, document.querySelector('.tab-btn.active'));
        } 
    }

    async function deleteOrder(key) {
        if(confirm("Вы уверены, что хотите УДАЛИТЬ этот заказ навсегда?")) {
            await fetch(`${FB_URL}/orders/${key}.json`, { method: 'DELETE' });
            alert("Заказ удален!");
            loadTab('orders', document.querySelector('.tab-btn.active'));
        }
    }

    async function deleteMissing(key) {
        if(confirm("Вы уверены, что хотите УДАЛИТЬ этот недовоз навсегда?")) {
            await fetch(`${FB_URL}/missing_items/${key}.json`, { method: 'DELETE' });
            loadTab('missing', document.querySelector('.tab-btn.active'));
        }
    }

    async function toggleSetting(key, val) {
        appSettings[key] = val;
        await fetch(`${FB_URL}/settings.json`, { method: 'PUT', body: JSON.stringify(appSettings) });
    }

    async function toggleHiddenCategory(cat, isHidden) {
        appSettings.hidden_categories[cat] = isHidden;
        await fetch(`${FB_URL}/settings/hidden_categories.json`, { method: 'PUT', body: JSON.stringify(appSettings.hidden_categories) });
    }

    async function saveCatalog() {
        const btn = document.querySelector('.btn-save'); 
        btn.innerHTML = "⌛ СОХРАНЕНИЕ...";
        try { 
            await fetch(`${FB_URL}/${currentPath}.json`, { method: 'PUT', body: JSON.stringify(currentCatalog) }); 
            alert("✅ База обновлена и мгновенно доступна сотрудникам!"); 
            loadTab(currentTabType, document.querySelector('.tab-btn.active'));
        } catch(e) { 
            alert("❌ Ошибка при сохранении!"); 
        }
    }

    async function updateMissingStatus(key, val) {
        await fetch(`${FB_URL}/missing_items/${key}.json`, { 
            method: 'PATCH', 
            body: JSON.stringify({status: val, timestamp: Date.now()}) 
        });
        if (val === 'canceled') {
            alert("Статус обновлен. Товар возвращен в корзину сотруднику и скрыт из списка недовозов.");
        } else if (val === 'arrived') {
            alert("Статус обновлен. Товар отмечен как доставленный и скрыт из списка недовозов.");
        } else {
            alert("Статус недовоза успешно обновлен!");
        }
        loadTab('missing', document.querySelector('.tab-btn.active')); 
    }
    
    window.onload = () => loadTab('orders', document.querySelector('.tab-btn'));
</script>
